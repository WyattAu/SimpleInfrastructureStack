---
name: Validate

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]

# Only one validation run per branch at a time
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq yamllint

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yml stacks/*/docker-compose.yml ansible/ .sops.yaml

      - name: Validate Ansible playbooks
        uses: ansible/ansible-action@v2
        with:
          playbook: ansible/playbooks/bootstrap.yml
          inventory: ansible/inventory/hosts.yml
          galaxy-collections: community.docker
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg

  compose-validate:
    name: Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all compose files
        run: |
          FAILED=0
          for compose in stacks/*/docker-compose.yml; do
            stack=$(basename $(dirname "$compose"))
            echo "::group::$stack"
            if docker compose -f "$compose" config --quiet 2>&1; then
              echo "✅ $stack"
            else
              echo "❌ $stack"
              FAILED=1
            fi
            echo "::endgroup::"
          done
          exit $FAILED

  secrets-validate:
    name: Secrets Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SOPS and age
        run: |
          curl -sSL https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64 \
            -o /usr/local/bin/sops && chmod +x /usr/local/bin/sops
          curl -sSL https://github.com/FiloSottile/age/releases/download/v1.2.0/age-v1.2.0-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin age

      - name: Validate all encrypted secrets can be decrypted
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "::warning::SOPS_AGE_KEY secret not configured, skipping secrets validation"
            exit 0
          fi
          FAILED=0
          for secret in secrets/*.env.encrypted; do
            stack=$(basename "$secret" .env.encrypted)
            echo -n "$stack: "
            if sops --config /dev/null --decrypt \
                --age "$AGE_PUBLIC_KEY_PLACEHOLDER" \
                --input-type dotenv \
                --output-type dotenv \
                "$secret" > /dev/null 2>&1; then
              lines=$(sops --config /dev/null --decrypt \
                --input-type dotenv \
                --output-type dotenv \
                "$secret" 2>/dev/null | wc -l)
              echo "✅ OK ($lines vars)"
            else
              echo "❌ DECRYPT FAILED"
              FAILED=1
            fi
          done
          exit $FAILED

  ansible-check:
    name: Ansible Dry Run
    runs-on: ubuntu-latest
    needs: [lint, compose-validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible-core
          ansible-galaxy collection install community.docker

      - name: Syntax check all playbooks
        run: |
          ANSIBLE_CONFIG=ansible/ansible.cfg
          for playbook in ansible/playbooks/*.yml; do
            echo -n "$(basename $playbook): "
            if ansible-playbook --syntax-check "$playbook" 2>&1; then
              echo "✅"
            else
              echo "❌"
              exit 1
            fi
          done

      - name: Inventory validation
        run: |
          ANSIBLE_CONFIG=ansible/ansible.cfg
          ansible-inventory -i ansible/inventory/hosts.yml --list --export 2>&1 | python3 -c "
          import json, sys
          inv = json.load(sys.stdin)
          hosts = [h for g in inv.values() if isinstance(g, dict) for h in g.get('hosts', {}).keys()]
          assert 'truenas-primary' in hosts, 'Missing truenas-primary host'
          print(f'✅ Inventory valid: {len(hosts)} host(s)')
          " 2>&1
