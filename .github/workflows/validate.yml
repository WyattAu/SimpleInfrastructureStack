---
name: Validate

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]
  workflow_call:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-validate:
    name: Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install conftest
        run: |
          curl -sSL https://github.com/open-policy-agent/conftest/releases/download/v0.57.0/conftest_0.57.0_Linux_x86_64.tar.gz | \
            sudo tar xz -C /usr/local/bin conftest

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq yamllint

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yml stacks/*/docker-compose.yml ansible/ .sops.yaml

      - name: Validate all compose files
        run: |
          # Create a dummy .env so docker compose can interpolate all ${VAR} references.
          # Use /tmp prefix for path-like vars to satisfy volume mount validation.
          vars=$(grep -rhoP '\$\{([A-Z_][A-Z0-9_]*)' stacks/*/docker-compose.yml | sort -u | sed 's/\${//')
          for v in $vars; do
            # Heuristic: vars ending in _PATH get /tmp, others get "dummy"
            case "$v" in
              *_PATH|*_DIR|*_TOKEN|*_SECRET|*_PASSWORD|*_KEY|*_ID|*_URL) echo "$v=/tmp/$v" ;;
              *) echo "$v=dummy" ;;
            esac
          done > /tmp/ci-dummy.env

          FAILED=0
          for compose in stacks/*/docker-compose.yml; do
            stack=$(basename $(dirname "$compose"))
            echo "::group::$stack"
            # Some stacks reference env_file: .env at runtime; create dummy if missing
            stack_dir=$(dirname "$compose")
            if [ -f "$stack_dir/.env.example" ] && [ ! -f "$stack_dir/.env" ]; then
              cp "$stack_dir/.env.example" "$stack_dir/.env"
              # Replace any ${VAR} references in the example with dummy values
              sed -i 's/\${[^}]*}/dummy/g' "$stack_dir/.env"
            fi
            if docker compose --env-file /tmp/ci-dummy.env -f "$compose" config --quiet 2>&1; then
              echo "✅ $stack"
            else
              echo "❌ $stack"
              FAILED=1
            fi
            # Clean up dummy .env
            rm -f "$stack_dir/.env"
            echo "::endgroup::"
          done
          exit $FAILED

      - name: OPA policy check (conftest)
        run: |
          FAILED=0
          for compose in stacks/*/docker-compose.yml; do
            stack=$(basename $(dirname "$compose"))
            echo "::group::$stack"
            if conftest test -p policies/ "$compose" --namespace dockercompose.security --no-color 2>&1; then
              echo "✅ $stack"
            else
              echo "❌ $stack"
              FAILED=1
            fi
            echo "::endgroup::"
          done
          exit $FAILED

  ansible-check:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    needs: [compose-validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible-core
          ansible-galaxy collection install community.docker

      - name: Syntax check all playbooks
        env:
          ANSIBLE_ROLES_PATH: ansible/roles
        run: |
          export ANSIBLE_CONFIG=$PWD/ansible/ansible.cfg
          for playbook in ansible/playbooks/*.yml; do
            echo -n "$(basename $playbook): "
            if ansible-playbook --syntax-check "$playbook" 2>&1; then
              echo "✅"
            else
              echo "❌"
              exit 1
            fi
          done

      - name: Inventory validation
        env:
          ANSIBLE_ROLES_PATH: ansible/roles
        run: |
          export ANSIBLE_CONFIG=$PWD/ansible/ansible.cfg
          ansible-inventory -i ansible/inventory/hosts.yml --list 2>&1 | python3 -c "
          import json, sys
          inv = json.load(sys.stdin)
          hosts = set()
          for key, val in inv.items():
            if isinstance(val, dict) and 'hosts' in val:
              h = val['hosts']
              if isinstance(h, dict):
                hosts.update(h.keys())
              elif isinstance(h, list):
                hosts.update(str(x) for x in h)
          assert 'localhost' in hosts, f'Missing localhost host in inventory. Found: {hosts}'
          print(f'✅ Inventory valid: {len(hosts)} host(s)')
          "

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: [compose-validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sL https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-amd64.tar.gz | \
            tar -xz -C /usr/local/bin trivy && trivy --version

      # Scan Dockerfiles for misconfigurations and vulnerabilities in base images
      - name: Scan Dockerfiles
        run: |
          FAILED=0
          for dockerfile in $(find stacks/ -name "*.Dockerfile" -o -name "Dockerfile"); do
            echo "::group::$dockerfile"
            if trivy fs --severity HIGH,CRITICAL --exit-code 1 "$dockerfile" 2>&1; then
              echo "✅ $dockerfile"
            else
              FAILED=$?
              echo "❌ $dockerfile"
            fi
            echo "::endgroup::"
          done
          exit $FAILED

      # Scan docker-compose files for misconfigurations
      - name: Scan compose files
        run: |
          FAILED=0
          for compose in stacks/*/docker-compose.yml; do
            stack=$(basename $(dirname "$compose"))
            echo "::group::$stack"
            if trivy config --severity HIGH,CRITICAL --exit-code 1 "$compose" 2>&1; then
              echo "✅ $stack"
            else
              FAILED=$?
              echo "❌ $stack"
            fi
            echo "::endgroup::"
          done
          exit $FAILED
