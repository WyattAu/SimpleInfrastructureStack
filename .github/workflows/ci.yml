---
name: CI Configuration Validation

# yamllint disable-line rule:truthy
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-and-lint:
    name: Validate, Lint, and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks on all files
        run: pre-commit run --all-files

      - name: Install Docker Compose Plugin
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-v2 || sudo apt-get install -y docker-compose-plugin || true
          # Fallback: install compose v1 if v2 not available
          docker-compose version || true

      - name: Aggregate .env.example Files for Validation
        run: |
          echo "Preparing a unified .env file for validation..."
          find . -name '.env.example' -exec cat {} + | sort -u > .env
          echo "AUTHENTIK_OUTPOST_TOKEN=placeholder_for_ci_check" >> .env

      - name: Validate All Docker Compose Files
        run: |
          for dir in $(find . -name 'docker-compose.yml' -exec dirname {} \;); do
            echo "Validating Docker Compose in directory: $dir"
            docker-compose -f "$dir/docker-compose.yml" --env-file ./.env config > /dev/null 2>&1 || \
            docker compose -f "$dir/docker-compose.yml" --env-file ./.env config > /dev/null 2>&1 || \
            { echo "::error::Validation failed for Docker Compose file in $dir"; exit 1; }
            echo "Validation successful for $dir"
          done

      - name: Verify All Stacks Have .env.example
        run: |
          echo "Checking that all stacks with docker-compose.yml also have .env.example..."
          FAILED=0
          for dir in $(find . -name 'docker-compose.yml' -exec dirname {} \;); do
            if [ ! -f "$dir/.env.example" ]; then
              echo "::warning::Missing .env.example in $dir"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq "1" ]; then
            echo "::error::Some stacks are missing .env.example files"
            exit 1
          fi
          echo "All stacks have .env.example files."

      - name: Verify No Unpinned Image Tags (except known exceptions)
        run: |
          echo "Checking for unpinned Docker image tags..."
          FAILED=0
          for f in $(find . -name 'docker-compose.yml'); do
            # Check for ':latest' image tags (exceptions: none allowed anymore)
            if grep -n 'image:.*:latest' "$f"; then
              echo "::error::Unpinned ':latest' tag found in $f"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq "1" ]; then
            echo "::error::Found unpinned image tags. All images must use specific version tags."
            exit 1
          fi
          echo "All Docker images are pinned to specific versions."

      - name: Verify security-headers Middleware is Defined
        run: |
          echo "Checking that security-headers middleware is defined in proxy stack..."
          if grep -q 'security-headers' proxy/docker-compose.yml; then
            echo "security-headers middleware found in proxy stack."
          else
            echo "::error::security-headers middleware not found in proxy/docker-compose.yml"
            exit 1
          fi

      - name: All Checks Passed
        run: echo "All infrastructure configuration files are valid and correctly formatted."

  deploy-to-machines:
    name: Deploy to All Machines
    runs-on: ubuntu-latest
    needs: validate-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        machine: ['TRUENAS']

    steps:
      - name: Trigger deployment for ${{ matrix.machine }}
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets[format('STACK_WEBHOOK_{0}', matrix.machine)] }}
        if: env.PORTAINER_WEBHOOK_URL != ''
        run: |
          echo "Triggering webhook for ${{ matrix.machine }}..."
          curl -s -X POST "$PORTAINER_WEBHOOK_URL"
