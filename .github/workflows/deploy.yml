---
name: Deploy

on:
  push:
    branches: ["main"]
  # Allow manual trigger for emergency deploys or re-deploys
  workflow_dispatch:
    inputs:
      skip_validate:
        description: "Skip validation (emergency only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Only one deploy at a time
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_validate != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq yamllint

      - name: Lint YAML
        run: yamllint -c .yamllint.yml stacks/*/docker-compose.yml ansible/ .sops.yaml

      - name: Validate compose files
        run: |
          for compose in stacks/*/docker-compose.yml; do
            docker compose -f "$compose" config --quiet 2>&1 || {
              echo "::error::Validation failed for $compose"
              exit 1
            }
          done

  deploy:
    name: Deploy to TrueNAS
    runs-on: ubuntu-latest
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SOPS, age, and Ansible
        run: |
          # SOPS
          curl -sSL https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64 \
            -o /usr/local/bin/sops && chmod +x /usr/local/bin/sops
          # age
          curl -sSL https://github.com/FiloSottile/age/releases/download/v1.2.0/age-v1.2.0-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin age
          # Ansible
          pip install ansible-core
          ansible-galaxy collection install community.docker

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TRUENAS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.TRUENAS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Configure age key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Deploy stacks
        run: |
          export ANSIBLE_CONFIG=ansible/ansible.cfg
          export SOPS_AGE_KEY="${{ secrets.SOPS_AGE_KEY }}"
          ansible-playbook ansible/playbooks/deploy.yml \
            -i ansible/inventory/hosts.yml \
            --extra-vars "sops_age_public_key=${{ secrets.SOPS_AGE_PUBLIC_KEY }}" \
            -v

      - name: Health check
        if: always()
        run: |
          export ANSIBLE_CONFIG=ansible/ansible.cfg
          ansible-playbook ansible/playbooks/health_check.yml \
            -i ansible/inventory/hosts.yml \
            -v
        continue-on-error: false

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  notify:
    name: Deploy Status
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment to TrueNAS completed successfully"
          elif [ "${{ needs.deploy.result }}" = "skipped" ]; then
            echo "⏭️ Deployment skipped"
          else
            echo "❌ Deployment to TrueNAS FAILED"
            exit 1
          fi
