---
name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Pre-deploy Validation
    uses: ./.github/workflows/validate.yml
    if: github.event_name == 'push'

  deploy:
    name: Trigger Webhook
    runs-on: ubuntu-latest
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    timeout-minutes: 5
    steps:
      - name: Trigger deployment webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          COMMIT="${{ github.sha }}"
          TIMESTAMP=$(date +%s)
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"

          # Build JSON payload
          PAYLOAD=$(jq -n \
            --arg commit "$COMMIT" \
            --arg ref "$REF" \
            --arg timestamp "$TIMESTAMP" \
            --arg event "$EVENT" \
            '{commit: $commit, ref: $ref, timestamp: $timestamp, event: $event}'
          )

          # Compute HMAC-SHA256 signature (same algorithm GitHub uses)
          SIGNATURE=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')

          echo "Triggering deploy for commit $COMMIT..."

          # POST to webhook with HMAC signature
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL/hooks/deploy" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Webhook accepted (HTTP $HTTP_CODE)"
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "❌ HMAC signature mismatch (HTTP 403)"
            exit 1
          else
            echo "❌ Webhook error (HTTP $HTTP_CODE)"
            exit 1
          fi
