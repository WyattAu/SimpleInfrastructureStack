---
# Infrastructure-wide variables
infra_domain: wyattau.com
infra_timezone: UTC
infra_puid: 1001
infra_pgid: 1001

# Paths on the TrueNAS server
infra_root: /mnt/pool_HDD_x2/infra
infra_repo_path: "{{ infra_root }}/stacks"
infra_base_path: "{{ infra_root }}/stacks/stacks"
infra_data_path: /mnt/pool_HDD_x2/tank/datasources/sis/appdata
infra_backup_path: /mnt/pool_HDD_x2/tank/datasources/sis/backups
infra_secrets_path: "{{ infra_repo_path }}/.secrets.tmp"
infra_log_path: /var/log

# Stack deployment order (respecting dependencies)
# Tunnel must be first — deploy webhook routes through it.
# If Traefik breaks, the tunnel must still deliver deploys.
stacks:
  - tunnel
  - proxy
  - iam
  - monitoring
  - operations
  - collaboration
  - storage
  - accounting
  - utility
  - backup
  - vaultwarden
  - rss
  - photos
  - documents
  - vpn
  - updater

# Containers with health checks that must pass after deploy
# Only containers WITH a Docker healthcheck defined in compose should be listed here.
health_check_containers:
  - proxy-well-known-server
  - proxy-oauth2-proxy
  - iam-postgres
  - iam-keycloak
  - operations-postgres-forgejo
  - operations-forgejo
  - monitoring-prometheus
  - monitoring-alertmanager
  - monitoring-grafana
  - monitoring-promtail
  - monitoring-kuma
  - monitoring-cadvisor
  - monitoring-node-exporter
  - monitoring-postgres-exporter
  - monitoring-redis-exporter
  - storage-ocis
  - storage-collabora
  - collaboration-synapse
  - collaboration-element
  - accounting-akaunting
  - accounting-mariadb-exporter
  - utility-homepage
  - vaultwarden-server
  - rss-postgres
  - rss-freshrss
  - photos-postgres
  - photos-valkey
  - photos-server
  - documents-postgres
  - documents-redis
  - documents-webserver
  - infra-tunnel
  - vpn-wireguard
  - operations-forgejo-runner

# Docker networks
docker_networks:
  - name: traefik_net
    driver: bridge
  - name: backend_net
    driver: bridge
