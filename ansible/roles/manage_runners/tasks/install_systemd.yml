---
# Install the systemd template unit for forgejo-runner.
# This is a template unit (@) so each runner gets its own instance
# via `systemctl start forgejo-runner@<name>`.

- name: Copy forgejo-runner systemd template
  ansible.builtin.template:
    src: forgejo-runner@.service.j2
    dest: /etc/systemd/system/forgejo-runner@.service
    owner: root
    group: root
    mode: "0644"
  notify: restart forgejo runners

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
