---
# Configure Keycloak realm SMTP server via admin API.
#
# Keycloak 26 does NOT auto-populate the realm's smtpServer from
# KC_SMTP_* environment variables. We must set it via admin API.
#
# Keycloak container has no curl, and kcadm.sh's update command silently
# ignores nested smtpServer fields. We use a temporary curl container
# on the backend_net Docker network to call the REST API directly.
#
# This task is idempotent: reads current smtpServer.host, only updates
# if it doesn't match SMTP_HOST from the decrypted secrets.

- name: Wait for Keycloak admin API to be reachable
  ansible.builtin.shell: |
    docker run --rm --network backend_net curlimages/curl:8.14.1 \
      -sf -o /dev/null -w "%{http_code}" \
      http://iam-keycloak:8080/realms/master/.well-known/openid-configuration \
      2>/dev/null
  register: kc_api_check
  until: kc_api_check.stdout == "200"
  retries: 30
  delay: 5
  changed_when: false
  when: "'iam' in stacks"

- name: Read current Keycloak realm SMTP host
  ansible.builtin.shell: |
    TOKEN=$(docker run --rm --network backend_net curlimages/curl:8.14.1 -s \
      -X POST "http://iam-keycloak:8080/realms/master/protocol/openid-connect/token" \
      -d "grant_type=password&client_id=admin-cli&username={{ KEYCLOAK_ADMIN_USERNAME | default('admin') }}&password={{ KEYCLOAK_ADMIN_PASSWORD }}" \
      | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")

    docker run --rm --network backend_net curlimages/curl:8.14.1 -s \
      -H "Authorization: Bearer $TOKEN" \
      "http://iam-keycloak:8080/admin/realms/company-realm" \
      | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('smtpServer',{}).get('host',''))"
  register: kc_smtp_host
  changed_when: false
  when: "'iam' in stacks"
  no_log: true

- name: Set Keycloak realm SMTP server via admin API
  ansible.builtin.shell: |
    TOKEN=$(docker run --rm --network backend_net curlimages/curl:8.14.1 -s \
      -X POST "http://iam-keycloak:8080/realms/master/protocol/openid-connect/token" \
      -d "grant_type=password&client_id=admin-cli&username={{ KEYCLOAK_ADMIN_USERNAME | default('admin') }}&password={{ KEYCLOAK_ADMIN_PASSWORD }}" \
      | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")

    # Get current realm config, inject SMTP, PUT it back
    docker run --rm --network backend_net curlimages/curl:8.14.1 -s \
      -H "Authorization: Bearer $TOKEN" \
      "http://iam-keycloak:8080/admin/realms/company-realm" \
      | python3 -c "
    import sys, json
    realm = json.load(sys.stdin)
    realm['smtpServer'] = {
        'host': '{{ SMTP_HOST }}',
        'port': '{{ SMTP_PORT }}',
        'auth': True,
        'user': '{{ SMTP_USERNAME }}',
        'password': '{{ SMTP_PASSWORD }}',
        'from': '{{ SMTP_FROM }}',
        'fromDisplayName': 'SIS Infrastructure',
        'ssl': False,
        'starttls': False
    }
    print(json.dumps(realm))
    " > /tmp/kc_realm_update.json

    docker run --rm --network backend_net -v /tmp/kc_realm_update.json:/tmp/realm.json:ro curlimages/curl:8.14.1 \
      -s -o /dev/null -w "%{http_code}" \
      -X PUT \
      -H "Authorization: Bearer $TOKEN" \
      -H "Content-Type: application/json" \
      -d @/tmp/realm.json \
      "http://iam-keycloak:8080/admin/realms/company-realm"

    rm -f /tmp/kc_realm_update.json
  register: kc_smtp_result
  when:
    - "'iam' in stacks"
    - kc_smtp_host.stdout | default('') != SMTP_HOST
  no_log: true

- name: Verify Keycloak SMTP configuration
  ansible.builtin.shell: |
    TOKEN=$(docker run --rm --network backend_net curlimages/curl:8.14.1 -s \
      -X POST "http://iam-keycloak:8080/realms/master/protocol/openid-connect/token" \
      -d "grant_type=password&client_id=admin-cli&username={{ KEYCLOAK_ADMIN_USERNAME | default('admin') }}&password={{ KEYCLOAK_ADMIN_PASSWORD }}" \
      | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")

    docker run --rm --network backend_net curlimages/curl:8.14.1 -s \
      -H "Authorization: Bearer $TOKEN" \
      "http://iam-keycloak:8080/admin/realms/company-realm" \
      | python3 -c "
    import sys, json
    d = json.load(sys.stdin)
    smtp = d.get('smtpServer', {})
    print(f\"host={smtp.get('host','')} port={smtp.get('port','')} from={smtp.get('from','')}\")
    "
  register: kc_smtp_verify
  changed_when: false
  when:
    - "'iam' in stacks"
    - kc_smtp_result is defined
