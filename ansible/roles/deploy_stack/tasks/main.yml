---
# Note: Compose validation is handled by CI (validate.yml workflow).
# We skip it here because docker compose config requires env vars that
# are only available via the decrypted secrets, not in the project dir.
#
# Uses the native `docker compose up` command instead of the Ansible
# docker_compose_v2 module. The Ansible module's "smart" mode has a bug
# where it does NOT detect env_file content changes (e.g., versions.env
# updated by Renovate), causing version updates to silently never take
# effect. The native `docker compose up` correctly compares the full
# resolved config (including env_files) against running containers and
# only recreates those with actual changes.
#
# pull: "missing" only pulls images not present locally. This avoids
# failing the entire deploy when a registry is temporarily unavailable
# or a tag doesn't exist (e.g., forgejo-runner rolling tags). When
# Renovate updates a version, the new tag won't be cached, so it
# will be pulled automatically.

- name: Sync Homepage config from git to data directory
  ansible.builtin.include_tasks: sync_homepage.yml
  when: "'utility' in stacks"

- name: Deploy stack
  ansible.builtin.shell:
    cmd: >
      docker compose
      --env-file {{ infra_base_path }}/{{ item }}/.env
      --env-file {{ infra_secrets_path }}/{{ item }}.env
      --env-file {{ infra_repo_path }}/stacks/{{ item }}/versions.env
      up --detach --pull missing --remove-orphans
    chdir: "{{ infra_base_path }}/{{ item }}"
  loop: "{{ stacks }}"
  register: deploy_result
  changed_when: "'Recreated' in (deploy_result.stdout | default(''))"
  failed_when: deploy_result.rc != 0
  notify: Display deploy results

- name: Canary health check per stack
  ansible.builtin.shell: "sleep 5 && docker compose ps 2>/dev/null | grep -iE 'Exit|restart|dead' || true"
  args:
    chdir: "{{ infra_base_path }}/{{ item }}"
  loop: "{{ stacks }}"
  register: canary_result
  changed_when: false
  failed_when: false

- name: Report canary warnings
  ansible.builtin.debug:
    msg: "CANARY_WARNING: {{ item.item }} may have issues: {{ item.stdout }}"
  loop: "{{ canary_result.results }}"
  when: item.stdout | default('') | trim | length > 0

- name: Post-deploy smoke test
  ansible.builtin.shell: |
    FAIL=0
    for endpoint in "https://forgejo.wyattau.com/" "https://homepage.wyattau.com/" "https://auth.wyattau.com/realms/company-realm/.well-known/openid-configuration"; do
      CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 "$endpoint" 2>/dev/null || echo "000")
      if [ "$CODE" = "000" ] || [ "$CODE" -ge 500 ]; then
        echo "FAIL: $endpoint -> $CODE"
        FAIL=$((FAIL+1))
      else
        echo "OK: $endpoint -> $CODE"
      fi
    done
    echo "Smoke test: $FAIL failures"
    exit 0
  register: smoke_result
  changed_when: false
  failed_when: false
  # Non-blocking: reports status but doesn't fail the deploy.
  # Run via TrueNAS host network (not container) for external URL access.

- name: Fix tunnel credentials.json ownership
  ansible.builtin.file:
    path: "{{ infra_base_path }}/tunnel/credentials.json"
    owner: "65532"
    group: "65532"
    mode: "0400"
  when: "'tunnel' in stacks"
  ignore_errors: true
  # Cloudflared 2026.3.0 runs as non-root (UID 65532).
  # The credentials.json bind-mount must match or the tunnel fails to start.
  # ZFS may reject mode changes (EPERM) — ownership is what matters.

# Homepage traefik_net reconnect no longer needed — homepage now uses
# `networks: [traefik_net]` with explicit `dns: [1.1.1.1, 8.8.8.8]` in
# docker-compose.yml, replacing the old network_mode: bridge workaround.

- name: Template alertmanager.yml with NTFY_TOPIC from secrets
  ansible.builtin.shell: |
    set -a
    source {{ stack_dir }}/.env 2>/dev/null || true
    source {{ stack_dir }}/secrets.env 2>/dev/null || true
    envsubst < {{ stack_dir }}/alertmanager/alertmanager.yml.template > {{ stack_dir }}/alertmanager/alertmanager.yml
  args:
    creates: "{{ stack_dir }}/alertmanager/alertmanager.yml.template"
  when: "'monitoring' in stacks"
  ignore_errors: true

- name: Record deploy timestamp
  ansible.builtin.copy:
    content: "{{ ansible_date_time.iso8601 }}"
    dest: "/var/run/infra-deploy-timestamp"
    mode: '0644'
  changed_when: false
  # Records deploy time for monitoring/alerting.
