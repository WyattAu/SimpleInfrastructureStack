---
# Configure Matrix Hookshot GitHub bridge.
#
# Hookshot v7.3.2 compatibility notes:
#   - The `-r` CLI flag does NOT generate registrations.
#   - passkey.pem path is HARDCODED to ./passkey.pem relative to the
#     working directory (/bin/matrix-hookshot/). The passkeyPath config
#     option is IGNORED. Workaround: docker cp after container start.
#   - queue.monolithic is deprecated and causes Redis errors — omit.
#   - GitHub auth uses `id` (not `appId`), `privateKeyFile` (not
#     `privateKeyPath`). Webhook secret goes under `github.webhook.secret`.
#   - Synapse only mounts its own data directory. Registration must be
#     copied INTO Synapse's data dir for it to see the file.
#
# NOTE: openssl is NOT available inside the webhook container.
# Passkey is pre-generated and stored as base64 in SOPS secrets.
# Registration tokens use Python secrets module (available in Ansible).
#
# Steps:
# 1. Ensure data directories exist
# 2. Write GitHub App private key (base64-decoded from SOPS secret)
# 3. Write passkey.pem (base64-decoded from SOPS secret)
# 4. Generate registration.yml manually with random tokens (if missing)
# 5. Copy registration into Synapse data volume (separate mount)
# 6. Add app_service_config_files to Synapse homeserver.yaml
# 7. Restart Synapse if config changed
# 8. Copy passkey into Hookshot container (hardcoded path workaround)
# 9. Restart Hookshot

- name: Ensure Hookshot data directory exists
  ansible.builtin.shell: mkdir -p "{{ infra_data_path }}/collaboration/hookshot"
  when: "'collaboration' in stacks"
  changed_when: false

- name: Check if Hookshot private key exists
  ansible.builtin.stat:
    path: "{{ infra_data_path }}/collaboration/hookshot/github-app-private-key.pem"
  register: _hookshot_key
  when: "'collaboration' in stacks"

- name: Write GitHub App private key (base64-decoded from SOPS)
  ansible.builtin.shell: |
    echo "{{ HOOKSHOT_GITHUB_PRIVATE_KEY_B64 }}" | base64 -d > "{{ infra_data_path }}/collaboration/hookshot/github-app-private-key.pem"
    chmod 400 "{{ infra_data_path }}/collaboration/hookshot/github-app-private-key.pem"
  when:
    - "'collaboration' in stacks"
    - not _hookshot_key.stat.exists
  no_log: true

- name: Check if passkey.pem exists
  ansible.builtin.stat:
    path: "{{ infra_data_path }}/collaboration/hookshot/passkey.pem"
  register: _hookshot_passkey
  when: "'collaboration' in stacks"

- name: Write Hookshot passkey.pem (base64-decoded from SOPS)
  ansible.builtin.shell: |
    echo "{{ HOOKSHOT_PASSKEY_B64 }}" | base64 -d > "{{ infra_data_path }}/collaboration/hookshot/passkey.pem"
    chmod 400 "{{ infra_data_path }}/collaboration/hookshot/passkey.pem"
  when:
    - "'collaboration' in stacks"
    - not _hookshot_passkey.stat.exists
  no_log: true

- name: Check if registration.yml exists
  ansible.builtin.stat:
    path: "{{ infra_data_path }}/collaboration/hookshot/registration.yml"
  register: _hookshot_registration
  when: "'collaboration' in stacks"

- name: Generate Hookshot registration.yml (CLI -r broken in v7.3.2)
  ansible.builtin.shell: |
    HS_TOKEN=$(python3 -c "import secrets; print(secrets.token_hex(32))")
    AS_TOKEN=$(python3 -c "import secrets; print(secrets.token_hex(32))")
    printf '%s\n' \
      '# Manual registration for matrix-hookshot' \
      '# Generated by Ansible deploy' \
      'id: hookshot-github' \
      'url: http://collaboration-hookshot:8080' \
      "as_token: ${AS_TOKEN}" \
      "hs_token: ${HS_TOKEN}" \
      'sender_localpart: hookshot-github' \
      'rate_limited: false' \
      'de.sorunome.msc2409_push_ephemeral: true' \
      'namespaces:' \
      '  users:' \
      '    - exclusive: true' \
      "      regex: '@_github_.*'" \
      '  aliases:' \
      '    - exclusive: true' \
      "      regex: '#_github_.*'" \
      '  rooms: []' \
      > "{{ infra_data_path }}/collaboration/hookshot/registration.yml"
  when:
    - "'collaboration' in stacks"
    - not _hookshot_registration.stat.exists

- name: Ensure Synapse hookshot directory exists
  ansible.builtin.shell: mkdir -p "{{ infra_data_path }}/collaboration/synapse/hookshot"
  when: "'collaboration' in stacks"
  changed_when: false

- name: Copy registration into Synapse data volume
  ansible.builtin.shell: |
    cp "{{ infra_data_path }}/collaboration/hookshot/registration.yml" \
       "{{ infra_data_path }}/collaboration/synapse/hookshot/registration.yml"
  when: "'collaboration' in stacks"

- name: Check if Synapse has Hookshot app_service configured
  ansible.builtin.shell: |
    grep -q "hookshot" "{{ infra_data_path }}/collaboration/synapse/homeserver.yaml" 2>/dev/null || echo "NOT_FOUND"
  register: _synapse_hookshot_check
  changed_when: false
  when: "'collaboration' in stacks"

- name: Add Hookshot registration to Synapse app_service_config_files
  ansible.builtin.shell: |
    printf '\napp_service_config_files:\n  - "/data/hookshot/registration.yml"\n' >> "{{ infra_data_path }}/collaboration/synapse/homeserver.yaml"
  when:
    - "'collaboration' in stacks"
    - "'NOT_FOUND' in _synapse_hookshot_check.stdout"

- name: Restart Synapse to load Hookshot bridge
  ansible.builtin.shell: |
    docker restart collaboration-synapse
  when:
    - "'collaboration' in stacks"
    - "'NOT_FOUND' in _synapse_hookshot_check.stdout"

- name: Wait for Synapse to be ready after restart
  ansible.builtin.shell: |
    docker exec collaboration-synapse curl -sf http://localhost:8008/_matrix/client/versions > /dev/null 2>&1
  register: _synapse_ready
  until: _synapse_ready.rc == 0
  retries: 30
  delay: 5
  changed_when: false
  when:
    - "'collaboration' in stacks"
    - "'NOT_FOUND' in _synapse_hookshot_check.stdout"

- name: Copy passkey.pem into Hookshot container (hardcoded path workaround)
  ansible.builtin.shell: |
    docker cp "{{ infra_data_path }}/collaboration/hookshot/passkey.pem" \
      collaboration-hookshot:/bin/matrix-hookshot/passkey.pem
  when: "'collaboration' in stacks"
  ignore_errors: true

- name: Restart Hookshot to load passkey and registration
  ansible.builtin.shell: |
    docker restart collaboration-hookshot
  when: "'collaboration' in stacks"
  ignore_errors: true
