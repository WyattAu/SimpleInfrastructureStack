---
# Prepare role — replaces all bash logic from deploy.sh.
#
# This role runs in three phases:
#   1. git_sync         — Record SHA, compute changed files via git diff
#   2. decrypt          — SOPS decrypt all .env.encrypted files
#   3. expand_templates — Jinja2 template expansion (called from site.yml AFTER vars are loaded)
#   4. detect_bind_mount_changes — Identify containers needing restart
#
# IMPORTANT: expand_templates.yml must NOT be included in this main.yml.
# It must be called from site.yml AFTER include_vars loads the decrypted
# secret files. Otherwise Jinja2 won't have access to the secret values.

- name: Git sync — fetch and reset to origin/main
  ansible.builtin.include_tasks: git_sync.yml

- name: SOPS decrypt — decrypt secret files
  ansible.builtin.include_tasks: decrypt.yml

# Ensure Docker networks exist before any compose up references them.
# docker network create is idempotent (no-op if already exists).
- name: Ensure Docker networks exist
  ansible.builtin.shell: |
    for net in traefik_net backend_net data_net; do
      docker network inspect "$net" >/dev/null 2>&1 || docker network create "$net"
    done
  become: true
  changed_when: false

# NOTE: Template expansion and bind-mount detection are included
# directly from site.yml to control ordering relative to include_vars.
