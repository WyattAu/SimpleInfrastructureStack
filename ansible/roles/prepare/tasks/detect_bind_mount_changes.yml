---
# 4. Bind-mount change detection — identify containers that need restart.
# git reset --hard creates new inodes, but Docker bind mounts still reference
# old inodes. We dynamically cross-reference changed files with container
# mount sources using docker inspect.
#
# changed_files is populated by git_sync.yml using git diff between the
# previous deploy SHA (stored in /var/run/infra-deploy-sha) and the
# current HEAD. The PRE_DEPLOY_SHA env var from deploy.sh ensures we
# have the SHA before git reset --hard.

- name: Get bind-mount info for all running containers
  community.docker.docker_container_info:
    name: "{{ item }}"
  loop: "{{ health_check_containers }}"
  register: container_info
  ignore_errors: true

- name: Build map of mount source paths to container names
  ansible.builtin.set_fact:
    mount_source_to_containers: >-
      {%- set result = {} -%}
      {%- for ci in container_info.results -%}
        {%- if ci.exists | default(false) -%}
          {%- for mount in ci.container.Mounts -%}
            {%- if mount.Type == 'bind' -%}
              {%- set _ = result.__setitem__(mount.Source, result.get(mount.Source, []) + [ci.container.Name]) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}

- name: Match changed files to containers needing restart
  ansible.builtin.set_fact:
    containers_to_restart: >-
      {%- set containers = [] -%}
      {%- for changed_file in changed_files | default([]) -%}
        {%- set full_path = infra_repo_path ~ '/' ~ changed_file -%}
        {%- for mount_src, names in mount_source_to_containers.items() -%}
          {%- if full_path == mount_src or full_path.startswith(mount_src ~ '/') -%}
            {%- for name in names -%}
              {%- if name not in containers -%}
                {%- set _ = containers.append(name) -%}
              {%- endif -%}
            {%- endfor -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}
      {{ containers | unique | list }}

- name: Display containers to restart
  ansible.builtin.debug:
    msg: >-
      Restarting {{ containers_to_restart | length }} container(s) for bind-mount changes:
      {{ containers_to_restart | join(', ') }}
  when: containers_to_restart | default([]) | length > 0

- name: Notify bind-mount restart handler
  ansible.builtin.debug:
    msg: "Scheduling bind-mount container restarts"
  changed_when: containers_to_restart | default([]) | length > 0
  notify: Restart containers with changed bind-mounted config
