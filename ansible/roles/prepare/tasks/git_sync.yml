---
# 1. Git sync — fetch latest and reset to origin/main.
# We track changed files via git diff to handle bind-mount inode breakage:
# git reset --hard replaces files atomically (new inode), but Docker bind
# mounts in running containers still reference the old inode. After deploy,
# containers whose bind-mounted config files changed must be restarted.

- name: Record current HEAD before update
  ansible.builtin.shell: git rev-parse HEAD
  args:
    chdir: "{{ infra_repo_path }}"
  register: pre_deploy_sha
  changed_when: false

- name: Display pre-deploy state
  ansible.builtin.debug:
    msg: "Previous HEAD: {{ pre_deploy_sha.stdout }}"

- name: Fetch latest from origin
  ansible.builtin.shell: git fetch origin {{ deploy_branch | default('main') }}
  args:
    chdir: "{{ infra_repo_path }}"
  register: git_fetch
  changed_when: "'Fetching' in git_fetch.stderr or git_fetch.rc == 0"

- name: Record target SHA
  ansible.builtin.shell: git rev-parse "origin/{{ deploy_branch | default('main') }}"
  args:
    chdir: "{{ infra_repo_path }}"
  register: origin_sha
  changed_when: false

- name: Display target SHA
  ansible.builtin.debug:
    msg: "Origin {{ deploy_branch | default('main') }}: {{ origin_sha.stdout }}"

- name: Detect changed files between HEAD and origin
  ansible.builtin.shell: >
    git diff --name-only {{ pre_deploy_sha.stdout }} {{ origin_sha.stdout }} 2>/dev/null || true
  args:
    chdir: "{{ infra_repo_path }}"
  register: changed_files_raw
  changed_when: false

- name: Set changed files fact
  ansible.builtin.set_fact:
    changed_files: "{{ changed_files_raw.stdout_lines if changed_files_raw.stdout else [] }}"

- name: Display changed files
  ansible.builtin.debug:
    msg: >-
      Changed files ({{ changed_files | length }}):
      {{ changed_files | join(', ') if changed_files else 'none' }}

- name: Reset to origin/main
  ansible.builtin.shell: git reset --hard "origin/{{ deploy_branch | default('main') }}"
  args:
    chdir: "{{ infra_repo_path }}"
  register: git_reset
  changed_when: "'HEAD is now' in git_reset.stdout"

- name: Display current commit
  ansible.builtin.shell: git log --oneline -1
  args:
    chdir: "{{ infra_repo_path }}"
  register: current_commit
  changed_when: false

- name: Show deployed commit
  ansible.builtin.debug:
    msg: "Code at: {{ current_commit.stdout }}"
