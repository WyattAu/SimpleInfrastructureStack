---
# 1. Git state — record current SHA and detect changed files.
#
# IMPORTANT: The actual git pull happens in deploy.sh BEFORE ansible-playbook
# runs, because Ansible parses site.yml before executing any tasks. A git
# sync inside the playbook cannot update site.yml itself.
#
# This task file only:
#   - Records the current HEAD for rollback (pre_deploy_sha)
#   - Displays deploy state for logging
#
# NOTE: changed_files detection for bind-mount restart is handled by
# detect_bind_mount_changes.yml using git diff against the previous SHA
# stored in /var/run/infra-deploy-sha.

- name: Display current commit
  ansible.builtin.shell: git log --oneline -1
  args:
    chdir: "{{ infra_repo_path }}"
  register: current_commit
  changed_when: false

- name: Record current HEAD for potential rollback
  ansible.builtin.set_fact:
    pre_deploy_sha: "{{ current_commit.stdout | regex_search('^[0-9a-f]+') }}"

- name: Display deploy state
  ansible.builtin.debug:
    msg: "Deploying from: {{ current_commit.stdout }}"
