---
- name: Ensure secrets directory exists
  ansible.builtin.file:
    path: "{{ infra_secrets_path }}"
    state: directory
    mode: "0700"

- name: Check if sops is installed
  ansible.builtin.command: which sops
  register: sops_check
  changed_when: false
  failed_when: false

- name: Fail if sops not installed
  ansible.builtin.fail:
    msg: "sops is not installed. Install it on the TrueNAS host."
  when: sops_check.rc != 0

- name: Check if age key is available
  ansible.builtin.stat:
    path: "{{ sops_age_key_path }}"
  register: age_key_stat

- name: Fail if age key not found
  ansible.builtin.fail:
    msg: "Age key not found at {{ sops_age_key_path }}. Mount your age keys."
  when: not age_key_stat.stat.exists

- name: Decrypt secrets directly to secrets directory
  ansible.builtin.shell: |
    sops --decrypt --input-type dotenv --output-type dotenv \
      "{{ infra_repo_path }}/secrets/{{ item }}.env.encrypted" \
      > "{{ infra_secrets_path }}/{{ item }}.env"
    chmod 600 "{{ infra_secrets_path }}/{{ item }}.env"
  loop: "{{ stacks }}"
  no_log: true
