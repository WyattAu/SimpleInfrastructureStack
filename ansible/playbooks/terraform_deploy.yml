---
# Terraform infrastructure deployment
# Runs terraform init + plan + apply as part of the deploy pipeline.
#
# Prerequisites:
#   - Phase 1a (prepare): git sync has pulled latest .tf files
#   - Phase 1b (include_vars): SOPS secrets are loaded as Ansible variables
#
# Secret handling:
#   - Secrets are passed via Ansible `environment` (never logged)
#   - Terraform variables have `sensitive = true` (masked in plan output)
#
# Exit codes for plan -detailed-exitcode:
#   0 = no changes
#   1 = error
#   2 = changes detected

- name: Verify Terraform binary exists
  ansible.builtin.stat:
    path: "{{ terraform_bin_path }}"
  register: tf_bin_check

- name: Verify Terraform directory exists
  ansible.builtin.stat:
    path: "{{ infra_repo_path }}/terraform"
  register: tf_dir_check

- name: Skip Terraform (binary or directory not found)
  ansible.builtin.debug:
    msg: >-
      Skipping Terraform deployment:
      binary={{ terraform_bin_path }} exists={{ tf_bin_check.stat.exists | default(false) }},
      dir={{ infra_repo_path }}/terraform exists={{ tf_dir_check.stat.exists | default(false) }}
  when: not (tf_bin_check.stat.exists | default(false)) or not (tf_dir_check.stat.exists | default(false))

- name: Terraform deployment block
  block:
    # --- Init (idempotent — fast if nothing changed) ---
    - name: Initialize Terraform providers
      ansible.builtin.shell: >
        {{ terraform_bin_path }} init -input=false -no-color
      args:
        chdir: "{{ infra_repo_path }}/terraform"
      register: tf_init
      changed_when: "'Downloading' in tf_init.stdout or 'Installing' in tf_init.stdout"

    - name: Terraform init result
      ansible.builtin.debug:
        msg: "{{ tf_init.stdout_lines[-3:] | default([]) }}"

    # --- Read Forgejo token from file (separate from SOPS secrets) ---
    - name: Read Forgejo API token
      ansible.builtin.slurp:
        src: "{{ infra_repo_path }}/.forgejo_token"
      register: forgejo_token_file
      no_log: true
      ignore_errors: true

    - name: Set Forgejo token fact
      ansible.builtin.set_fact:
        _forgejo_token: >-
          {{ forgejo_token_file.content | b64decode | default('placeholder', true) }}
      no_log: true

    # --- Plan ---
    - name: Run Terraform plan
      ansible.builtin.shell: >
        {{ terraform_bin_path }} plan
        -input=false -no-color -detailed-exitcode
      args:
        chdir: "{{ infra_repo_path }}/terraform"
      environment:
        TF_VAR_cf_api_token: "{{ CF_API_TOKEN }}"
        TF_VAR_kc_admin_password: "{{ KEYCLOAK_ADMIN_PASSWORD }}"
        TF_VAR_kc_smtp_password: "{{ SMTP_PASSWORD }}"
        TF_VAR_kc_oauth2_proxy_secret: "{{ OAUTH2_PROXY_CLIENT_SECRET }}"
        TF_VAR_kc_grafana_secret: "{{ GRAFANA_OIDC_CLIENT_SECRET }}"
        TF_VAR_kc_forgejo_secret: "{{ FORGEJO_KEYCLOAK_CLIENT_SECRET }}"
        TF_VAR_forgejo_token: "{{ _forgejo_token }}"
      register: tf_plan
      # rc 0 = no changes, rc 2 = changes detected, rc 1 = error
      failed_when: tf_plan.rc == 1
      changed_when: tf_plan.rc == 2

    # --- Plan output summary ---
    - name: Display Terraform plan summary
      ansible.builtin.debug:
        msg: >-
          Terraform plan: {{ 'changes detected' if tf_plan.rc == 2 else 'no changes' }}
          ({{ tf_plan.stdout_lines | length }} lines)
      when: tf_plan.rc in [0, 2]

    - name: Display Terraform plan details (changes detected)
      ansible.builtin.debug:
        msg: "{{ tf_plan.stdout_lines }}"
      when: tf_plan.rc == 2

    # --- Apply (only when plan shows changes) ---
    - name: Apply Terraform changes
      ansible.builtin.shell: >
        {{ terraform_bin_path }} apply
        -auto-approve -input=false -no-color
      args:
        chdir: "{{ infra_repo_path }}/terraform"
      environment:
        TF_VAR_cf_api_token: "{{ CF_API_TOKEN }}"
        TF_VAR_kc_admin_password: "{{ KEYCLOAK_ADMIN_PASSWORD }}"
        TF_VAR_kc_smtp_password: "{{ SMTP_PASSWORD }}"
        TF_VAR_kc_oauth2_proxy_secret: "{{ OAUTH2_PROXY_CLIENT_SECRET }}"
        TF_VAR_kc_grafana_secret: "{{ GRAFANA_OIDC_CLIENT_SECRET }}"
        TF_VAR_kc_forgejo_secret: "{{ FORGEJO_KEYCLOAK_CLIENT_SECRET }}"
        TF_VAR_forgejo_token: "{{ _forgejo_token }}"
      register: tf_apply
      changed_when: "'Apply complete' in tf_apply.stdout"
      when: tf_plan.rc == 2

    - name: Display Terraform apply result
      ansible.builtin.debug:
        msg: "{{ tf_apply.stdout_lines[-5:] | default(['No apply needed']) }}"
      when: tf_apply is defined and tf_apply.changed

    - name: Terraform deployment complete
      ansible.builtin.debug:
        msg: >-
          Terraform: {{ 'applied changes' if (tf_apply is defined and tf_apply.changed) else 'no changes to apply' }}

  when:
    - tf_bin_check.stat.exists | default(false)
    - tf_dir_check.stat.exists | default(false)
