---
# site.yml — Single entrypoint for infrastructure deployment.
# Replaces deploy.sh as the orchestrator. The webhook calls this playbook
# directly via: ansible-playbook ansible/playbooks/site.yml
#
# Flow:
#   prepare       → git sync, SOPS decrypt
#   include_vars  → load decrypted secrets as Ansible variables
#   expand        → Jinja2 template expansion (needs vars loaded first)
#   detect        → identify bind-mount changes (needs changed_files)
#   deploy        → docker compose up (9 stacks)
#   handler       → restart containers with changed bind-mounted configs
#   health        → poll all containers until healthy
#   rescue        → rollback to previous commit and redeploy
#   always        → clean up decrypted secrets from disk

- name: Deploy infrastructure
  hosts: truenas
  become: true

  vars:
    prepare_role_path: "{{ playbook_dir }}/../roles/prepare/tasks"

  pre_tasks:
    - name: Display deployment info
      ansible.builtin.debug:
        msg: "Deploying {{ stacks | length }} stacks to {{ inventory_hostname }}"

  tasks:
    - name: Run deployment pipeline
      block:
        # Phase 1a: Git sync + SOPS decrypt (prepare role)
        - name: Prepare (git sync, decrypt)
          ansible.builtin.include_role:
            name: prepare

        # Phase 1b: Load decrypted secret files as Ansible variables.
        # Must happen AFTER prepare decrypts the files but BEFORE
        # template expansion so Jinja2 has access to secret values.
        #
        # IMPORTANT: include_vars only supports YAML/JSON, NOT dotenv format.
        # The SOPS-decrypted files are in dotenv format (KEY='value'), so we
        # convert them to YAML via Python, then include_vars loads them.
        # Each key becomes a top-level play var, accessible by templates as
        # {{ NTFY_TOPIC }}, {{ GRAFANA_ADMIN_PASSWORD }}, etc.
        - name: Find decrypted secret files
          ansible.builtin.find:
            paths: "{{ infra_secrets_path }}"
            patterns: ["*.env"]
          register: secret_vars_files
          no_log: true

        - name: Convert dotenv files to YAML for Ansible consumption
          ansible.builtin.shell: |
            SECRETS_PATH="{{ infra_secrets_path }}"
            VARS_FILE="{{ infra_secrets_path }}/_vars.yml"
            python3 - "$SECRETS_PATH" "$VARS_FILE" << 'PYEOF'
            import glob, yaml, sys

            secrets_path = sys.argv[1]
            vars_file = sys.argv[2]

            result = {}
            for fpath in sorted(glob.glob(f'{secrets_path}/*.env')):
                with open(fpath) as f:
                    for line in f:
                        line = line.strip()
                        if not line or line.startswith('#'):
                            continue
                        if '=' not in line:
                            continue
                        key, _, value = line.partition('=')
                        key = key.strip()
                        value = value.strip()
                        # Strip surrounding quotes (single or double)
                        if len(value) >= 2 and value[0] == value[-1] and value[0] in ("'", '"'):
                            value = value[1:-1]
                        result[key] = value
            with open(vars_file, 'w') as f:
                yaml.dump(result, f, default_flow_style=False)
            print(f'Wrote {len(result)} variables')
            PYEOF
          args:
            chdir: "{{ infra_repo_path }}"
          register: dotenv_convert
          when: secret_vars_files.matched > 0
          changed_when: false

        - name: Load dotenv variables into play scope
          ansible.builtin.include_vars:
            file: "{{ infra_secrets_path }}/_vars.yml"
          when: secret_vars_files.matched > 0
          no_log: true

        - name: Report loaded variables
          ansible.builtin.debug:
            msg: >-
              Loaded {{ secret_vars_files.matched | default(0) }} dotenv files
              ({{ dotenv_convert.stdout_lines | default([]) | last | default('') }})

        # Phase 1c: Expand templates (needs vars from 1b)
        - name: Expand templates (Jinja2)
          ansible.builtin.include_tasks: "{{ prepare_role_path }}/expand_templates.yml"

        # Phase 1d: Detect bind-mount changes (needs changed_files from prepare)
        - name: Detect bind-mount changes
          ansible.builtin.include_tasks: "{{ prepare_role_path }}/detect_bind_mount_changes.yml"

        # Phase 2: Deploy stacks via Docker Compose
        - name: Deploy stacks
          ansible.builtin.include_role:
            name: deploy_stack

        # Phase 3: Restart containers with changed bind-mounted config files.
        - name: Flush bind-mount restart handler
          ansible.builtin.meta: flush_handlers

        # Brief pause for containers to stabilize
        - name: Wait for containers to stabilize
          ansible.builtin.pause:
            seconds: 5

        # Phase 4: Health check
        - name: Run health checks
          ansible.builtin.include_role:
            name: health_check

        - name: Deployment succeeded
          ansible.builtin.debug:
            msg: "=== DEPLOY COMPLETED SUCCESSFULLY ==="

        - name: Notify deploy success
          ansible.builtin.uri:
            url: "https://ntfy.sh/{{ NTFY_TOPIC | default('') }}"
            method: POST
            body: "✅ Deploy succeeded ({{ pre_deploy_sha.stdout[:7] | default('unknown') }} → {{ deploy_sha.stdout[:7] | default('unknown') }})"
            status_code: [200, 201]
          ignore_errors: true
          when: NTFY_TOPIC is defined
          vars:
            deploy_sha: "{{ lookup('pipe', 'git -C ' + infra_repo_path + ' rev-parse HEAD') }}"

      rescue:
        - name: Deployment failed
          ansible.builtin.debug:
            msg: >-
              === DEPLOY FAILED ===
              Rolling back to {{ pre_deploy_sha.stdout | default('unknown') }}...

        - name: Notify deploy failure
          ansible.builtin.uri:
            url: "https://ntfy.sh/{{ NTFY_TOPIC | default('') }}-critical"
            method: POST
            body: "🚨 Deploy FAILED — rolling back to {{ pre_deploy_sha.stdout[:7] | default('unknown') }}"
            headers:
              Priority: high
              Tags: warning
            status_code: [200, 201]
          ignore_errors: true
          when: NTFY_TOPIC is defined

        - name: Roll back git to previous commit
          ansible.builtin.shell: git reset --hard {{ pre_deploy_sha.stdout }}
          args:
            chdir: "{{ infra_repo_path }}"
          when: pre_deploy_sha.stdout is defined
          ignore_errors: true

        - name: Re-deploy from rollback commit
          ansible.builtin.include_role:
            name: deploy_stack
          when: pre_deploy_sha.stdout is defined
          ignore_errors: true

        - name: Rollback complete
          ansible.builtin.debug:
            msg: "Rollback complete"

  post_tasks:
    - name: Remove all decrypted secrets (entire .secrets.tmp contents)
      ansible.builtin.shell: rm -rf "{{ infra_secrets_path }}"/*
      no_log: true

    - name: Confirm secrets cleanup
      ansible.builtin.debug:
        msg: "Cleaned up decrypted secrets from {{ infra_secrets_path }}"
