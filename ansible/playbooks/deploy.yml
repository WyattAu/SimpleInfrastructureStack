---
- name: Deploy infrastructure stacks
  hosts: truenas
  become: true
  pre_tasks:
    - name: Display deployment info
      ansible.builtin.debug:
        msg: "Deploying {{ stacks | length }} stacks to {{ inventory_hostname }}"

  roles:
    - role: deploy_stack
    - role: health_check

  post_tasks:
    - name: Deployment complete
      ansible.builtin.debug:
        msg: "All stacks deployed and health-checked successfully"
