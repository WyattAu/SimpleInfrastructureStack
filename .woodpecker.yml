---
# ===================================================================
# SimpleInfrastructureStack - Woodpecker CI Pipeline
# ===================================================================
# Runs on push and PR to main. Validates infrastructure configs.
#
# CI runs on the Forgejo runner (internal Docker network).
# No secrets needed — only linting and validation.

when:
  - event: [push, pull_request]

steps:
  - name: validate-docker-compose
    image: docker/compose:2.32.3
    commands:
      - |
        echo "=== Validating all docker-compose files ==="
        FAILED=0
        for f in $(find stacks -name 'docker-compose.yml' -o -name 'docker-compose.yaml'); do
          echo "--- Validating $f ---"
          docker compose -f "$f" config --quiet 2>&1 || { echo "FAIL: $f"; FAILED=$((FAILED+1)); }
        done
        if [ "$FAILED" -gt 0 ]; then
          echo "ERROR: $FAILED docker-compose files failed validation"
          exit 1
        fi
        echo "=== All docker-compose files valid ==="

  - name: lint-yaml
    image: pipelinecomponents/yamllint:1.37.1
    commands:
      - |
        echo "=== Linting YAML files ==="
        yamllint -c .yamllint.yml stacks/ ansible/ 2>&1 || {
          # yamllint returns exit code 1 for lint failures, 2 for usage errors
          EXIT=$?
          if [ "$EXIT" -ne 1 ]; then
            echo "ERROR: yamllint configuration or usage error"
            exit 1
          fi
        }

  - name: check-prettier
    image: node:22-bookworm-slim
    commands:
      - npm install -g prettier@3.1.0 2>/dev/null
      - |
        echo "=== Checking formatting ==="
        prettier --check '*.yml' '*.yaml' '*.json' 2>/dev/null || {
          echo "NOTE: Some files may need formatting (non-blocking)"
        }

  - name: check-ansible-syntax
    image: alpine:3.21
    commands:
      - |
        echo "=== Checking Ansible playbook syntax ==="
        apk add --no-cache ansible-core >/dev/null 2>&1
        FAILED=0
        for f in $(find ansible/playbooks -name '*.yml' 2>/dev/null); do
          echo "--- Checking $f ---"
          ansible-playbook --syntax-check "$f" 2>&1 || { echo "FAIL: $f"; FAILED=$((FAILED+1)); }
        done
        if [ "$FAILED" -gt 0 ]; then
          echo "ERROR: $FAILED Ansible playbooks failed syntax check"
          exit 1
        fi
        echo "=== All Ansible playbooks valid ==="
