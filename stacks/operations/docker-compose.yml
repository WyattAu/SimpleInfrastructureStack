services:
  postgres-forgejo:
    image: ghcr.io/wyattau/evergreenimageregistry/postgres:latest
    container_name: operations-postgres-forgejo
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    volumes:
    - ${DATA_BASE_PATH}/operations/postgres-forgejo:/var/lib/postgresql/data
    environment:
    - POSTGRES_DB=${POSTGRES_DB_FORGEJO}
    - POSTGRES_USER=${POSTGRES_USER_FORGEJO}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_FORGEJO}
    - POSTGRES_INITDB_ARGS=-c max_connections=30
    networks:
    - data_net
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER_FORGEJO} -d ${POSTGRES_DB_FORGEJO}
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4G
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  forgejo:
    image: ghcr.io/wyattau/evergreenimageregistry/forgejo:latest
    container_name: operations-forgejo
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    ports:
    - 127.0.0.1:2222:2522
    depends_on:
      postgres-forgejo:
        condition: service_healthy
    volumes:
    - ${DATA_BASE_PATH}/operations/forgejo:/data
    environment:
    - USER=git
    - USER_UID=${PUID}
    - USER_GID=${PGID}
    - TZ=${TZ}
    - FORGEJO__database__DB_TYPE=postgres
    - FORGEJO__database__HOST=operations-postgres-forgejo:5432
    - FORGEJO__database__NAME=${POSTGRES_DB_FORGEJO}
    - FORGEJO__database__USER=${POSTGRES_USER_FORGEJO}
    - FORGEJO__database__PASSWD=${POSTGRES_PASSWORD_FORGEJO}
    - FORGEJO__server__DOMAIN=${FORGEJO_SUBDOMAIN}.${DOMAIN_NAME}
    - FORGEJO__server__ROOT_URL=https://${FORGEJO_SUBDOMAIN}.${DOMAIN_NAME}
    - FORGEJO__server__SSH_DOMAIN=ssh.wyattau.com
    - FORGEJO__server__SSH_PORT=2222
    - FORGEJO__server__START_SSH_SERVER=true
    - FORGEJO__oauth2_client__ENABLED=true
    - FORGEJO__oauth2_client__PROVIDERS=keycloak
    - FORGEJO__oauth2_client__keycloak__PROVIDER=openidConnect
    - FORGEJO__oauth2_client__keycloak__CLIENT_ID=forgejo
    - FORGEJO__oauth2_client__keycloak__CLIENT_SECRET=${FORGEJO_OIDC_CLIENT_SECRET}
    - FORGEJO__oauth2_client__keycloak__AUTO_DISCOVER_URL=https://auth.${DOMAIN_NAME}/realms/company-realm/.well-known/openid-configuration
    - FORGEJO__service__SHOW_REGISTRATION_BUTTON=false
    - FORGEJO__mailer__ENABLED=true
    - FORGEJO__mailer__SMTP_ADDR=${SMTP_HOST}:${SMTP_PORT}
    - FORGEJO__mailer__FROM=noreply@${DOMAIN_NAME}
    - FORGEJO__mailer__USER=${SMTP_USERNAME}
    - FORGEJO__mailer__PASSWD=${SMTP_PASSWORD}
    - FORGEJO__actions__ENABLED=true
    - FORGEJO__container__ENABLE=true
    - FORGEJO__container__REGISTRY_HOST=${REGISTRY_SUBDOMAIN}.${DOMAIN_NAME}
    networks:
    - traefik_net
    - backend_net
    - data_net
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.services.forgejo-svc.loadbalancer.server.port=3000
    - traefik.http.routers.forgejo-web.rule=Host(`${FORGEJO_SUBDOMAIN}.${DOMAIN_NAME}`)
    - traefik.http.routers.forgejo-web.entrypoints=websecure
    - traefik.http.routers.forgejo-web.tls.certresolver=cloudflare
    - traefik.http.routers.forgejo-web.middlewares=keycloak-auth@file
    - traefik.http.routers.forgejo-web.service=forgejo-svc
    - traefik.http.routers.forgejo-registry.rule=Host(`${REGISTRY_SUBDOMAIN}.${DOMAIN_NAME}`)
    - traefik.http.routers.forgejo-registry.entrypoints=websecure
    - traefik.http.routers.forgejo-registry.tls.certresolver=cloudflare
    - traefik.http.routers.forgejo-registry.service=forgejo-svc
    healthcheck:
      test: ["CMD", "/usr/local/bin/shim", "healthcheck", "--tcp", "127.0.0.1:3000"]
      interval: 60s
      timeout: 15s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 512
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  # Shared runner volumes (git, ssl, cache, tmp) used by all runner services.
  # Each dedicated runner has its own data dir and config but shares these mounts.

  forgejo-runner:
    image: ghcr.io/wyattau/forgejo-runner:${FORGEJO_RUNNER_VERSION}
    container_name: runner-general
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    user: 1000:1000
    group_add:
    - '999'
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      LD_LIBRARY_PATH: /usr/lib/git-deps
    volumes:
    - ${DATA_BASE_PATH}/operations/runner-general:/data
    - ./forgejo-runner/config-general.yaml:/data/config.yaml:ro
    - /var/run/docker.sock:/var/run/docker.sock
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/git:/usr/bin/git:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/git-core:/usr/libexec/git-core:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/git-core/templates:/usr/share/git-core/templates:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/lib/ld-musl-x86_64.so.1:/lib/ld-musl-x86_64.so.1:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/lib:/usr/lib/git-deps:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/ssl/cert.pem:/etc/ssl/cert.pem:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/ssl/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/act-cache:/.cache
    - ${DATA_BASE_PATH}/operations/forgejo-runner/tmp:/tmp
    networks:
    - traefik_net
    - backend_net
    - data_net
    command:
      - --config
      - /data/config.yaml
      - daemon
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  runner-peptide-web:
    image: ghcr.io/wyattau/forgejo-runner:${FORGEJO_RUNNER_VERSION}
    container_name: runner-peptide-web
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    user: 1000:1000
    group_add:
    - '999'
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      LD_LIBRARY_PATH: /usr/lib/git-deps
    volumes:
    - ${DATA_BASE_PATH}/operations/runner-peptide-web:/data
    - ./forgejo-runner/config-peptide-web.yaml:/data/config.yaml:ro
    - /var/run/docker.sock:/var/run/docker.sock
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/git:/usr/bin/git:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/git-core:/usr/libexec/git-core:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/git-core/templates:/usr/share/git-core/templates:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/lib/ld-musl-x86_64.so.1:/lib/ld-musl-x86_64.so.1:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/lib:/usr/lib/git-deps:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/ssl/cert.pem:/etc/ssl/cert.pem:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/ssl/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/act-cache:/.cache
    - ${DATA_BASE_PATH}/operations/forgejo-runner/tmp:/tmp
    networks:
    - traefik_net
    - backend_net
    - data_net
    command:
      - --config
      - /data/config.yaml
      - daemon
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  runner-questhive:
    image: ghcr.io/wyattau/forgejo-runner:${FORGEJO_RUNNER_VERSION}
    container_name: runner-questhive
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    user: 1000:1000
    group_add:
    - '999'
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      LD_LIBRARY_PATH: /usr/lib/git-deps
    volumes:
    - ${DATA_BASE_PATH}/operations/runner-questhive:/data
    - ./forgejo-runner/config-questhive.yaml:/data/config.yaml:ro
    - /var/run/docker.sock:/var/run/docker.sock
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/git:/usr/bin/git:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/git-core:/usr/libexec/git-core:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/git-core/templates:/usr/share/git-core/templates:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/lib/ld-musl-x86_64.so.1:/lib/ld-musl-x86_64.so.1:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/git/lib:/usr/lib/git-deps:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/ssl/cert.pem:/etc/ssl/cert.pem:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/ssl/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    - ${DATA_BASE_PATH}/operations/forgejo-runner/act-cache:/.cache
    - ${DATA_BASE_PATH}/operations/forgejo-runner/tmp:/tmp
    networks:
    - traefik_net
    - backend_net
    - data_net
    command:
      - --config
      - /data/config.yaml
      - daemon
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  traefik_net:
    external: true
  backend_net:
    external: true
  data_net:
    external: true
