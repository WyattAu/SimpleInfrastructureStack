---
log:
  level: info
  job_level: info

runner:
  file: /data/.runner
  capacity: 4
  env_file: /data/.env
  timeout: 3h
  shutdown_timeout: 3h
  insecure: true
  fetch_timeout: 30s
  fetch_interval: 2s
  report_interval: 1s
  labels:
    - "docker:docker://catthehacker/ubuntu:act-latest"
    - "ubuntu-latest:docker://catthehacker/ubuntu:act-latest"

cache:
  dir: /data/.cache
  enabled: true

container:
  # Must be a Docker network (not host) so job containers can resolve
  # Docker service names like operations-forgejo via embedded DNS.
  # backend_net is where Forgejo, Postgres, and other services live.
  network: backend_net
  enable_ipv6: false
  privileged: false
  # Docker socket is automatically mounted by the runner when docker_host
  # is set below. Do NOT add it here or Docker rejects duplicate mounts.
  # No need to mount host git - catthehacker/ubuntu:act-latest includes
  # git, docker CLI, jq, make, and all common CI tools.
  options: ""
  # Allow any volume mount in workflow jobs
  valid_volumes:
    - '**'
  docker_host: unix:///var/run/docker.sock
  force_pull: false
  force_rebuild: false

host:
  workdir_parent:
