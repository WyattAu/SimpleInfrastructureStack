log:
  level: info
  job_level: info

runner:
  file: .runner
  capacity: 1
  env_file: .env
  timeout: 3h
  shutdown_timeout: 3h
  insecure: true
  fetch_timeout: 30s
  fetch_interval: 2s
  report_interval: 1s
  labels:
    - "docker:docker://node:22-bookworm"
    - "ubuntu-latest:docker://node:22-bookworm"

cache:
  enabled: true

container:
  # Must be a Docker network (not host) so job containers can resolve
  # Docker service names like operations-forgejo via embedded DNS.
  # backend_net is where Forgejo, Postgres, and other services live.
  network: backend_net
  enable_ipv6: false
  privileged: false
  # Mount Docker socket into job containers so workflows can run Docker
  # commands (docker build, docker run, etc.)
  options: "--volume /var/run/docker.sock:/var/run/docker.sock"
  # Allow any volume mount in workflow jobs
  valid_volumes:
    - '**'
  docker_host: "-"
  force_pull: false
  force_rebuild: false

host:
  workdir_parent:
