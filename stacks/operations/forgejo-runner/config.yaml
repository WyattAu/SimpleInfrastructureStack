---
log:
  level: info
  job_level: info

runner:
  file: /data/.runner
  capacity: 4
  # Use GitHub as the default action source. The Forgejo runner defaults to
  # code.forgejo.org which maps actions/* -> forgejo/*, but forgejo/checkout
  # returns 404 there while actions/checkout exists. GitHub has the canonical
  # actions and is reachable from the runner container.
  default_actions_url: https://github.com
  env_file: /data/.env
  timeout: 3h
  shutdown_timeout: 3h
  insecure: true
  fetch_timeout: 30s
  fetch_interval: 2s
  report_interval: 1s
  labels:
    - "docker:docker://ghcr.io/wyattau/forgejo-runner-image:latest"
    - "ubuntu-latest:docker://ghcr.io/wyattau/forgejo-runner-image:latest"

cache:
  dir: /data/.cache
  enabled: true

container:
  # Must be a Docker network (not host) so job containers can resolve
  # Docker service names like operations-forgejo via embedded DNS.
  # backend_net is where Forgejo, Postgres, and other services live.
  network: backend_net
  enable_ipv6: false
  privileged: false
  # Docker socket is automatically mounted by the runner when docker_host
  # is set below. Do NOT add it here or Docker rejects duplicate mounts.
  # Custom wolfi-based runner image with all common CI tools.
  # NOTE: Do NOT mount git via container.options -- it conflicts with job
  # containers that install their own git via apt. The runner binary gets
  # git via dedicated volume mounts in docker-compose.yml instead.
  options: ""
  # Allow any volume mount in workflow jobs
  valid_volumes:
    - '**'
  docker_host: unix:///var/run/docker.sock
  force_pull: false
  force_rebuild: false

host:
  workdir_parent:
