---
log:
  level: info
  job_level: info

runner:
  file: /data/.runner
  capacity: 4
  env_file: /data/.env
  timeout: 3h
  shutdown_timeout: 3h
  insecure: true
  fetch_timeout: 30s
  fetch_interval: 2s
  report_interval: 1s
  labels:
    - "docker:docker://node:22-bookworm"
    - "ubuntu-latest:docker://node:22-bookworm"

cache:
  dir: /data/.cache
  enabled: true

container:
  # Must be a Docker network (not host) so job containers can resolve
  # Docker service names like operations-forgejo via embedded DNS.
  # backend_net is where Forgejo, Postgres, and other services live.
  network: backend_net
  enable_ipv6: false
  privileged: false
  # Docker socket is automatically mounted by the runner when docker_host
  # is set below. Do NOT add it here or Docker rejects duplicate mounts.
  # Mount host git binary into all job containers so the runner can clone
  # action repos (e.g. oven-sh/setup-bun, actions/cache) before the user's
  # steps run. This is needed because many workflow images (e.g.
  # node:24-bookworm-slim) don't include git.
  options: "--volume /usr/bin/git:/usr/bin/git:ro"
  # Allow any volume mount in workflow jobs
  valid_volumes:
    - '**'
  docker_host: unix:///var/run/docker.sock
  force_pull: false
  force_rebuild: false

host:
  workdir_parent:
