services:
  ocis-init:
    image: busybox:1.37.0
    container_name: storage-ocis-init
    command: sh -c "if [ \"$(stat -c '%u:%g' /etc/ocis 2>/dev/null || echo wrong)\" != '65532:65532' ]; then chown -R 65532:65532 /etc/ocis /var/lib/ocis; else echo 'Ownership already correct, skipping chown'; fi"
    volumes:
    - ${DATA_BASE_PATH}/storage/ocis-config:/etc/ocis
    - ${DATA_BASE_PATH}/storage/ocis-data:/var/lib/ocis
    environment:
    - PUID=65532
    - PGID=65532
    networks: []
  ocis:
    image: ghcr.io/wyattau/evergreenimageregistry/ocis:latest
    container_name: storage-ocis
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    depends_on:
      ocis-init:
        condition: service_completed_successfully
    volumes:
    - ./config/ocis/banned-password-list.txt:/etc/ocis/banned-password-list.txt
    - ./config/ocis/csp.yaml:/etc/ocis/csp.yaml
    - ${DATA_BASE_PATH}/storage/ocis-config:/etc/ocis
    - ${DATA_BASE_PATH}/storage/ocis-data:/var/lib/ocis
    # EIR image has built-in ocis-wrapper.sh for first-boot init
    command:
    - server
    environment:
      NATS_NATS_HOST: 0.0.0.0
      OCIS_GATEWAY_GRPC_ADDR: 0.0.0.0:9142
      FRONTEND_APP_HANDLER_SECURE_VIEW_APP_ADDR: com.owncloud.api.collaboration.CollaboraOnline
      COLLABORA_DOMAIN: collabora.${DOMAIN_NAME}
      PROXY_AUTOPROVISION_ACCOUNTS: 'true'
      PROXY_ROLE_ASSIGNMENT_DRIVER: oidc
      OCIS_OIDC_ISSUER: https://auth.${DOMAIN_NAME}/realms/company-realm
      WEB_OIDC_AUTHORITY: https://auth.${DOMAIN_NAME}/realms/company-realm
      WEB_OIDC_METADATA_URL: https://auth.${DOMAIN_NAME}/realms/company-realm/.well-known/openid-configuration
      PROXY_OIDC_REWRITE_WELLKNOWN: 'true'
      WEB_OIDC_CLIENT_ID: ${OCIS_OIDC_CLIENT_ID:-web}
      OCIS_URL: https://${OCIS_SUBDOMAIN}.${DOMAIN_NAME}
      OCIS_LOG_LEVEL: ${OCIS_LOG_LEVEL:-info}
      OCIS_LOG_COLOR: ${OCIS_LOG_COLOR:-true}
      PROXY_TLS: 'false'
      PROXY_USER_OIDC_CLAIM: preferred_username
      PROXY_USER_CS3_CLAIM: username
      OCIS_INSECURE: ${INSECURE:-false}
      OCIS_ADMIN_USER_ID: ''
      OCIS_EXCLUDE_RUN_SERVICES: idp
      GRAPH_ASSIGN_DEFAULT_USER_ROLE: 'false'
      GRAPH_USERNAME_MATCH: none
      OCIS_PASSWORD_POLICY_BANNED_PASSWORDS_LIST: banned-password-list.txt
      PROXY_CSP_CONFIG_FILE_LOCATION: /etc/ocis/csp.yaml
      KEYCLOAK_DOMAIN: auth.${DOMAIN_NAME}
      OCIS_MFA_ENABLED: ${OCIS_MFA_ENABLED:-false}
      WEB_OIDC_SCOPE: openid profile email roles groups
      OCIS_DEBUG_PROFILING: 'false'
      OCIS_HEALTH_CHECK_ENABLED: 'true'
    networks:
    - traefik_net
    - backend_net
    healthcheck:
      test: ["CMD", "/usr/local/bin/shim", "healthcheck", "--tcp", "127.0.0.1:9200"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.routers.ocis.rule=Host(`${OCIS_SUBDOMAIN}.${DOMAIN_NAME}`)
    - traefik.http.routers.ocis.entrypoints=websecure
    - traefik.http.routers.ocis.tls.certresolver=cloudflare
    - traefik.http.routers.ocis.middlewares=global-rate-limit@file
    - traefik.http.services.ocis.loadbalancer.server.port=9200
    - traefik.http.services.ocis.loadbalancer.server.scheme=http
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  collaboration:
    image: ghcr.io/wyattau/evergreenimageregistry/ocis:latest
    container_name: storage-collaboration
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    depends_on:
      ocis:
        condition: service_healthy
      collabora:
        condition: service_healthy
    command:
    - collaboration
    - server
    volumes:
    - ${DATA_BASE_PATH}/storage/ocis-config:/etc/ocis:ro
    environment:
      COLLABORATION_GRPC_ADDR: 0.0.0.0:9301
      COLLABORATION_HTTP_ADDR: 0.0.0.0:9300
      COLLABORATION_WOPI_SECRET: ${WOPI_SECRET}
      COLLABORATION_WOPI_SRC: http://storage-collaboration:9300
      COLLABORATION_APP_NAME: CollaboraOnline
      COLLABORATION_APP_ADDR: http://storage-collabora:9980
      COLLABORATION_APP_ICON: https://collabora.${DOMAIN_NAME}/favicon.ico
      COLLABORATION_APP_INSECURE: 'true'
      COLLABORATION_CS3API_DATAGATEWAY_INSECURE: 'true'
      COLLABORATION_LOG_LEVEL: warn
      OCIS_URL: https://${OCIS_SUBDOMAIN}.${DOMAIN_NAME}
      OCIS_JWT_SECRET: ${OCIS_JWT_SECRET}
      MICRO_REGISTRY: nats-js-kv
      MICRO_REGISTRY_ADDRESS: storage-ocis:9233
    networks:
    - traefik_net
    - backend_net
    healthcheck:
      test: ["CMD", "/usr/local/bin/shim", "healthcheck", "--tcp", "127.0.0.1:9300"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  collabora:
    image: ghcr.io/wyattau/evergreenimageregistry/collabora:latest
    container_name: storage-collabora
    restart: unless-stopped
    # Collabora requires mount namespaces for document sandboxing.
    # EIR image runs coolwsd with --o:security.capabilities=false
    # to use namespace-based isolation instead of chroot.
    cap_drop:
    - ALL
    cap_add:
    - SYS_CHROOT
    - SYS_ADMIN
    - MKNOD
    - SETUID
    - SETGID
    - CHOWN
    - FOWNER
    - DAC_OVERRIDE
    - SETPCAP
    environment:
    - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:net.frame_ancestors=${OCIS_SUBDOMAIN}.${DOMAIN_NAME} --o:child_root_path=/tmp/jails --o:security.capabilities=false
    - domain=${OCIS_SUBDOMAIN}\.${DOMAIN_NAME}
    - server_name=collabora.${DOMAIN_NAME}
    - DONT_GEN_SSL_CERT=true
    networks:
    - traefik_net
    - backend_net
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.routers.collabora.rule=Host(`collabora.${DOMAIN_NAME}`)
    - traefik.http.routers.collabora.entrypoints=websecure
    - traefik.http.routers.collabora.tls.certresolver=cloudflare
    - traefik.http.services.collabora.loadbalancer.server.port=9980
    healthcheck:
      test:
      - CMD
      - bash
      - -c
      - exec 3<>/dev/tcp/127.0.0.1/9980
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  traefik_net:
    external: true
  backend_net:
    external: true
