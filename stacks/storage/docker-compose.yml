---

services:
  ocis-init:
    # Use a minimal image with the necessary tools
    image: busybox:1.37.0
    container_name: storage-ocis-init
    # Set the ownership to the hardcoded UID/GID that the OCIS container uses internally.
    # Only chown if ownership is incorrect (avoids OOM on 16GB data re-chown every deploy)
    command: sh -c "if [ \"$(stat -c '%u:%g' /etc/ocis 2>/dev/null || echo wrong)\" != '1000:1000' ]; then chown -R 1000:1000 /etc/ocis /var/lib/ocis; else echo 'Ownership already correct, skipping chown'; fi"
    volumes:
      # Mount the same volume as the main ocis service
      - ${DATA_BASE_PATH}/storage/ocis-config:/etc/ocis
      - ${DATA_BASE_PATH}/storage/ocis-data:/var/lib/ocis
    environment:
      - PUID=1000
      - PGID=1000
    # This init container does not need to be on any network
    networks: []
  ocis:
    image: owncloud/ocis:${OCIS_VERSION}
    container_name: storage-ocis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    depends_on:
      ocis-init:
        condition: service_completed_successfully
    volumes:
      - ./config/ocis/banned-password-list.txt:/etc/ocis/banned-password-list.txt
      - ./config/ocis/csp.yaml:/etc/ocis/csp.yaml
      - ${DATA_BASE_PATH}/storage/ocis-config:/etc/ocis
      - ${DATA_BASE_PATH}/storage/ocis-data:/var/lib/ocis
    entrypoint:
      - /bin/sh
    # This command initializes a full config with random secrets on first run,
    # and then starts the server on all subsequent runs.
    # command: ["-c", "ocis init || true; exec ocis server"]
    command: ["-c", "if [ ! -f /etc/ocis/ocis.yaml ]; then ocis init; fi; exec ocis server"]
    environment:
      #- TZ=${TZ}
      # Expose internal services to external collaboration container:
      # NATS: service registry (default 127.0.0.1, needs 0.0.0.0 for cross-container)
      NATS_NATS_HOST: "0.0.0.0"
      # REVA Gateway: CS3 API for storage operations (default 127.0.0.1:9142)
      OCIS_GATEWAY_GRPC_ADDR: "0.0.0.0:9142"
      # Keycloak IDP specific configuration
      FRONTEND_APP_HANDLER_SECURE_VIEW_APP_ADDR: "com.owncloud.api.collaboration.CollaboraOnline"
      COLLABORA_DOMAIN: "collabora.${DOMAIN_NAME}"
      PROXY_AUTOPROVISION_ACCOUNTS: "true"
      PROXY_ROLE_ASSIGNMENT_DRIVER: "oidc"
      OCIS_OIDC_ISSUER: https://auth.${DOMAIN_NAME}/realms/company-realm

      WEB_OIDC_AUTHORITY: https://auth.${DOMAIN_NAME}/realms/company-realm

      WEB_OIDC_METADATA_URL: https://auth.${DOMAIN_NAME}/realms/company-realm/.well-known/openid-configuration

      PROXY_OIDC_REWRITE_WELLKNOWN: "true"
      WEB_OIDC_CLIENT_ID: ${OCIS_OIDC_CLIENT_ID:-web}
      # general config
      OCIS_URL: https://${OCIS_SUBDOMAIN}.${DOMAIN_NAME}
      OCIS_LOG_LEVEL: ${OCIS_LOG_LEVEL:-info}
      OCIS_LOG_COLOR: ${OCIS_LOG_COLOR:-true}
      PROXY_TLS: "false" # do not use SSL between Traefik and oCIS
      PROXY_USER_OIDC_CLAIM: "preferred_username"
      PROXY_USER_CS3_CLAIM: "username"
      # INSECURE: needed if oCIS / Traefik is using self generated certificates
      OCIS_INSECURE: "${INSECURE:-false}"
      OCIS_ADMIN_USER_ID: ""
      OCIS_EXCLUDE_RUN_SERVICES: "idp"
      GRAPH_ASSIGN_DEFAULT_USER_ROLE: "false"
      GRAPH_USERNAME_MATCH: "none"
      # password policies
      OCIS_PASSWORD_POLICY_BANNED_PASSWORDS_LIST: "banned-password-list.txt"
      PROXY_CSP_CONFIG_FILE_LOCATION: /etc/ocis/csp.yaml
      KEYCLOAK_DOMAIN: auth.${DOMAIN_NAME}
      OCIS_MFA_ENABLED: ${OCIS_MFA_ENABLED:-false}
      WEB_OIDC_SCOPE: "openid profile email roles groups"
    networks:
      - traefik_net
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9200/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.ocis.rule=Host(`${OCIS_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.ocis.entrypoints=websecure"
      - "traefik.http.routers.ocis.tls.certresolver=cloudflare"
      - "traefik.http.services.ocis.loadbalancer.server.port=9200"
      - "traefik.http.services.ocis.loadbalancer.server.scheme=http"
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # Collaboration service runs as a separate container using go-micro with
  # NATS JetStream KV for service discovery. The REVA gateway is looked up
  # by its registered service name "com.owncloud.api.gateway" in NATS KV,
  # which OCIS's main container populates on startup.
  collaboration:
    image: owncloud/ocis:${OCIS_VERSION}
    container_name: storage-collaboration
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    depends_on:
      ocis:
        condition: service_healthy
      collabora:
        condition: service_healthy
    command: ["collaboration", "server"]
    environment:
      COLLABORATION_WOPI_SECRET: "${WOPI_SECRET}"
      COLLABORATION_WOPI_SRC: http://storage-collaboration:9300
      COLLABORATION_APP_NAME: "CollaboraOnline"
      # Use internal Docker URL for WOPI discovery (avoid Cloudflare round-trip)
      COLLABORATION_APP_ADDR: "http://storage-collabora:9980"
      COLLABORATION_APP_ICON: https://collabora.${DOMAIN_NAME}/favicon.ico
      COLLABORATION_APP_INSECURE: "true"
      COLLABORATION_CS3API_DATAGATEWAY_INSECURE: "${INSECURE:-false}"
      COLLABORATION_LOG_LEVEL: ${OCIS_LOG_LEVEL:-info}
      COLLABORATION_STORE_NODES: "storage-ocis:9233"
      OCIS_URL: https://${OCIS_SUBDOMAIN}.${DOMAIN_NAME}
      OCIS_JWT_SECRET: "${OCIS_JWT_SECRET}"
      # Use the default go-micro service name that OCIS registers in NATS KV.
      # Setting a direct address like "storage-ocis:9142" causes go-micro to
      # treat it as a service name and look it up in the registry, which fails
      # with "service not found" because only "com.owncloud.api.gateway" is
      # registered. The registry then resolves this to the actual gateway IP:port.
      # See: https://github.com/cs3org/reva/blob/edge/pkg/rgrpc/todo/pool/selector.go
      OCIS_REVA_GATEWAY: "com.owncloud.api.gateway"
      MICRO_REGISTRY: "nats-js-kv"
      MICRO_REGISTRY_ADDRESS: "storage-ocis:9233"
    networks:
      - traefik_net
      - backend_net
    # No healthcheck: the collaboration service only responds to specific WOPI
    # paths (not /). It either starts successfully or crash-loops immediately.
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  collabora:
    image: collabora/code:${COLLABORA_VERSION}
    container_name: storage-collabora
    restart: unless-stopped
    # no-new-privileges removed: Collabora requires CLONE_NEWUSER for
    # document sandboxing (user namespace creation). Without it, child
    # processes cannot spawn and the WOPI endpoint never responds.
    # See: https://sdk.collaboraonline.com/docs/installation/CODE_Docker_image.html

    environment:
      - "extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:net.frame_ancestors=${OCIS_SUBDOMAIN}.${DOMAIN_NAME}"
      - "domain=${OCIS_SUBDOMAIN}\\.${DOMAIN_NAME}"
      - "server_name=collabora.${DOMAIN_NAME}"
      - "DONT_GEN_SSL_CERT=true"
    networks:
      - traefik_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.collabora.rule=Host(`collabora.${DOMAIN_NAME}`)"
      - "traefik.http.routers.collabora.entrypoints=websecure"
      - "traefik.http.routers.collabora.tls.certresolver=cloudflare"
      - "traefik.http.services.collabora.loadbalancer.server.port=9980"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9980"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


networks:
  traefik_net:
    external: true
  backend_net:
    external: true
