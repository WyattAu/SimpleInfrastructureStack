services:
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:0.6.26
    container_name: calibre-web
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=${TZ}
    - DOCKER_MODS=linuxserver/mods:universal-calibre-v7.16.0
    - CALIBRE_WEB_INTERNAL_PORT=8083
    volumes:
    - ${BOOKS_DATA_DIR}:/config
    - ${BOOKS_LIBRARY_DIR}:/books
    networks:
    - traefik_net
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://127.0.0.1:8083/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.services.calibre-web-svc.loadbalancer.server.port=8083
    - traefik.http.routers.calibre-web.rule=Host(`${CALIBRE_SUBDOMAIN}.${DOMAIN_NAME}`)
    - traefik.http.routers.calibre-web.entrypoints=websecure
    - traefik.http.routers.calibre-web.tls.certresolver=cloudflare
    - traefik.http.routers.calibre-web.middlewares=keycloak-auth@file
    - traefik.http.routers.calibre-web.service=calibre-web-svc
    - traefik.http.routers.calibre-web-opds.rule=Host(`${CALIBRE_SUBDOMAIN}.${DOMAIN_NAME}`) && PathPrefix(`/opds`)
    - traefik.http.routers.calibre-web-opds.entrypoints=websecure
    - traefik.http.routers.calibre-web-opds.tls.certresolver=cloudflare
    - traefik.http.routers.calibre-web-opds.service=calibre-web-svc
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
          pids: 100
networks:
  traefik_net:
    external: true
