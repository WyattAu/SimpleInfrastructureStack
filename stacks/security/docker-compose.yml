# ===================================================================
# CrowdSec — Collaborative Intrusion Detection & Prevention
# ===================================================================
# Container-native security agent that reads Docker container logs,
# detects malicious behavior (brute force, port scanning, exploits),
# and shares threat intelligence with the CrowdSec CTI network.
#
# Architecture:
#   Docker logs → CrowdSec agent (parse + detect) → CTI community
#   CrowdSec agent → LAPI → Cloudflare bouncer → Edge blocking
#
# Current mode: DETECTION + ACTIVE BLOCKING
#   - CrowdSec analyzes all container logs for attack patterns
#   - Decisions are logged and shared with the community CTI
#   - Cloudflare bouncer automatically bans IPs at the edge via
#     Cloudflare Firewall Rules API
#
# Requirements:
#   - Cloudflare API token with Zone:Firewall:Edit permission
#   - CROWDSEC_LAPI_SECRET for agent-bouncer communication
#   - CF_API_TOKEN for Cloudflare API access

services:
  crowdsec:
    image: crowdsecurity/crowdsec:${CROWDSEC_VERSION}
    container_name: security-crowdsec
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_PTRACE
    # CrowdSec needs:
    #   NET_RAW — ping-based liveness checks for scenario validation
    #   NET_ADMIN — network configuration for some parsers
    #   SYS_PTRACE — process inspection for container acquis
    # Most capabilities are dropped (ALL).
    volumes:
      # Docker socket via proxy (read-only, same as Traefik)
      # Socket proxy allows CONTAINERS=1, NETWORKS=1, SERVICES=1
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - crowdsec-config:/etc/crowdsec
      - crowdsec-data:/var/lib/crowdsec/data
      # Host auth logs for SSH brute force detection
      - /var/log:/hostlog:ro
    environment:
      - TZ=${TZ}
      - GID=${PGID}
      # Pre-configured LAPI secret (set in secrets/security.env.encrypted)
      - CROWDSEC_LAPI_SECRET=${CROWDSEC_LAPI_SECRET}
      # Collections to install on first start:
      #   - docker: reads container logs via Docker socket
      #   - linux: system-level parsers (ssh, auth, kernel)
      #   - sshd: SSH brute force detection
      #   - crowdsecurity/traefik: Traefik access log parser (requires access logs enabled)
      - COLLECTIONS=crowdsecurity/docker crowdsecurity/linux crowdsecurity/sshd crowdsecurity/traefik
      # Don't share machine-specific metrics with CTI
      - DISABLE_MACHINE_ID=false
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crowdsec-cloudflare-bouncer:
    image: crowdsecurity/cs-cloudflare-bouncer:${CF_BOUNCER_VERSION}
    container_name: security-crowdsec-bouncer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      crowdsec:
        condition: service_healthy
    environment:
      # CrowdSec LAPI connection
      - CROWDSEC_LAPI_URL=http://security-crowdsec:8080
      - CROWDSEC_LAPI_KEY=${CROWDSEC_LAPI_SECRET}
      # Cloudflare API credentials
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ZONE_ID=${CF_ZONE_ID}
      # Bouncer behavior
      # ban_duration: how long IPs stay banned (default 4h)
      - BAN_DURATION=4h
      # excluded_routes: paths to never block (health checks, ACME, etc.)
      - EXCLUDED_ROUTES=/.well-known/acme-challenge
      # log_level: info for production (debug for troubleshooting)
      - LOG_LEVEL=info
      # update_frequency: how often to sync decisions with Cloudflare (default 10s)
      - UPDATE_FREQUENCY=10s
      # startup_delay: wait for CrowdSec LAPI to be ready
      - STARTUP_DELAY=30s
      # activation_mode: "at-least-one" bans on any scenario decision
      - ACTIVATION_MODE=at-least-one
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  crowdsec-config:
  crowdsec-data:

networks:
  backend_net:
    external: true
