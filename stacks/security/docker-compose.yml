# ===================================================================
# CrowdSec — Collaborative Intrusion Detection & Prevention
# ===================================================================
# Container-native security agent that reads Docker container logs,
# detects malicious behavior (brute force, port scanning, exploits),
# and shares threat intelligence with the CrowdSec CTI network.
#
# Architecture:
#   Docker logs → CrowdSec agent (parse + detect) → CTI community
#   CrowdSec agent → LAPI → Workers Bouncer → Edge blocking
#
# Current mode: DETECTION + ACTIVE BLOCKING
#   - CrowdSec analyzes all container logs for attack patterns
#   - Decisions are logged and shared with the community CTI
#   - CrowdSec Workers Bouncer automatically bans IPs at the edge via
#     Cloudflare Worker (KV-backed, near-zero latency)
#
# Requirements:
#   - Cloudflare API token with Workers Scripts/KV/Routes Edit permissions
#   - CROWDSEC_LAPI_SECRET for agent-bouncer communication
#   - CF_API_TOKEN for Cloudflare API access

services:
  crowdsec:
    image: crowdsecurity/crowdsec:${CROWDSEC_VERSION}
    container_name: security-crowdsec
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_PTRACE
    # CrowdSec needs:
    #   NET_RAW — ping-based liveness checks for scenario validation
    #   NET_ADMIN — network configuration for some parsers
    #   SYS_PTRACE — process inspection for container acquis
    # Most capabilities are dropped (ALL).
    volumes:
      # Docker socket via proxy (read-only, same as Traefik)
      # Socket proxy allows CONTAINERS=1, NETWORKS=1, SERVICES=1
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - crowdsec-config:/etc/crowdsec
      - crowdsec-data:/var/lib/crowdsec/data
      # Host auth logs for SSH brute force detection
      - /var/log:/hostlog:ro
    environment:
      - TZ=${TZ}
      - GID=${PGID}
      # Pre-configured LAPI secret (set in secrets/security.env.encrypted)
      - CROWDSEC_LAPI_SECRET=${CROWDSEC_LAPI_SECRET}
      # Collections to install on first start:
      #   - linux: system-level parsers (ssh, auth, kernel)
      #   - sshd: SSH brute force detection
      #   - crowdsecurity/traefik: Traefik access log parser (requires access logs enabled)
      # NOTE: crowdsecurity/docker collection removed — it was a meta-collection that
      # installed docker-logs + cri-logs parsers, which the CrowdSec entrypoint already
      # installs automatically. The collection was removed from the hub index.
      - COLLECTIONS=crowdsecurity/linux crowdsecurity/sshd crowdsecurity/traefik
      # Don't share machine-specific metrics with CTI
      - DISABLE_MACHINE_ID=false
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crowdsec-cf-workers-bouncer:
    # CrowdSec Cloudflare Workers Bouncer — blocks IPs at the edge via
    # a Cloudflare Worker backed by KV. Replaces the deprecated Cloudflare
    # bouncer (which used Firewall Rules API).
    #
    # Binary: /mnt/pool_HDD_x2/infra/bin/crowdsec-cloudflare-worker-bouncer
    # Config:  generated on first run, stored in config volume
    # Setup:   bouncer auto-deploys Worker + KV namespace on startup
    #
    # NOTE: Alpine base provides shell for healthcheck. Binary is bind-mounted
    # from host to avoid committing a 14MB Go binary to git.
    image: alpine:3.22
    container_name: security-cf-workers-bouncer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      crowdsec:
        condition: service_healthy
    volumes:
      - ./config/workers-bouncer:/config:rw
      - /mnt/pool_HDD_x2/infra/bin/crowdsec-cloudflare-worker-bouncer:/usr/local/bin/crowdsec-cloudflare-worker-bouncer:ro
    environment:
      - TZ=${TZ}
    command: ["/usr/local/bin/crowdsec-cloudflare-worker-bouncer", "-c", "/config/config.yaml"]
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "pgrep", "-f", "crowdsec-cloudflare-worker-bouncer"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  crowdsec-config:
  crowdsec-data:

networks:
  backend_net:
    external: true
