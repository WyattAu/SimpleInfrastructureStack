services:
  vaultwarden:
    image: vaultwarden/server:${VAULTWARDEN_VERSION}
    container_name: vaultwarden-server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    volumes:
      - ${DATA_BASE_PATH}/vaultwarden:/data
    environment:
      # --- Domain ---
      - DOMAIN=${VAULTWARDEN_DOMAIN}
      # --- Security ---
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED:-false}
      - SIGNUPS_VERIFY=${SIGNUPS_VERIFY:-false}
      - INVITATIONS_ALLOWED=${INVITATIONS_ALLOWED:-true}
      - SHOW_PASSWORD_HINT=${SHOW_PASSWORD_HINT:-false}
      # --- Admin ---
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      # --- Logging ---
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - EXTENDED_LOGGING=${EXTENDED_LOGGING:-false}
      # --- Icons ---
      - ICON_SERVICE=${ICON_SERVICE:-internal}
      # --- SMTP (for invitations and password resets) ---
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_FROM_NAME=Vaultwarden
      - SMTP_SECURITY=starttls
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    networks:
      - traefik_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.vaultwarden.rule=Host(`${VAULTWARDEN_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.middlewares=keycloak-auth"
      - "traefik.http.routers.vaultwarden.tls.certresolver=cloudflare"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      - "traefik.http.services.vaultwarden.loadbalancer.server.scheme=http"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_net:
    external: true
  backend_net:
    external: true
