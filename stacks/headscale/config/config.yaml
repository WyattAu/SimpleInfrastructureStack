# Headscale configuration v0.29.x format
# https://github.com/juanfont/headscale/blob/v0.29.2/config-example.yaml

server_url: https://headscale.wyattau.com
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9101

noise:
  private_key_path: /etc/headscale/noise.private.key

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite

derp:
  server:
    enabled: true
    region_id: 999
    region_code: "home"
    region_name: "Home DERP"
    stun_listen_addr: "0.0.0.0:3478"
    private_key_path: /var/lib/headscale/derp_server.private.key
  urls: []
  paths: []
  auto_update_enabled: false

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48

dns:
  magic_dns: true
  base_domain: tail.wyattau.com
  override_local_dns: true
  nameservers:
    global:
      - 1.1.1.1
      - 8.8.8.8

log:
  level: info
  format: text

policy:
  mode: file
  path: /etc/headscale/acls.hujson

node:
  ephemeral:
    inactivity_timeout: 30m
