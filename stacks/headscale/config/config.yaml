# Headscale configuration
# https://github.com/juanfont/headscale/blob/main/config-example.yaml

server_url: https://headscale.wyattau.com
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9101

# Noise private key (generated by: headscale generate private-key)
noise:
  private_key_path: /etc/headscale/noise.private.key

# Database (SQLite for simplicity — upgrade to Postgres if >100 nodes)
database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite

# DERP relay server (for NAT traversal)
# Self-hosted DERP eliminates dependency on Tailscale's DERP servers
derp:
  server:
    enabled: true
    region_id: 999
    region_code: "home"
    region_name: "Home DERP"
    stun_listen_addr: "0.0.0.0:3478"
  urls: []
  paths: []
  auto_update_enabled: false

# Tailscale clients need to reach the server
# The list of IP ranges that will be advertised to clients
ip_prefixes:
  - fd7a:115c:a1e0::/48
  - 100.64.0.0/10

# DNS
dns_config:
  base_domain: tail.wyattau.com
  magic_dns: true
  domains: []
  nameservers:
    global:
      - 1.1.1.1
      - 8.8.8.8
  override_local_dns: true

# Disable client logs (reduce noise)
log:
  level: info
  format: text

# Policy (ACLs)
policy:
  mode: file
  path: ""

# Client options
ephemeral_node_inactivity_timeout: 30m

# Tailscale-specific
tls_client_ca_dir: ""
tls_letsencrypt_hostname: ""
tls_letsencrypt_cache_dir: /var/lib/headscale/cache
tls_letsencrypt_challenge_type: HTTP-01

# GRPC API
grpc_listen_addr: 127.0.0.1:50443
grpc_allow_insecure: true

# OIDC (optional — integrate with Keycloak later)
# oidc:
#   issuer: https://auth.wyattau.com/realms/company-realm
#   client_id: headscale
#   client_secret: ""
