services:
  headscale:
    image: ghcr.io/wyattau/evergreenimageregistry/headscale:0.29.2
    container_name: headscale-server
    restart: unless-stopped
    entrypoint: ["/ko-app/headscale"]
    command: ["serve", "--config", "/etc/headscale/config.yaml"]
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    volumes:
    - ./config/config.yaml:/etc/headscale/config.yaml:ro
    - ./config/noise.private.key:/etc/headscale/noise.private.key:ro
    - ./config/acls.hujson:/etc/headscale/acls.hujson:ro
    tmpfs:
    - /var/lib/headscale:mode=0777
    - /var/run/headscale:mode=0777
    environment:
    - TZ=${TZ}
    ports:
    - 127.0.0.1:8080:8080
    - 3478:3478/udp
    networks:
    - traefik_net
    - backend_net
    - headscale_internal
    depends_on:
      headscale-postgres:
        condition: service_healthy
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.services.headscale-svc.loadbalancer.server.port=8080
    - traefik.http.routers.headscale.rule=Host()
    - traefik.http.routers.headscale.entrypoints=websecure
    - traefik.http.routers.headscale.tls.certresolver=cloudflare
    - traefik.http.routers.headscale.service=headscale-svc
    - traefik.http.routers.headscale-admin.rule=Host()
    - traefik.http.routers.headscale-admin.entrypoints=websecure
    - traefik.http.routers.headscale-admin.tls.certresolver=cloudflare
    - traefik.http.routers.headscale-admin.service=headscale-svc
    healthcheck:
      test: ["CMD", "/usr/local/bin/shim", "healthcheck", "--tcp", "127.0.0.1:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  headscale-postgres:
    image: ghcr.io/wyattau/evergreenimageregistry/postgres:17-alpine
    container_name: headscale-postgres
    restart: unless-stopped
    init: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    volumes:
    - ${DATA_BASE_PATH}/headscale/postgres:/var/lib/postgresql/data
    environment:
    - POSTGRES_DB=headscale
    - POSTGRES_USER=headscale
    - POSTGRES_PASSWORD=headscale_s3cret
    networks:
    - headscale_internal
    healthcheck:
      test: [CMD-SHELL, pg_isready -U headscale -d headscale]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 128M
          pids: 50
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  traefik_net:
    external: true
  backend_net:
    external: true
  headscale_internal:
    driver: bridge
