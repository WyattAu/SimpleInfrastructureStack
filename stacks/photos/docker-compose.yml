services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    container_name: photos-server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_add:
      - IPC_LOCK

    command: start.sh
    depends_on:
      immich-postgres:
        condition: service_healthy
      immich-valkey:
        condition: service_healthy
    volumes:
      - ${DATA_BASE_PATH}/photos/upload:/usr/src/app/upload
      - ${DATA_BASE_PATH}/photos/db:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DATABASE_NAME=${POSTGRES_DB}
      - REDIS_HOSTNAME=immich-valkey
      - IMMICH_PORT=2283
      - MACHINE_LEARNING_HOST=http://immich-ml:3003
      - MACHINE_LEARNING_URL=http://immich-ml:3003
    networks:
      - traefik_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.immich.rule=Host(`${PHOTOS_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      # No keycloak-auth middleware: Immich has its own authentication.
      # Mobile apps and CLI tools cannot handle OAuth2 redirects.
      - "traefik.http.routers.immich.tls.certresolver=cloudflare"
      - "traefik.http.routers.immich.middlewares=global-rate-limit"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
      - "traefik.http.services.immich.loadbalancer.server.scheme=http"
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://localhost:2283/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  immich-ml:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_ML_VERSION}
    container_name: photos-ml
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    depends_on:
      immich-postgres:
        condition: service_healthy
    volumes:
      - ${DATA_BASE_PATH}/photos/model-cache:/cache
    environment:
      - MACHINE_LEARNING_HOST=0.0.0.0
      - MACHINE_LEARNING_PORT=3003
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DATABASE_NAME=${POSTGRES_DB}
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  immich-postgres:
    image: ghcr.io/immich-app/postgres:${IMMICH_POSTGRES_VERSION}
    container_name: photos-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    volumes:
      - ${DATA_BASE_PATH}/photos/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  immich-valkey:
    image: valkey/valkey:${VALKEY_VERSION}
    container_name: photos-valkey
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_net:
    external: true
  backend_net:
    external: true
