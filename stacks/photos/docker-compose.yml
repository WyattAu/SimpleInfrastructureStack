services:
  immich-server:
    image: ghcr.io/wyattau/evergreenimageregistry/immich:latest
    container_name: photos-server
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_add:
    - IPC_LOCK
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    cap_drop:
    - ALL
    command: start.sh
    depends_on:
      immich-postgres:
        condition: service_healthy
      immich-valkey:
        condition: service_healthy
    volumes:
    - ${DATA_BASE_PATH}/photos/upload:/usr/src/app/upload
    - ${DATA_BASE_PATH}/photos/db:/var/lib/postgresql/data
    - /etc/localtime:/etc/localtime:ro
    environment:
    - DB_HOSTNAME=immich-postgres
    - DB_USERNAME=${POSTGRES_USER}
    - DB_PASSWORD=${POSTGRES_PASSWORD}
    - DB_DATABASE_NAME=${POSTGRES_DB}
    - REDIS_HOSTNAME=immich-valkey
    - IMMICH_PORT=2283
    - IMMICH_METRICS=true
    - MACHINE_LEARNING_HOST=http://immich-ml:3003
    - MACHINE_LEARNING_URL=http://immich-ml:3003
    networks:
    - traefik_net
    - backend_net
    - data_net
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.routers.immich.rule=Host(`${PHOTOS_SUBDOMAIN}.${DOMAIN_NAME}`)
    - traefik.http.routers.immich.entrypoints=websecure
    - traefik.http.routers.immich.tls.certresolver=cloudflare
    - traefik.http.routers.immich.middlewares=global-rate-limit@file
    - traefik.http.services.immich.loadbalancer.server.port=2283
    - traefik.http.services.immich.loadbalancer.server.scheme=http
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fSs http://127.0.0.1:2283/api/server/ping || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  immich-ml:
    image: ghcr.io/wyattau/evergreenimageregistry/immich-machine-learning:latest
    container_name: photos-ml
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    depends_on:
      immich-postgres:
        condition: service_healthy
    volumes:
    - ${DATA_BASE_PATH}/photos/model-cache:/cache
    environment:
    - MACHINE_LEARNING_HOST=0.0.0.0
    - MACHINE_LEARNING_PORT=3003
    - DB_HOSTNAME=immich-postgres
    - DB_USERNAME=${POSTGRES_USER}
    - DB_PASSWORD=${POSTGRES_PASSWORD}
    - DB_DATABASE_NAME=${POSTGRES_DB}
    networks:
    - backend_net
    - data_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  immich-postgres:
    image: ghcr.io/wyattau/evergreenimageregistry/postgres:latest
    container_name: photos-postgres
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    volumes:
    - ${DATA_BASE_PATH}/photos/db:/var/lib/postgresql/data
    environment:
    - POSTGRES_USER=${POSTGRES_USER}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - POSTGRES_DB=${POSTGRES_DB}
    - POSTGRES_INITDB_ARGS=-c max_connections=40
    networks:
    - data_net
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  immich-valkey:
    image: ghcr.io/wyattau/evergreenimageregistry/valkey:latest
    container_name: photos-valkey
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    networks:
    - data_net
    healthcheck:
      test: ["CMD", "/usr/local/bin/shim", "healthcheck", "--tcp", "127.0.0.1:6379"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 64M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  traefik_net:
    external: true
  backend_net:
    external: true
  data_net:
    external: true
