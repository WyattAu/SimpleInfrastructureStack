services:
  webhook:
    image: almir/webhook:latest
    container_name: infra-webhook
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    ports:
    - 127.0.0.1:9001:9000
    volumes:
    - ${REPO_DIR:-/mnt/pool_HDD_x2/infra/stacks}:/mnt/pool_HDD_x2/infra/stacks
    - /mnt/pool_HDD_x2/infra/bin:/mnt/pool_HDD_x2/infra/bin:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ${SOPS_AGE_KEY_DIR:-/root/.config/sops/age}:/root/.config/sops/age:ro
    - ./ssh:/root/.ssh:ro
    - ./deploy.sh:/opt/webhook/deploy.sh:ro
    - ./hooks.yaml.tmpl:/opt/webhook/hooks.yaml.tmpl:ro
    - /var/log/infra-deploy.log:/var/log/infra-deploy.log
    env_file:
    - .env
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 64M
          pids: 100
    healthcheck:
      test:
      - CMD-SHELL
      - 'wget --no-verbose --tries=1 --post-data=''' --header=''Content-Type: application/json'' -O /dev/null http://127.0.0.1:9000/hooks/deploy 2>&1 | grep -q ''403'''
      interval: 120s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
