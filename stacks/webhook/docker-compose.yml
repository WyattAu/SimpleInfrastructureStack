services:
  webhook:
    build: .
    image: infra-webhook:latest
    container_name: infra-webhook
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:9001:9000"
    volumes:
      # Repo clone on TrueNAS (git pull target, source of compose files + ansible)
      - ${REPO_DIR:-/mnt/pool_HDD_x2/infra/stacks}:/mnt/pool_HDD_x2/infra/stacks
      # Infrastructure binaries (terraform, etc.)
      - /mnt/pool_HDD_x2/infra/bin:/mnt/pool_HDD_x2/infra/bin:ro
      # Docker socket for compose operations
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Age key for SOPS decryption
      # Mount the parent directory containing keys.txt (not the file itself)
      - ${SOPS_AGE_KEY_DIR}:/root/.config/sops/age:ro
      # SSH deploy key for private repo git pull
      - ./ssh:/root/.ssh:ro
      # Deploy script and webhook config template
      - ./deploy.sh:/opt/webhook/deploy.sh:ro
      - ./hooks.yaml.tmpl:/opt/webhook/hooks.yaml.tmpl:ro
      # Logs
      - /var/log/infra-deploy.log:/var/log/infra-deploy.log
    env_file:
      - .env
    # No Traefik labels — this container is standalone and independent
    # If Traefik is broken, the webhook must still work to redeploy it
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 32M
    healthcheck:
      # webhook binary only accepts POST (-http-methods POST).
      # Sending POST with empty body triggers HMAC validation which returns
      # 403 Forbidden — proving the process is alive and routing correctly.
      # A connection-refused or timeout would mean the process is down.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --post-data='' --header='Content-Type: application/json' -O /dev/null http://127.0.0.1:9000/hooks/deploy 2>&1 | grep -q '403'"]
      interval: 120s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
