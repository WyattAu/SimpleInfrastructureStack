services:
  socket-proxy:
    image: ghcr.io/wyattau/evergreenimageregistry/docker-socket-proxy:latest
    container_name: proxy-socket-proxy
    restart: unless-stopped
    # Must run as root to access Docker socket (root:999, mode 660)
    user: "0:0"
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - NET_RAW
    - NET_BIND_SERVICE
    - NET_ADMIN
    - DAC_OVERRIDE
    - DAC_READ_SEARCH
    healthcheck:
      test: ["CMD", "/usr/local/bin/shim", "healthcheck", "--tcp", "127.0.0.1:2375"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
    - LOG_LEVEL=info
    - CONTAINERS=1
    - NETWORKS=1
    - SERVICES=1
    - TASKS=1
    - NODES=1
    - POST=0
    - VERSION=1
    - EVENTS=1
    - PING=1
    - INFO=1
    - IMAGES=1
    networks:
    - backend_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  traefik:
    image: ghcr.io/wyattau/evergreenimageregistry/traefik:latest
    container_name: proxy-traefik
    restart: unless-stopped
    depends_on:
    - socket-proxy
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    healthcheck:
      test: ["CMD", "/usr/local/bin/shim", "healthcheck", "--tcp", "127.0.0.1:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command:
    - --accesslog=true
    - --api.dashboard=true
    - --ping=true
    - --entrypoints.traefik.address=:8080
    - --metrics.prometheus=true
    - --log.level=INFO
    - --providers.docker=true
    - --providers.docker.exposedbydefault=false
    - --providers.docker.endpoint=tcp://socket-proxy:2375
    - --providers.file.filename=/dynamic/dynamic.yml
    - --providers.file.watch=true
    - --entrypoints.web.address=:80
    - --entrypoints.web.http.redirections.entrypoint.to=websecure
    - --entrypoints.web.http.redirections.entrypoint.scheme=https
    - --entrypoints.websecure.address=:443
    - --entrypoints.matrix.address=:8448
    - --certificatesresolvers.cloudflare.acme.email=${LE_EMAIL}
    - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json
    - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
    - --tracing.otlp=true
    - --tracing.otlp.http.endpoint=http://monitoring-tempo:4318
    labels:
    - traefik.enable=true
    - traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN_NAME}`)
    - traefik.http.routers.traefik-dashboard.entrypoints=websecure
    - traefik.http.routers.traefik-dashboard.service=api@internal
    - traefik.http.routers.traefik-dashboard.tls.certresolver=cloudflare
    - traefik.http.routers.traefik-dashboard.middlewares=keycloak-auth@file
    ports:
    - 80:80
    - 443:443
    - 8448:8448
    volumes:
    - ${DATA_BASE_PATH}/proxy/letsencrypt:/letsencrypt
    - ${DATA_BASE_PATH}/proxy/dynamic.yml:/dynamic/dynamic.yml:ro
    environment:
    - PUID=${PUID}
    - PGID=${PGID}
    - TZ=${TZ}
    - CLOUDFLARE_DNS_API_TOKEN=${CF_API_TOKEN}
    - DOMAIN_NAME=${DOMAIN_NAME}
    networks:
    - traefik_net
    - backend_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  oauth2-proxy:
    image: ghcr.io/wyattau/evergreenimageregistry/oauth2-proxy:latest
    container_name: proxy-oauth2-proxy
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_healthy
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    # entrypoint now in EIR Dockerfile — no compose override needed
    networks:
    - traefik_net
    - backend_net
    environment:
    - PUID=${PUID}
    - PGID=${PGID}
    - TZ=${TZ}
    - OAUTH2_PROXY_PROVIDER=oidc
    - OAUTH2_PROXY_EMAIL_DOMAINS=*
    - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
    - OAUTH2_PROXY_UPSTREAMS=static://200
    - OAUTH2_PROXY_REVERSE_PROXY=true
    - OAUTH2_PROXY_PREFERRED_USERNAME_CLAIM=preferred_username
    - OAUTH2_PROXY_WHITELIST_DOMAINS=.${DOMAIN_NAME}
    - OAUTH2_PROXY_OIDC_ISSUER_URL=https://${AUTH_SUBDOMAIN}.${DOMAIN_NAME}/realms/company-realm
    - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID}
    - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET}
    - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}
    - OAUTH2_PROXY_COOKIE_SECURE=true
    - OAUTH2_PROXY_COOKIE_SAMESITE=strict
    - OAUTH2_PROXY_COOKIE_DOMAIN=.${DOMAIN_NAME}
    - OAUTH2_PROXY_REDEEM_URL=http://iam-keycloak:8080/realms/company-realm/protocol/openid-connect/token
    - OAUTH2_PROXY_OIDC_JWKS_URL=http://iam-keycloak:8080/realms/company-realm/protocol/openid-connect/certs
    - OAUTH2_PROXY_SKIP_OIDC_DISCOVERY=true
    - OAUTH2_PROXY_SKIP_PROVIDER_DISCOVERY=true
    - OAUTH2_PROXY_SKIP_ISSUER_VERIFICATION=true
    - OAUTH2_PROXY_LOGIN_URL=https://${AUTH_SUBDOMAIN}.${DOMAIN_NAME}/realms/company-realm/protocol/openid-connect/auth
    - OAUTH2_PROXY_CODE_CHALLENGE_METHOD=S256
    - OAUTH2_PROXY_SET_XAUTHREQUEST=true
    - OAUTH2_PROXY_SKIP_AUTH_REGEX=^/api/v1/.*|^/user/.*|^/api/oauth.*|\.git/|^/.well-known.*|^/api/actions/.*
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.middlewares.keycloak-auth.forwardauth.address=http://oauth2-proxy:4180
    - traefik.http.middlewares.keycloak-auth.forwardauth.authResponseHeaders=X-Auth-Request-Email,X-Auth-Request-User
    - traefik.http.middlewares.keycloak-auth.forwardauth.trustForwardHeader=true
    - traefik.http.middlewares.global-rate-limit.ratelimit.average=100
    - traefik.http.middlewares.global-rate-limit.ratelimit.burst=50
    - traefik.http.routers.oauth2-proxy.rule=(Host(`homepage.${DOMAIN_NAME}`) || Host(`traefik.${DOMAIN_NAME}`) || Host(`kuma.${DOMAIN_NAME}`) || Host(`prometheus.${DOMAIN_NAME}`) || Host(`akaunting.${DOMAIN_NAME}`) || Host(`forgejo.${DOMAIN_NAME}`) || Host(`taiga.${DOMAIN_NAME}`) || Host(`books.${DOMAIN_NAME}`) || Host(`cloud.${DOMAIN_NAME}`) || Host(`status.${DOMAIN_NAME}`)) && PathPrefix(`/oauth2`)
    - traefik.http.routers.oauth2-proxy.entrypoints=websecure
    - traefik.http.routers.oauth2-proxy.tls.certresolver=cloudflare
    - traefik.http.services.oauth2-proxy.loadbalancer.server.port=4180
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  traefik_net:
    external: true
  backend_net:
    external: true
