services:
  paperless-db-init:
    image: busybox:1.37.0
    container_name: documents-postgres-init
    user: "${PUID}:${PGID}"
    volumes:
      - ${DATA_BASE_PATH}/documents/postgres:/data
    command: ["mkdir", "-p", "/data"]

  paperless-postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: documents-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    depends_on:
      paperless-db-init:
        condition: service_completed_successfully
    volumes:
      - ${DATA_BASE_PATH}/documents/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  paperless-redis:
    image: redis:${REDIS_VERSION}
    container_name: documents-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - ${DATA_BASE_PATH}/documents/redis:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  paperless-webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:${PAPERLESS_VERSION}
    container_name: documents-webserver
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    depends_on:
      paperless-postgres:
        condition: service_healthy
      paperless-redis:
        condition: service_started
    volumes:
      - ${DATA_BASE_PATH}/documents/data:/config
      - ${DATA_BASE_PATH}/documents/media:/data
      - ${DATA_BASE_PATH}/documents/export:/export
    environment:
      - USERMAP_UID=${PUID}
      - USERMAP_GID=${PGID}
      - PAPERLESS_URL=https://${DOCS_SUBDOMAIN}.${DOMAIN_NAME}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_DBHOST=paperless-postgres
      - PAPERLESS_DBUSER=${POSTGRES_USER}
      - PAPERLESS_DBPASS=${POSTGRES_PASSWORD}
      - PAPERLESS_DBNAME=${POSTGRES_DB}
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_TIME_ZONE=${TZ}
      - PAPERLESS_OCR_LANGUAGE=eng
      - PAPERLESS_OCR_MODE=force
    networks:
      - traefik_net
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://localhost:8000 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.paperless.rule=Host(`${DOCS_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.paperless.entrypoints=websecure"
      - "traefik.http.routers.paperless.tls.certresolver=cloudflare"
      - "traefik.http.services.paperless.loadbalancer.server.port=8000"
      - "traefik.http.services.paperless.loadbalancer.server.scheme=http"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_net:
    external: true
  backend_net:
    external: true
