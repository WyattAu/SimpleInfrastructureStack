---
# NOTE: Auto-generated by generate_config.py.
# Do not edit manually. Run: sudo python3 generate_config.py
#
# File-based log collection instead of Docker SD.
# Promtail 3.6.x has a bug where Docker SD fails with:
#   ParseAddr("fdd0:0:0:13::1/64"): unexpected character, want colon (at "/64")
# Docker returns IPv6 CIDR addresses that Promtail's Go net library cannot parse.
# This config reads Docker's JSON log files directly, bypassing Docker SD entirely.
# The Docker containers directory is mounted at /docker-logs inside the container.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://monitoring-victorialogs:9428/insert/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      # This section is auto-generated by generate_config.py.
      # Each container gets its own static_config entry with job/container/stack labels.
      # After running generate_config.py on the TrueNAS server, the live config will
      # contain 50+ entries like:
      #   - targets:
      #       - localhost
      #     labels:
      #       job: "traefik"
      #       container: "proxy-traefik"
      #       stack: "proxy"
      #       __path__: /docker-logs/<full-container-id>/<full-container-id>-json.log
      #
      # Placeholder entry below -- replace by running generate_config.py:
      - targets:
          - localhost
        labels:
          job: "placeholder"
          container: "placeholder"
          stack: "placeholder"
          __path__: /docker-logs/placeholder/placeholder-json.log

    pipeline_stages:
      - docker: {}
      - timestamp: {source: time, format: RFC3339Nano}
