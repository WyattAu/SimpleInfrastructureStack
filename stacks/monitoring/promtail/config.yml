server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://monitoring-victorialogs:9428/insert/loki/api/v1/push
    # VictoriaLogs uses uint32 account IDs (default: 0), not string tenant IDs.
    # Loki used string tenant IDs like "infra" — that causes 400 errors here.
    # Omitting tenant_id uses the default account (0).

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'job'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'stack'
