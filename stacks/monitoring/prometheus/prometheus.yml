---
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['monitoring-alertmanager:9093']

rule_files:
  - /etc/prometheus/recording_rules.yml
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['monitoring-node-exporter:9100']
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['monitoring-cadvisor:8080']
  - job_name: 'traefik'
    metrics_path: /metrics
    static_configs:
      - targets: ['proxy-traefik:8080']
  - job_name: 'forgejo'
    metrics_path: /metrics
    static_configs:
      - targets: ['operations-forgejo:3000']
  # Keycloak 26.x serves metrics on the management port (9000), not the
  # main application port (8080). KC_METRICS_ENABLED=true is also required.
  - job_name: 'keycloak'
    metrics_path: /metrics
    static_configs:
      - targets: ['iam-keycloak:9000']
  - job_name: 'loki'
    static_configs:
      - targets: ['monitoring-loki:3100']
  # Synapse metrics listener on port 19090 (enable_metrics: true required)
  # Metrics path is /_synapse/metrics (Synapse's default, not /metrics)
  - job_name: 'synapse'
    metrics_path: /_synapse/metrics
    static_configs:
      - targets: ['collaboration-synapse:19090']
  # Alertmanager metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['monitoring-alertmanager:9093']
  # Promtail metrics (Promtail already listens on 9080)
  - job_name: 'promtail'
    static_configs:
      - targets: ['monitoring-promtail:9080']
  # PostgreSQL exporter (multi-target: all PG instances)
  # Uses __param_target to select which DSN to scrape per target.
  # The target value must match the DATA_SOURCE_NAME env var exactly.
  # Relabeling sets instance label to the PG container hostname for clarity.
  - job_name: 'postgres-exporter'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'postgresql://forgejo@operations-postgres-forgejo:5432/forgejo?sslmode=disable'
          - 'postgresql://keycloak@iam-postgres:5432/keycloak?sslmode=disable'
          - 'postgresql://synapse@collaboration-postgres:5432/synapse?sslmode=disable'
          - 'postgresql://freshrss@rss-postgres:5432/freshrss?sslmode=disable'
          - 'postgresql://immich@photos-postgres:5432/immich?sslmode=disable'
          - 'postgresql://paperless@documents-postgres:5432/paperless?sslmode=disable'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: 'postgresql://[^@]+@([^:]+).*'
        target_label: instance
        replacement: '${1}'
      - target_label: __address__
        replacement: monitoring-postgres-exporter:9187

  # Vaultwarden metrics (built-in /metrics on port 80)
  - job_name: 'vaultwarden'
    metrics_path: /metrics
    static_configs:
      - targets: ['vaultwarden-server:80']

  # Immich metrics (port 8081 when IMMICH_METRICS=true)
  - job_name: 'immich'
    static_configs:
      - targets: ['photos-server:8081']

  # Paperless-ngx metrics (/metrics on port 8000 when PAPERLESS_ENABLE_METRICS=true)
  - job_name: 'paperless'
    metrics_path: /metrics
    static_configs:
      - targets: ['documents-webserver:8000']

  # Grafana metrics (built-in /metrics on port 3000)
  - job_name: 'grafana'
    metrics_path: /metrics
    static_configs:
      - targets: ['monitoring-grafana:3000']

  # Redis/Valkey exporter (multi-target via redis-exporter on backend_net)
  # Uses __param_target to select which Redis/Valkey instance to scrape.
  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'redis://photos-valkey:6379'
          - 'redis://documents-redis:6379'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: 'redis://([^:]+).*'
        target_label: instance
        replacement: '${1}'
      - target_label: __address__
        replacement: monitoring-redis-exporter:9121

  # MariaDB exporter for Akaunting
  - job_name: 'mariadb'
    scrape_interval: 30s
    static_configs:
      - targets: ['accounting-mariadb-exporter:9104']

  # Uptime Kuma metrics (built-in /metrics on port 3001)
  - job_name: 'uptime-kuma'
    static_configs:
      - targets: ['monitoring-kuma:3001']

  # OAuth2-Proxy metrics (built-in /metrics on port 4180)
  - job_name: 'oauth2-proxy'
    static_configs:
      - targets: ['proxy-oauth2-proxy:4180']

  # Collabora Online metrics (built-in /metrics on port 9980)
  - job_name: 'collabora'
    static_configs:
      - targets: ['storage-collabora:9980']

  # Cloudflared tunnel metrics (host network, scrape via TrueNAS IP)
  - job_name: 'cloudflared'
    static_configs:
      - targets: ['62.49.93.199:4788']

  # Tempo tracing backend metrics
  - job_name: 'tempo'
    static_configs:
      - targets: ['monitoring-tempo:3200']
