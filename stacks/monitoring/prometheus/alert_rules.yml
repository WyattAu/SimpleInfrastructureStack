---
groups:
  # Filters applied to container alerts:
  #   image != "" — excludes host system cgroups (systemd, ssh, cron etc.)
  #     which lack the image label. These cgroups have
  #     container_spec_memory_limit_bytes=0 and container_spec_cpu_quota=0,
  #     causing division-by-zero that produces +Inf.
  #   container_spec_*_bytes/quota > 0 — excludes Docker containers that
  #     have no memory or CPU limit set in docker-compose. Without a limit,
  #     cAdvisor reports 0, which also produces +Inf on division.
  - name: container_health
    rules:
      - alert: ContainerOOMKilled
        expr: rate(container_oom_events_total{image!=""}[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} OOM killed"
          description: "Container {{ $labels.name }} was OOM killed."

      - alert: ContainerHighMemoryUsage
        expr: (container_memory_usage_bytes{image!=""} / container_spec_memory_limit_bytes{image!=""}) > 0.9
          and container_spec_memory_limit_bytes{image!=""} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} using >90% memory"
          description: "Container {{ $labels.name }} is using {{ $value | humanizePercentage }} of its memory limit."

      - alert: ContainerHighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{image!=""}[5m]) / container_spec_cpu_quota{image!=""} > 0.9
          and container_spec_cpu_quota{image!=""} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} using >90% CPU"
          description: "Container {{ $labels.name }} is using {{ $value | humanizePercentage }} of its CPU limit."

      - alert: ContainerRestartLoop
        expr: increase(container_restarts_total{image!=""}[1h]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restart loop detected"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in the last hour."

      - alert: ContainerDown
        expr: (time() - container_last_seen{image!=""}) > 120
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "Container {{ $labels.name }} has not been seen for over 2 minutes."

  - name: host_health
    rules:
      - alert: HostHighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage above 90%"
          description: "Host memory usage is at {{ $value | humanizePercentage }}."

      - alert: HostHighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host disk usage above 85%"
          description: "Host disk {{ $labels.device }} at {{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."

      - alert: DataPoolHighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/mnt/pool_HDD_x2"} / node_filesystem_size_bytes{mountpoint="/mnt/pool_HDD_x2"})) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Data pool disk usage above 85%"
          description: "Data pool {{ $labels.device }} at {{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."

      - alert: HostDiskInodesExhausted
        expr: (1 - (node_filesystem_files_free{mountpoint="/"} / node_filesystem_files{mountpoint="/"})) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host disk inodes above 85%"
          description: "Host inodes at {{ $labels.mountpoint }} are {{ $value | humanizePercentage }} used."

      - alert: HostHighCPUUsage
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU usage above 90%"
          description: "Host CPU utilization is at {{ $value | humanizePercentage }}. Services may be degraded."

      - alert: HostClockNotSynchronized
        expr: node_timex_sync_status == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host clock is not synchronized"
          description: "NTP synchronization is lost. This may cause certificate validation issues, log timestamp inconsistencies, and backup scheduling problems."

      - alert: HostDiskIOErrors
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk I/O wait time on {{ $labels.device }}"
          description: "Disk {{ $labels.device }} is experiencing sustained I/O wait of {{ $value | humanizePercentage }}. May indicate disk issues."

  - name: service_health
    rules:
      - alert: TraefikHighErrorRate
        expr: (sum(rate(traefik_service_requests_total{code=~"5.."}[5m])) by (service) / sum(rate(traefik_service_requests_total[5m])) by (service)) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik high 5xx error rate for {{ $labels.service }}"
          description: "Service {{ $labels.service }} has a {{ $value | humanizePercentage }} 5xx error rate."

      - alert: TraefikRateLimitTriggered
        expr: sum(increase(traefik_service_requests_total{code="429"}[5m])) by (service) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Rate limiting active for {{ $labels.service }}"
          description: "{{ $labels.service }} received {{ $value }} rate-limit rejections in the last 5 minutes."

      - alert: VictoriaMetricsDown
        expr: up{job="victoriametrics"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "VictoriaMetrics is down"
          description: "VictoriaMetrics is not responding. All metrics scraping and alert evaluation is unavailable."

  - name: synapse_health
    rules:
      # synapse_event_processing_lag_seconds was removed in newer Synapse versions.
      # Use event fetch backlog as a proxy for processing health.
      - alert: SynapseHighEventFetchBacklog
        expr: synapse_event_fetch_ongoing > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Synapse has {{ $value }} ongoing event fetches"
          description: "Synapse has {{ $value }} concurrent event fetches, which may indicate replication lag or federation issues."

      - alert: SynapseDown
        expr: up{job="synapse"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Synapse is down"
          description: "The Synapse metrics endpoint is not responding. Matrix may be unavailable."

  - name: victorialogs_health
    rules:
      - alert: VictoriaLogsDown
        expr: up{job="victorialogs"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "VictoriaLogs is down"
          description: "VictoriaLogs is not responding. Log aggregation may be unavailable."

  - name: backup_health
    rules:
      # Backup container uses cron-trigger; if it's down, backups won't run.
      - alert: BackupContainerDown
        expr: (time() - container_last_seen{name=~"backup-.*", image!=""}) > 3600
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Backup container {{ $labels.name }} is down"
          description: "Backup container {{ $labels.name }} has not been seen for over 1 hour. Scheduled backups may be failing."

      # Backup script writes sis_backup_last_success metric via node-exporter textfile collector.
      # Alert if no successful backup in 26 hours (missed the 02:00 UTC daily window).
      - alert: BackupStale
        expr: (time() - sis_backup_last_success) > 93600
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No successful backup in over 26 hours"
          description: "Last successful backup was {{ $value | humanizeDuration }} ago. The daily 02:00 UTC backup may have failed."

      - alert: BackupOffsiteSyncStale
        expr: (time() - sis_backup_offsite_last_success) > 172800
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No successful offsite backup sync in over 48 hours"
          description: "Last successful offsite sync was {{ $value | humanizeDuration }} ago. Offsite backups to Backblaze B2 may be failing."

      # Backup size regression -- detects significant data loss or missed data.
      - alert: BackupSizeDrop
        expr: |
          (sis_backup_size_bytes < 10737418240)
          and (sis_backup_last_success > 0)
        for: 2h
        labels:
          severity: critical
        annotations:
          summary: "Backup size dropped below 10GB"
          description: >-
            The last successful backup was only {{ $value | humanize1024 }}.
            Previous backups were approximately 30GB. This may indicate data loss
            or a significant reduction in stored data.

  - name: system_health
    rules:
      # Host disk full warning (>85% on any filesystem)
      - alert: HostDiskFull
        expr: (1 - (node_filesystem_avail_bytes{fstype=~"ext4|zfs", mountpoint=~"/|/mnt/.*"} / node_filesystem_size_bytes{fstype=~"ext4|zfs", mountpoint=~"/|/mnt/.*"})) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above 85% on {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.device }} is {{ $value | humanizePercentage }} full."

      # Host memory exhaustion warning
      - alert: HostMemoryExhaustion
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host memory usage above 95%"
          description: "Available memory is below 5%. Risk of OOM kills. Current usage: {{ $value | humanizePercentage }}."

  - name: alertmanager_health
    rules:
      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager is down"
          description: "The Alertmanager service is not responding. Alert notifications will not be delivered."

  - name: tls_health
    rules:
      # Traefik exposes traefik_tls_certs_not_after as a Unix timestamp.
      # Alert 14 days before expiry (warn) and 7 days (critical).
      - alert: TLSCertificateExpiringSoon
        expr: (traefik_tls_certs_not_after - time()) / 86400 < 14
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate for {{ $labels.cn }} expires in {{ $value | humanizeDuration }}"
          description: "Certificate {{ $labels.cn }} (SANs: {{ $labels.sans }}) expires in less than 14 days."

      - alert: TLSCertificateCriticalExpiry
        expr: (traefik_tls_certs_not_after - time()) / 86400 < 7
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "TLS certificate for {{ $labels.cn }} expires in {{ $value | humanizeDuration }}"
          description: "Certificate {{ $labels.cn }} (SANs: {{ $labels.sans }}) expires in less than 7 days. Immediate renewal required."

  - name: keycloak_health
    rules:
      - alert: KeycloakDown
        expr: up{job="keycloak"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Keycloak is down"
          description: "Keycloak metrics endpoint is not responding. All OAuth2-authenticated services will fail."

      - alert: KeycloakHighMemoryUsage
        expr: jvm_memory_used_bytes{job="keycloak"} / jvm_memory_max_bytes{job="keycloak"} > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Keycloak JVM using >90% heap memory"
          description: "Keycloak JVM heap is at {{ $value | humanizePercentage }} utilization."

  - name: forgejo_health
    rules:
      - alert: ForgejoDown
        expr: up{job="forgejo"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Forgejo is down"
          description: "Forgejo metrics endpoint is not responding. Git hosting and CI runner registration unavailable."

  - name: application_health
    rules:
      - alert: VaultwardenDown
        expr: probe_success{job="blackbox-http-internal",instance="vaultwarden-server"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Vaultwarden is down"
          description: "Vaultwarden HTTP endpoint is not responding. Password management is unavailable."

      - alert: ImmichDown
        expr: probe_success{job="blackbox-http-internal",instance="photos-server"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Immich is down"
          description: "Immich HTTP endpoint is not responding. Photo storage and sharing is unavailable."

      - alert: PaperlessDown
        expr: up{job="paperless"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Paperless-ngx is down"
          description: "Paperless-ngx metrics endpoint is not responding. Document management is unavailable."

      # Non-metric services — monitored via blackbox probes
      - alert: FreshRSSDown
        expr: probe_success{instance=~"rss-freshrss"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "FreshRSS is unreachable"
          description: "FreshRSS web UI is not responding via internal blackbox probe."

      - alert: HomepageDown
        expr: probe_success{instance=~"utility-homepage"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Homepage is unreachable"
          description: "Homepage web UI is not responding via internal blackbox probe."

      - alert: AkauntingDown
        expr: probe_success{instance=~"accounting-akaunting"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Akaunting is unreachable"
          description: "Akaunting web UI is not responding via internal blackbox probe."

      - alert: TaigaDown
        expr: probe_success{instance=~"project-management-(gateway|back|front)"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taiga is partially or fully down"
          description: "One or more Taiga components (gateway, back, or front) are not responding to HTTP probes."

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Grafana is down"
          description: "Grafana metrics endpoint is not responding. All dashboards and visualization are unavailable."

  - name: swap_health
    rules:
      - alert: HighSwapUsage
        expr: (1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) > 0.5
          and node_memory_SwapTotal_bytes > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Swap usage above 50%"
          description: "System is using {{ $value | humanizePercentage }} of swap ({{ $value }}). May indicate memory pressure."

  - name: monitoring_pipeline_health
    rules:
      # If these exporters/scrapers go down, ALL container/service alerts become blind.
      - alert: MonitoringExporterDown
        expr: up{job=~"cadvisor|node-exporter|postgres-exporter|promtail|redis|mariadb|tempo|blackbox-exporter|crowdsec-workers-bouncer|victoriametrics|victorialogs"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Monitoring exporter {{ $labels.job }} is down"
          description: "The {{ $labels.job }} exporter is not responding. Container/service metrics for ALL services will be stale or missing."

      - alert: VictoriaMetricsAlertingDown
        expr: up{job="vmalert"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "vmalert is down"
          description: "vmalert is not responding. Alerting and recording rules are no longer being evaluated."

  - name: server_health
    rules:
      # If ALL critical infrastructure targets are down simultaneously,
      # the server itself is likely unreachable or Docker has crashed.
      # This is a composite alert that fires when Prometheus can't reach
      # Traefik, Keycloak, AND Forgejo — the three most essential services.
      - alert: ServerWidespreadOutage
        expr: |
          (up{job="traefik"} == 0) +
          (up{job="keycloak"} == 0) +
          (up{job="forgejo"} == 0) >= 3
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Widespread infrastructure outage detected"
          description: "All critical services (Traefik, Keycloak, Forgejo) are unreachable. The server may be down or Docker has crashed."

  # =========================================================================
  # SLO Burn Rate Alerts
  # =========================================================================
  # Uses multi-window burn rate alerts per Google SRE practices.
  #
  # Burn rate = (error rate) / (error budget rate)
  #   - Burn rate of 1.0 = consuming error budget at exactly the expected rate
  #   - Burn rate of 14.4 = budget exhausted in 1 day at current rate
  #
  # Multi-window strategy:
  #   Short window (1h/6h): catches sudden spikes
  #   Long window (6h/3d): catches sustained degradation
  #   Both must exceed threshold to reduce false positives
  #
  # SLO targets and error budgets:
  #   Critical services (traefik, keycloak): 99.9% → 0.1% error budget
  #   Important services (forgejo, grafana, victorialogs, synapse): 99.5% → 0.5% error budget
  # =========================================================================

  - name: slo_availability_critical
    rules:
      # Critical service SLO burn rate alerts (99.9% target, 0.1% error budget)
      # Page (critical): burn rate > 14.4x in both 1h and 5m windows
      # Budget would be exhausted in ~1 day at this rate
      - alert: SLOCriticalAvailabilityBurn
        expr: |
          (
            (1 - slo:availability_ratio:5m{job=~"traefik|keycloak"}) > 0.00144
            and
            (1 - slo:availability_ratio:1h{job=~"traefik|keycloak"}) > 0.00144
          )
        for: 2m
        labels:
          severity: critical
          slo_target: "99.9%"
          slo_class: critical
        annotations:
          summary: "Critical service {{ $labels.job }} SLO burn rate exceeds 14.4x"
          description: >-
            {{ $labels.job }} is burning through its 99.9% availability error budget
            at >14.4x the expected rate. If sustained, the monthly budget would be
            exhausted in under 1 day. Current 5m availability: {{ $value | humanizePercentage }}.

      # Warning: burn rate > 1.0x in both 6h and 30m windows
      - alert: SLOCriticalAvailabilityWarning
        expr: |
          (
            (1 - slo:availability_ratio:30m{job=~"traefik|keycloak"}) > 0.0001
            and
            (1 - slo:availability_ratio:6h{job=~"traefik|keycloak"}) > 0.0001
          )
        for: 15m
        labels:
          severity: warning
          slo_target: "99.9%"
          slo_class: critical
        annotations:
          summary: "Critical service {{ $labels.job }} SLO budget burning faster than expected"
          description: >-
            {{ $labels.job }} is consuming its error budget faster than the
            30-day linear allocation. Current 30m downtime ratio: {{ $value | humanizePercentage }}.

  - name: slo_availability_important
    rules:
      # Important service SLO burn rate alerts (99.5% target, 0.5% error budget)
      - alert: SLOImportantAvailabilityBurn
        expr: |
          (
            (1 - slo:availability_ratio:5m{job=~"forgejo|grafana|victorialogs|synapse"}) > 0.0072
            and
            (1 - slo:availability_ratio:1h{job=~"forgejo|grafana|victorialogs|synapse"}) > 0.0072
          )
        for: 5m
        labels:
          severity: critical
          slo_target: "99.5%"
          slo_class: important
        annotations:
          summary: "Important service {{ $labels.job }} SLO burn rate exceeds 14.4x"
          description: >-
            {{ $labels.job }} is burning through its 99.5% availability error budget
            at >14.4x the expected rate.

      - alert: SLOImportantAvailabilityWarning
        expr: |
          (
            (1 - slo:availability_ratio:30m{job=~"forgejo|grafana|victorialogs|synapse"}) > 0.0005
            and
            (1 - slo:availability_ratio:6h{job=~"forgejo|grafana|victorialogs|synapse"}) > 0.0005
          )
        for: 15m
        labels:
          severity: warning
          slo_target: "99.5%"
          slo_class: important
        annotations:
          summary: "Important service {{ $labels.job }} SLO budget burning faster than expected"
          description: >-
            {{ $labels.job }} is consuming its 99.5% error budget faster than expected.

  - name: slo_http_errors
    rules:
      # HTTP error rate SLO alerts (99.5% success rate = 0.5% error budget)
      - alert: SLOHTTPErrorBudgetBurn
        expr: |
          (
            slo:http_5xx_ratio:5m > 0.072
            and
            slo:http_5xx_ratio:1h > 0.072
          )
        for: 5m
        labels:
          severity: critical
          slo_target: "99.5%"
          slo_class: http
        annotations:
          summary: "Service {{ $labels.service }} HTTP error rate burning budget at >14.4x"
          description: >-
            {{ $labels.service }} has a 5xx error rate of {{ $value | humanizePercentage }},
            burning through the 0.5% error budget at >14.4x rate.

      - alert: SLOHTTPErrorBudgetWarning
        expr: |
          (
            slo:http_5xx_ratio:30m > 0.005
            and
            slo:http_5xx_ratio:6h > 0.005
          )
        for: 15m
        labels:
          severity: warning
          slo_target: "99.5%"
          slo_class: http
        annotations:
          summary: "Service {{ $labels.service }} HTTP error rate above SLO target"
          description: >-
            {{ $labels.service }} has a sustained 5xx error rate of {{ $value | humanizePercentage }},
            exceeding the 0.5% error budget allocation.

  - name: slo_30d_compliance
    rules:
      # Monthly SLO compliance check — fires if 30d availability drops below target
      - alert: SLOMonthlyCriticalAtRisk
        expr: slo:availability_ratio:30d{job=~"traefik|keycloak"} < 0.999
        for: 1h
        labels:
          severity: warning
          slo_target: "99.9%"
          slo_class: critical
        annotations:
          summary: "Critical service {{ $labels.job }} 30-day SLO at risk ({{ $value | humanizePercentage }})"
          description: >-
            {{ $labels.job }} 30-day availability is {{ $value | humanizePercentage }},
            below the 99.9% SLO target. Remaining error budget: {{ $value | humanizePercentage }}.

      - alert: SLOMonthlyImportantAtRisk
        expr: slo:availability_ratio:30d{job=~"forgejo|grafana|victorialogs|synapse"} < 0.995
        for: 1h
        labels:
          severity: warning
          slo_target: "99.5%"
          slo_class: important
        annotations:
          summary: "Important service {{ $labels.job }} 30-day SLO at risk ({{ $value | humanizePercentage }})"
          description: >-
            {{ $labels.job }} 30-day availability is {{ $value | humanizePercentage }},
            below the 99.5% SLO target.

  - name: synthetic_monitoring
    rules:
      # Internal HTTP probes failing — service not responding from inside network
      - alert: SyntheticHTTPInternalFailure
        expr: probe_success{job="blackbox-http-internal"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Internal HTTP probe failed for {{ $labels.instance }}"
          description: >-
            HTTP probe to {{ $labels.target }} ({{ $labels.instance }}) is failing.
            The service is not responding from inside the network. This may indicate
            the application is down or returning unexpected status codes.

      # External HTTP probes failing — full chain broken (DNS → Cloudflare → Tunnel → Traefik → Backend)
      - alert: SyntheticHTTPExternalFailure
        expr: probe_success{job="blackbox-http-external"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "External HTTP probe failed for {{ $labels.instance }}"
          description: >-
            HTTPS probe to {{ $labels.target }} ({{ $labels.instance }}) is failing.
            The full external chain may be broken: DNS, Cloudflare, Tunnel, Traefik, or backend.

      # TCP probes failing — database or cache port not accepting connections
      - alert: SyntheticTCPFailure
        expr: probe_success{job="blackbox-tcp"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "TCP probe failed for {{ $labels.instance }}:{{ $labels.target }}"
          description: >-
            TCP connection to {{ $labels.target }} failed. The service is not accepting
            connections on the expected port.

      # DNS probes failing — Docker DNS resolution broken
      - alert: SyntheticDNSFailure
        expr: probe_success{job="blackbox-dns"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DNS probe failed for {{ $labels.target }}"
          description: >-
            DNS resolution for {{ $labels.target }} failed. Docker internal DNS
            may be broken or the container is not running.

      # HTTP probe latency warning — service responding but slowly
      - alert: SyntheticHTTPLatency
        expr: probe_http_duration_seconds{job=~"blackbox-http-.*"} > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP probe latency > 5s for {{ $labels.instance }}"
          description: >-
            HTTP probe to {{ $labels.target }} ({{ $labels.instance }}) took {{ $value }}s.
            The service is responding but may be degraded.

  - name: security
    rules:
      # CrowdSec agent is down — no intrusion detection active
      - alert: CrowdSecAgentDown
        expr: probe_success{job="blackbox-tcp",instance="security-crowdsec"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CrowdSec agent is down"
          description: >-
            CrowdSec agent API port is not responding to TCP probe.
            Intrusion detection and Cloudflare bouncer may not be operational.

      # CrowdSec agent down — no intrusion detection active
      - alert: CrowdSecAgentDown
        expr: up{job="crowdsec"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CrowdSec agent is down"
          description: >-
            CrowdSec agent metrics endpoint (port 6060) is not responding.
            Intrusion detection and Cloudflare bouncer may not be operational.

      # High rate of 4xx client errors (potential brute force or scanning)
      - alert: HighHTTPClientErrorRate
        expr: |
          sum(rate(traefik_service_requests_total{code=~"4.."}[5m])) by (service)
          / sum(rate(traefik_service_requests_total[5m])) by (service) > 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 4xx error rate on {{ $labels.service }} ({{ $value | humanizePercentage }})"
          description: >-
            Service {{ $labels.service }} is experiencing a 4xx error rate above 30%.
            This may indicate brute force attempts, vulnerability scanning, or
            misconfigured clients. CrowdSec should detect and block malicious IPs.

      # SSH brute force detected by CrowdSec (via sshd collection)
      - alert: SSHBruteForceDetected
        expr: |
          increase(crowdsec_decisions_total{type="ban",origin=~".*ssh.*"}[1h]) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "SSH brute force attack detected ({{ $value }} bans in last hour)"
          description: >-
            CrowdSec has issued {{ $value }} SSH-related bans in the last hour.
             This indicates an active brute force attack against SSH services.

  - name: zfs_health
    interval: 60s
    rules:
      # Pool health degradation — ZFS array has a faulted or degraded vdev
      - alert: ZFSPoolDegraded
        expr: sis_zfs_pool_health == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ZFS pool {{ $labels.pool }} is degraded or faulted"
          description: >-
            ZFS pool {{ $labels.pool }} health is not ONLINE. One or more vdevs
            may be faulted. Check immediately with: zpool status {{ $labels.pool }}

      # Pool capacity warning (>80%)
      - alert: ZFSPoolHighCapacity
        expr: sis_zfs_pool_capacity_pct > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ZFS pool {{ $labels.pool }} capacity at {{ $value }}%"
          description: >-
            ZFS pool {{ $labels.pool }} is at {{ $value }}% capacity.
            ZFS performance degrades significantly above 80%. Consider
            expanding the pool or freeing space.

      # Pool capacity critical (>90%)
      - alert: ZFSPoolCriticalCapacity
        expr: sis_zfs_pool_capacity_pct > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ZFS pool {{ $labels.pool }} critically full at {{ $value }}%"
          description: >-
            ZFS pool {{ $labels.pool }} is at {{ $value }}% capacity. Write
            performance will be severely impacted. Free space immediately.

      # Scrub errors detected
      - alert: ZFSPoolScrubErrors
        expr: sis_zfs_pool_scrub_errors > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ZFS pool {{ $labels.pool }} has {{ $value }} scrub errors"
          description: >-
            The last scrub of ZFS pool {{ $labels.pool }} found {{ $value }} errors.
            This indicates data corruption. Run: zpool scrub {{ $labels.pool }}
            and check: zpool status {{ $labels.pool }}

      # Scrub stale (>45 days since last scrub)
      - alert: ZFSPoolScrubStale
        expr: (time() - sis_zfs_pool_scrub_timestamp) > 3888000
          and sis_zfs_pool_scrub_timestamp > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "ZFS pool {{ $labels.pool }} last scrubbed >45 days ago"
          description: >-
             ZFS pool {{ $labels.pool }} has not been scrubbed in over 45 days.
             Monthly scrubs are recommended to detect and repair silent data corruption.

  - name: database_performance
    rules:
      - alert: PostgresSlowQueryRate
        expr: |
          sum(rate(pg_stat_statements_mean_exec_time_seconds{quantile="0.99"}[5m])) by (instance) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries (p99 >5s) on {{ $labels.instance }}"
          description: "The 99th percentile query execution time on {{ $labels.instance }} has exceeded 5 seconds for 10 minutes."

  - name: tunnel_health
    rules:
      - alert: CloudflaredTunnelDegraded
        expr: cloudflared_tunnel_connections{state="open"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cloudflare tunnel has no open connections"
          description: >-
            The Cloudflare tunnel (infra-tunnel) has zero open connections for 5 minutes.
            This may indicate a connectivity issue between TrueNAS and Cloudflare edge.

  - name: vulnerability_scanning
    rules:
      - alert: CriticalCVEFound
        expr: sis_vuln_scan_critical > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL CVEs found in {{ $labels.container }}"
          description: >-
            Container {{ $labels.container }} has {{ $value }} CRITICAL vulnerabilities.
            Run Trivy for details: docker run --rm aquasec/trivy image {{ $labels.container }}

      - alert: VulnScanStale
        expr: (time() - sis_vuln_scan_timestamp) > 604800
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Vulnerability scan not run in over 7 days"
          description: >-
            The weekly vulnerability scan has not completed in over 7 days.
            Check cron job: /mnt/pool_HDD_x2/infra/tools/vuln-scan.sh
