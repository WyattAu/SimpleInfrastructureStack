groups:
  # Filters applied to container alerts:
  #   image != "" — excludes host system cgroups (systemd, ssh, cron etc.)
  #     which lack the image label. These cgroups have
  #     container_spec_memory_limit_bytes=0 and container_spec_cpu_quota=0,
  #     causing division-by-zero that produces +Inf.
  #   container_spec_*_bytes/quota > 0 — excludes Docker containers that
  #     have no memory or CPU limit set in docker-compose. Without a limit,
  #     cAdvisor reports 0, which also produces +Inf on division.
  - name: container_health
    rules:
      - alert: ContainerOOMKilled
        expr: rate(container_oom_events_total{image!=""}[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} OOM killed"
          description: "Container {{ $labels.name }} was OOM killed."

      - alert: ContainerHighMemoryUsage
        expr: (container_memory_usage_bytes{image!=""} / container_spec_memory_limit_bytes{image!=""}) > 0.9
          and container_spec_memory_limit_bytes{image!=""} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} using >90% memory"
          description: "Container {{ $labels.name }} is using {{ $value | humanizePercentage }} of its memory limit."

      - alert: ContainerHighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{image!=""}[5m]) / container_spec_cpu_quota{image!=""} > 0.9
          and container_spec_cpu_quota{image!=""} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} using >90% CPU"
          description: "Container {{ $labels.name }} is using {{ $value | humanizePercentage }} of its CPU limit."

      - alert: ContainerRestartLoop
        expr: increase(container_restarts_total{image!=""}[1h]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restart loop detected"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in the last hour."

      - alert: ContainerDown
        expr: (time() - container_last_seen{image!=""}) > 120
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "Container {{ $labels.name }} has not been seen for over 2 minutes."

  - name: host_health
    rules:
      - alert: HostHighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage above 90%"
          description: "Host memory usage is at {{ $value | humanizePercentage }}."

      - alert: HostHighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host disk usage above 85%"
          description: "Host disk {{ $labels.device }} at {{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."

      - alert: DataPoolHighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/mnt/pool_HDD_x2"} / node_filesystem_size_bytes{mountpoint="/mnt/pool_HDD_x2"})) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Data pool disk usage above 85%"
          description: "Data pool {{ $labels.device }} at {{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."

      - alert: HostDiskInodesExhausted
        expr: (1 - (node_filesystem_files_free{mountpoint="/"} / node_filesystem_files{mountpoint="/"})) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
           summary: "Host disk inodes above 85%"
           description: "Host inodes at {{ $labels.mountpoint }} are {{ $value | humanizePercentage }} used."

  - name: service_health
    rules:
      - alert: TraefikHighErrorRate
        expr: (sum(rate(traefik_service_requests_total{code=~"5.."}[5m])) by (service) / sum(rate(traefik_service_requests_total[5m])) by (service)) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik high 5xx error rate for {{ $labels.service }}"
          description: "Service {{ $labels.service }} has a {{ $value | humanizePercentage }} 5xx error rate."

      - alert: TraefikRateLimitTriggered
        expr: sum(increase(traefik_service_requests_total{code="429"}[5m])) by (service) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Rate limiting active for {{ $labels.service }}"
          description: "{{ $labels.service }} received {{ $value }} rate-limit rejections in the last 5 minutes."

      - alert: PrometheusTSDBCompactionFailure
        expr: prometheus_tsdb_compactions_failed_total > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus TSDB compaction failures"
          description: "Prometheus has experienced TSDB compaction failures."

  - name: synapse_health
    rules:
      # synapse_event_processing_lag_seconds was removed in newer Synapse versions.
      # Use event fetch backlog as a proxy for processing health.
      - alert: SynapseHighEventFetchBacklog
        expr: synapse_event_fetch_ongoing > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Synapse has {{ $value }} ongoing event fetches"
          description: "Synapse has {{ $value }} concurrent event fetches, which may indicate replication lag or federation issues."

      - alert: SynapseDown
        expr: up{job="synapse"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Synapse is down"
          description: "The Synapse metrics endpoint is not responding. Matrix may be unavailable."

  - name: loki_health
    rules:
      - alert: LokiTooManyFailedRequests
        expr: sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m])) by (method, route) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Loki high 5xx rate on {{ $labels.method }} {{ $labels.route }}"
          description: "Loki is experiencing {{ $value }} 5xx errors/s on {{ $labels.method }} {{ $labels.route }}."

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Loki is down"
          description: "The Loki metrics endpoint is not responding. Log aggregation may be unavailable."

  - name: backup_health
    rules:
      # Backup container uses cron-trigger; if it's down, backups won't run.
      - alert: BackupContainerDown
        expr: (time() - container_last_seen{name=~"backup-.*", image!=""}) > 3600
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Backup container {{ $labels.name }} is down"
          description: "Backup container {{ $labels.name }} has not been seen for over 1 hour. Scheduled backups may be failing."

      # Backup script writes sis_backup_last_success metric via node-exporter textfile collector.
      # Alert if no successful backup in 26 hours (missed the 02:00 UTC daily window).
      - alert: BackupStale
        expr: (time() - sis_backup_last_success) > 93600
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No successful backup in over 26 hours"
          description: "Last successful backup was {{ $value | humanizeDuration }} ago. The daily 02:00 UTC backup may have failed."

  - name: system_health
    rules:
      # Host disk full warning (>85% on any filesystem)
      - alert: HostDiskFull
        expr: (1 - (node_filesystem_avail_bytes{fstype=~"ext4|zfs", mountpoint=~"/|/mnt/.*"} / node_filesystem_size_bytes{fstype=~"ext4|zfs", mountpoint=~"/|/mnt/.*"})) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above 85% on {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.device }} is {{ $value | humanizePercentage }} full."

      # Host memory exhaustion warning
      - alert: HostMemoryExhaustion
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host memory usage above 95%"
          description: "Available memory is below 5%. Risk of OOM kills. Current usage: {{ $value | humanizePercentage }}."

  - name: alertmanager_health
    rules:
      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager is down"
          description: "The Alertmanager service is not responding. Alert notifications will not be delivered."

  - name: tls_health
    rules:
      # Traefik exposes traefik_tls_certs_not_after as a Unix timestamp.
      # Alert 14 days before expiry (warn) and 7 days (critical).
      - alert: TLSCertificateExpiringSoon
        expr: (traefik_tls_certs_not_after - time()) / 86400 < 14
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate for {{ $labels.cn }} expires in {{ $value | humanizeDuration }}"
          description: "Certificate {{ $labels.cn }} (SANs: {{ $labels.sans }}) expires in less than 14 days."

      - alert: TLSCertificateCriticalExpiry
        expr: (traefik_tls_certs_not_after - time()) / 86400 < 7
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "TLS certificate for {{ $labels.cn }} expires in {{ $value | humanizeDuration }}"
          description: "Certificate {{ $labels.cn }} (SANs: {{ $labels.sans }}) expires in less than 7 days. Immediate renewal required."

  - name: keycloak_health
    rules:
      - alert: KeycloakDown
        expr: up{job="keycloak"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Keycloak is down"
          description: "Keycloak metrics endpoint is not responding. All OAuth2-authenticated services will fail."

      - alert: KeycloakHighMemoryUsage
        expr: jvm_memory_used_bytes{job="keycloak"} / jvm_memory_max_bytes{job="keycloak"} > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Keycloak JVM using >90% heap memory"
          description: "Keycloak JVM heap is at {{ $value | humanizePercentage }} utilization."

  - name: forgejo_health
    rules:
      - alert: ForgejoDown
        expr: up{job="forgejo"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Forgejo is down"
          description: "Forgejo metrics endpoint is not responding. Git hosting and CI runner registration unavailable."

  - name: swap_health
    rules:
      - alert: HighSwapUsage
        expr: (1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) > 0.5
          and node_memory_SwapTotal_bytes > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Swap usage above 50%"
          description: "System is using {{ $value | humanizePercentage }} of swap ({{ $value }}). May indicate memory pressure."

  - name: server_health
    rules:
      # If ALL critical infrastructure targets are down simultaneously,
      # the server itself is likely unreachable or Docker has crashed.
      # This is a composite alert that fires when Prometheus can't reach
      # Traefik, Keycloak, AND Forgejo — the three most essential services.
      - alert: ServerWidespreadOutage
        expr: |
          (up{job="traefik"} == 0) +
          (up{job="keycloak"} == 0) +
          (up{job="forgejo"} == 0) >= 3
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Widespread infrastructure outage detected"
          description: "All critical services (Traefik, Keycloak, Forgejo) are unreachable. The server may be down or Docker has crashed."
