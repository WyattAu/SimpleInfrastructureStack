[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[server]
protocol = http
http_addr = 0.0.0.0
http_port = 3000

[log]
mode = console
level = info

[security]
admin_user = admin

[users]
allow_sign_up = false

[auth.anonymous]
enabled = false
