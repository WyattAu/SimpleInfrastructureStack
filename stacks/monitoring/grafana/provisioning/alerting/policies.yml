apiVersion: 1
policies:
  - orgId: 1
    receiver: ntfy
    group_by: ['alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: ntfy
        matchers:
          - severity =~ "critical"
        group_wait: 30s
        repeat_interval: 4h
        continue: false
      - receiver: ntfy
        matchers:
          - severity =~ "warning"
        group_wait: 5m
        repeat_interval: 12h
        continue: false
