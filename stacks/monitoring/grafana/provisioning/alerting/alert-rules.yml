apiVersion: 1
groups:
  - orgId: 1
    name: infrastructure
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: container_down
        title: Container Down
        condition: A
        data:
          refId: container_down_query
          query:
            datasourceUid: "${DS_PROMETHEUS}"
            model:
              type: promql
              expr: time() - container_last_seen{container=~".+"} > 120
            for: 2m
            editorMode: code
          hide: false
        noDataState: Alerting
        execErrState: Error
        annotations:
          summary: "Container {{ $labels.container }} is down"
          description: "Container {{ $labels.container }} has not been seen in Prometheus for over 2 minutes."
          runbook_url: "https://github.com/WyattAu/SimpleInfrastructureStack"
        labels:
          severity: critical

      - uid: container_oom
        title: Container OOM Killed
        condition: A
        data:
          refId: container_oom_query
          query:
            datasourceUid: "${DS_PROMETHEUS}"
            model:
              type: promql
              expr: rate(container_oom_events_total{container=~".+"}[5m]) > 0
            for: 1m
            editorMode: code
          hide: false
        annotations:
          summary: "Container {{ $labels.container }} OOM killed"
          description: "Container {{ $labels.container }} was killed by the OOM killer."
        labels:
          severity: critical

      - uid: container_restart_loop
        title: Container Restart Loop
        condition: A
        data:
          refId: restart_loop_query
          query:
            datasourceUid: "${DS_PROMETHEUS}"
            model:
              type: promql
              expr: increase(container_restarts_total{container=~".+"}[1h]) > 5
            for: 5m
            editorMode: code
          hide: false
        annotations:
          summary: "Container {{ $labels.container }} restart loop"
          description: "Container {{ $labels.container }} has restarted {{ $value }} times in the last hour."
        labels:
          severity: warning

      - uid: container_high_memory
        title: Container High Memory
        condition: A
        data:
          refId: high_mem_query
          query:
            datasourceUid: "${DS_PROMETHEUS}"
            model:
              type: promql
              expr: (container_memory_usage_bytes{container=~".+"} / container_spec_memory_limit_bytes{container=~".+"}) > 0.9
            for: 5m
            editorMode: code
          hide: false
        annotations:
          summary: "Container {{ $labels.container }} high memory"
          description: "Container {{ $labels.container }} is using {{ $value | humanizePercentage }} of its memory limit."
        labels:
          severity: warning

      - uid: host_high_memory
        title: Host Memory High
        condition: A
        data:
          refId: host_mem_query
          query:
            datasourceUid: "${DS_PROMETHEUS}"
            model:
              type: promql
              expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
            for: 5m
            editorMode: code
          hide: false
        annotations:
          summary: "Host memory usage above 90%"
          description: "TrueNAS host memory usage is at {{ $value | humanizePercentage }}."
        labels:
          severity: warning

      - uid: host_disk_full
        title: Host Disk Space Low
        condition: A
        data:
          refId: disk_query
          query:
            datasourceUid: "${DS_PROMETHEUS}"
            model:
              type: promql
              expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 0.85
            for: 5m
            editorMode: code
          hide: false
        annotations:
          summary: "Host disk {{ $labels.device }} is above 85% full"
          description: "Disk {{ $labels.device }} at {{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."
        labels:
          severity: warning
        notifications:
          - unified_alerting_default
