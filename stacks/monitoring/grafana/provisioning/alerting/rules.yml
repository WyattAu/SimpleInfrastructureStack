apiVersion: 1
groups:
  - orgId: 1
    name: container_health.rules
    folder: Infrastructure
    interval: 60s
    rules:
      - uid: container_oom_killed
        title: Container OOM Killed
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: rate(container_oom_events_total{image!=""}[5m]) > 0
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} was OOM killed"
          description: "Container {{ $labels.name }} (image: {{ $labels.image }}) was OOM killed."
          runbook_url: "https://github.com/WyattAu/SimpleInfrastructureStack/wiki/Runbooks#container-oom-killed"

      - uid: container_high_memory
        title: Container High Memory Usage
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: >
                (container_memory_usage_bytes{image!=""}
                / container_spec_memory_limit_bytes{image!=""}) > 0.9
                and container_spec_memory_limit_bytes{image!=""} > 0
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} using >90% memory"
          description: "Container {{ $labels.name }} is using {{ $value }} of its memory limit (threshold: 90%)."
          runbook_url: "https://github.com/WyattAu/SimpleInfrastructureStack/wiki/Runbooks#container-high-memory"

      - uid: container_restart_loop
        title: Container Restart Loop
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: increase(container_restarts_total{image!=""}[1h]) > 5
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restart loop detected"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in the last hour."

      - uid: container_down
        title: Container Down
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: (time() - container_last_seen{image!=""}) > 120
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "Container {{ $labels.name }} has not been seen for over 2 minutes."

  - orgId: 1
    name: host_health.rules
    folder: Infrastructure
    interval: 60s
    rules:
      - uid: host_high_memory
        title: Host High Memory Usage
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage above 90%"
          description: "Host memory usage is at {{ $value }} (threshold: 90%)."

      - uid: host_high_disk
        title: Host High Disk Usage
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 0.85
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host disk usage above 85%"
          description: "Host disk {{ $labels.device }} at {{ $labels.mountpoint }} is {{ $value }} full (threshold: 85%)."

  - orgId: 1
    name: service_health.rules
    folder: Infrastructure
    interval: 60s
    rules:
      - uid: prometheus_tsdb_compaction
        title: Prometheus TSDB Compaction Failure
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: prometheus_tsdb_compactions_failed_total > 0
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus TSDB compaction failures"
          description: "Prometheus has experienced TSDB compaction failures."

  - orgId: 1
    name: synapse_health.rules
    folder: Infrastructure
    interval: 60s
    rules:
      - uid: synapse_down
        title: Synapse Down
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: up{job="synapse"} == 0
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Synapse is down"
          description: "The Synapse metrics endpoint is not responding. Matrix may be unavailable."

      - uid: synapse_event_fetch_backlog
        title: Synapse High Event Fetch Backlog
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: synapse_event_fetch_ongoing > 10
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Synapse has {{ $value }} ongoing event fetches"
          description: "Synapse has {{ $value }} concurrent event fetches, which may indicate replication lag."

  - orgId: 1
    name: loki_health.rules
    folder: Infrastructure
    interval: 60s
    rules:
      - uid: loki_down
        title: Loki Down
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: up{job="loki"} == 0
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Loki is down"
          description: "The Loki metrics endpoint is not responding. Log aggregation may be unavailable."

      - uid: loki_failed_requests
        title: Loki High 5xx Error Rate
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m])) by (method, route) > 1
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Loki high 5xx rate on {{ $labels.method }} {{ $labels.route }}"
          description: "Loki is experiencing {{ $value }} 5xx errors/s on {{ $labels.method }} {{ $labels.route }}."

  - orgId: 1
    name: woodpecker_health.rules
    folder: Infrastructure
    interval: 60s
    rules:
      - uid: woodpecker_down
        title: Woodpecker Server Down
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: up{job="woodpecker"} == 0
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Woodpecker server is down"
          description: "The Woodpecker CI server metrics endpoint is not responding. CI/CD pipelines may be unavailable."

  - orgId: 1
    name: log_alerts.rules
    folder: Infrastructure
    interval: 60s
    rules:
      - uid: log_keycloak_errors
        title: Keycloak Error Logs
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2094
            model:
              editorMode: code
              expr: 'count_over_time({job="keycloak"} |~ "(?i)(ERROR|FATAL|exception)" [5m]) > 10'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Keycloak logging >10 errors in 5m"
          description: "Keycloak has logged {{ $value }} error-level messages in the last 5 minutes."

      - uid: log_synapse_errors
        title: Synapse Error Logs
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2094
            model:
              editorMode: code
              expr: 'count_over_time({job="synapse"} |~ "(?i)(ERROR|CRITICAL|exception|traceback)" [5m]) > 20'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Synapse logging >20 errors in 5m"
          description: "Synapse has logged {{ $value }} error-level messages in the last 5 minutes."

      - uid: log_traefik_errors
        title: Traefik Error Logs
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2094
            model:
              editorMode: code
              expr: 'count_over_time({job="traefik"} |~ "(?i)(error|panic|fatal)" [5m]) > 10'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik logging >10 errors in 5m"
          description: "Traefik has logged {{ $value }} error-level messages in the last 5 minutes."

      - uid: log_oom_kill
        title: OOM Kill Detected in Logs
        condition: A
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2094
            model:
              editorMode: code
              expr: 'count_over_time({job=~".+"} |~ "(?i)oom.killed|out of memory|memory exhausted" [10m]) > 0'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 600
              to: 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OOM kill detected in container logs"
          description: "A container has logged an OOM kill event in the last 10 minutes."
