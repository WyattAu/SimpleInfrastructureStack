---
apiVersion: 1
groups:
  # Prometheus-based alerts are managed in alert_rules.yml and evaluated by
  # vmalert. Do NOT duplicate them here — that causes double notifications.
  # This file contains ONLY log-based alerts using VictoriaLogs LogsQL.

  - orgId: 1
    name: log_alerts.rules
    folder: Infrastructure
    interval: 60s
    rules:
       - uid: log_keycloak_errors
         title: Keycloak Error Logs
         condition: A
         noDataState: OK
         execErrState: OK
         data:
          - refId: A
            datasourceUid: P8E80F9AEF21F6940
            model:
              editorMode: code
              expr: '{job="keycloak"} _time:5m ~"(?i)(ERROR|FATAL|exception)" | stats count() as c | filter c:>10'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Keycloak logging >10 errors in 5m"
          description: "Keycloak has logged {{ $values.A }} error-level messages in the last 5 minutes."

       - uid: log_synapse_errors
         title: Synapse Error Logs
         condition: A
         noDataState: OK
         execErrState: OK
         data:
          - refId: A
            datasourceUid: P8E80F9AEF21F6940
            model:
              editorMode: code
              expr: '{job="synapse"} _time:5m ~"(?i)(ERROR|CRITICAL|exception|traceback)" | stats count() as c | filter c:>20'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Synapse logging >20 errors in 5m"
          description: "Synapse has logged {{ $values.A }} error-level messages in the last 5 minutes."

       - uid: log_traefik_errors
         title: Traefik Error Logs
         condition: A
         noDataState: OK
         execErrState: OK
         data:
          - refId: A
            datasourceUid: P8E80F9AEF21F6940
            model:
              editorMode: code
              expr: '{job="traefik"} _time:5m ~"(?i)(error|panic|fatal)" | stats count() as c | filter c:>10'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik logging >10 errors in 5m"
          description: "Traefik has logged {{ $values.A }} error-level messages in the last 5 minutes."

       - uid: log_oom_kill
         title: OOM Kill Detected in Logs
         condition: A
         noDataState: OK
         execErrState: OK
         data:
          - refId: A
            datasourceUid: P8E80F9AEF21F6940
            model:
              editorMode: code
              expr: '_time:10m ~"(?i)oom.killed|out of memory|memory exhausted" | stats count() as c | filter c:>0'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 600
              to: 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OOM kill detected in container logs"
          description: "A container has logged an OOM kill event in the last 10 minutes."

       - uid: log_forgejo_errors
         title: Forgejo Error Logs
         condition: A
         noDataState: OK
         execErrState: OK
         data:
          - refId: A
            datasourceUid: P8E80F9AEF21F6940
            model:
              editorMode: code
              expr: '{job="forgejo"} _time:5m ~"(?i)(error|panic|fatal|500)" | stats count() as c | filter c:>20'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Forgejo logging >20 errors in 5m"
          description: "Forgejo has logged {{ $values.A }} error-level messages in the last 5 minutes."

       - uid: log_vaultwarden_auth_failures
         title: Vaultwarden Authentication Failures
         condition: A
         noDataState: OK
         execErrState: OK
         data:
          - refId: A
            datasourceUid: P8E80F9AEF21F6940
            model:
              editorMode: code
              expr: '{job="vaultwarden"} _time:5m ~"(?i)(invalid.*password|username.*not.*found|failed.*auth)" | stats count() as c | filter c:>5'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Vaultwarden >5 auth failures in 5m"
          description: "Vaultwarden has logged {{ $values.A }} authentication failures in the last 5 minutes."

       - uid: log_paperless_consumer_errors
         title: Paperless Consumer Errors
         condition: A
         noDataState: OK
         execErrState: OK
         data:
          - refId: A
            datasourceUid: P8E80F9AEF21F6940
            model:
              editorMode: code
              expr: '{job="paperless-webserver"} _time:5m ~"(?i)(consumer.*error|ocr.*fail|document.*corrupt)" | stats count() as c | filter c:>10'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Paperless >10 consumer errors in 5m"
          description: "Paperless-ngx has logged {{ $values.A }} consumer/OCR errors in the last 5 minutes."

       - uid: log_crowdsec_alerts
         title: CrowdSec High Alert Rate
         condition: A
         noDataState: OK
         execErrState: OK
         data:
          - refId: A
            datasourceUid: P8E80F9AEF21F6940
            model:
              editorMode: code
              expr: '{job="crowdsec"} _time:5m ~"(?i)(scenario.*trigger|alert|blocked)" | stats count() as c | filter c:>50'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CrowdSec >50 alerts in 5m"
          description: "CrowdSec has triggered {{ $values.A }} scenarios in the last 5 minutes."

       - uid: log_victorialogs_ingestion_lag
         title: VictoriaLogs Ingestion Lag
         condition: A
         noDataState: OK
         execErrState: OK
         data:
          - refId: A
            datasourceUid: P8E80F9AEF21F6940
            model:
              editorMode: code
              expr: '{job="victorialogs"} _time:5m ~"(?i)(ingestion.*lag|write.*timeout|queue.*full)" | stats count() as c | filter c:>3'
              instant: true
              legendFormat: ""
              range: false
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VictoriaLogs ingestion lag detected"
          description: "VictoriaLogs has reported {{ $values.A }} ingestion lag events in the last 5 minutes."
