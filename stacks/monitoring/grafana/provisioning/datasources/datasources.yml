---
apiVersion: 1

# Delete old Prometheus and Loki datasources whose UIDs conflict with
# the new VictoriaMetrics/VictoriaLogs entries below.
deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1

datasources:
  - name: VictoriaMetrics
    type: victoriametrics-metrics-datasource
    uid: PBFA97CFB590B2093
    access: proxy
    url: http://monitoring-victoriametrics:8428
    isDefault: true
    jsonData:
      httpMethod: POST
    editable: true
  - name: VictoriaLogs
    type: victoriametrics-logs-datasource
    uid: P8E80F9AEF21F6940
    access: proxy
    url: http://monitoring-victorialogs:9428
    # VictoriaLogs uses uint32 account IDs, not string tenant IDs.
    # No X-Scope-OrgID header needed — default account (0) is used.
    jsonData:
      timeout: 120
    editable: true
  - name: Tempo
    type: tempo
    uid: PD5C1C5A2498B41BB
    access: proxy
    url: http://monitoring-tempo:3200
    editable: true
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: PBFA97CFB590B2093
      search:
        hide: false
      nodeGraph:
        enabled: true
      tracesToLogs:
        datasourceUid: P8E80F9AEF21F6940
        tags: ['job', 'instance', 'pod']
        mappedTags: [{key: 'service.name', value: 'service'}]
        mapTagNamesEnabled: true
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: PBFA97CFB590B2093
