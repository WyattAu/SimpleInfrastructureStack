services:
  prometheus-init:
    image: busybox:1.37.0
    container_name: monitoring-prometheus-init
    # The Prometheus process runs as the 'nobody' user (UID 65534).
    command: chown -R 65534:65534 /prometheus
    volumes:
      - ${DATA_BASE_PATH}/monitoring/prometheus:/prometheus
    networks: []

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: monitoring-prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    depends_on:
      prometheus-init:
        condition: service_completed_successfully
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ${DATA_BASE_PATH}/monitoring/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - traefik_net
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.middlewares=keycloak-auth"
      - "traefik.http.routers.prometheus.tls.certresolver=cloudflare"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.services.prometheus.loadbalancer.server.scheme=http"
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana-init:
    image: busybox:1.37.0
    container_name: monitoring-grafana-init
    # The Grafana process runs as UID 472 and GID 472.
    # This command changes the ownership of the mounted volume to match.
    command: chown -R 472:472 /var/lib/grafana
    volumes:
      - ${DATA_BASE_PATH}/monitoring/grafana:/var/lib/grafana
    networks: []

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: monitoring-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    depends_on:
      grafana-init:
        condition: service_completed_successfully
    volumes:
      - ${DATA_BASE_PATH}/monitoring/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - TZ=${TZ}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_SUBDOMAIN}.${DOMAIN_NAME}
      # --- OIDC / Keycloak Configuration ---
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Keycloak
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OIDC_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OIDC_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email roles
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.${DOMAIN_NAME}/realms/company-realm/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.${DOMAIN_NAME}/realms/company-realm/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.${DOMAIN_NAME}/realms/company-realm/protocol/openid-connect/userinfo

      # --- Attribute and Role Mapping ---
      - GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH=preferred_username
      - GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH=email
      - GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH=name

      # --- Grafana-Specific Role Mapping ---
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(resource_access['${GRAFANA_OIDC_CLIENT_ID}'].roles[*], 'grafana-admin') && 'Admin' || contains(resource_access['${GRAFANA_OIDC_CLIENT_ID}'].roles[*], 'grafana-editor') && 'Editor' || 'Viewer'
    networks:
      - traefik_net
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:${LOKI_VERSION}
    container_name: monitoring-loki
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    volumes:
      - ${DATA_BASE_PATH}/monitoring/loki:/loki
      - ./loki/config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION}
    container_name: monitoring-promtail
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend_net
    # No Docker healthcheck: image has no wget binary.
    # Container is verified via Ansible health check (running status).
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:${KUMA_VERSION}
    container_name: monitoring-kuma
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    volumes:
      - ${DATA_BASE_PATH}/monitoring/kuma:/app/data
    networks:
      - traefik_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.kuma.rule=Host(`${KUMA_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.kuma.entrypoints=websecure"
      - "traefik.http.routers.kuma.middlewares=keycloak-auth"
      - "traefik.http.routers.kuma.tls.certresolver=cloudflare"
      - "traefik.http.services.kuma.loadbalancer.server.port=3001"
    # Internal health check
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    image: ghcr.io/google/cadvisor:${CADVISOR_VERSION}
    container_name: monitoring-cadvisor
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Non-privileged mode: requires CADVISOR_VERSION >= v0.47 for cgroups v2 support.
    # Loses only process/perf_event collectors (niche). All core CPU/memory/disk/network
    # metrics preserved. Based on official K8s daemonset configuration.
    devices:
      - /dev/kmsg:/dev/kmsg:ro
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  textfile-init:
    image: busybox:1.37.0
    container_name: monitoring-textfile-init
    command: sh -c "mkdir -p /textfile-collector && echo '# HELP sis_backup_last_success Unix timestamp of last successful backup\n# TYPE sis_backup_last_success gauge\nsis_backup_last_success 0\n# HELP sis_backup_last_run Unix timestamp of last backup attempt\n# TYPE sis_backup_last_run gauge\nsis_backup_last_run 0' > /textfile-collector/backup.prom"
    volumes:
      - ${DATA_BASE_PATH}/monitoring/textfile-collector:/textfile-collector

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION}
    container_name: monitoring-node-exporter
    restart: unless-stopped
    depends_on:
      textfile-init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - ${DATA_BASE_PATH}/monitoring/textfile-collector:/textfile-collector:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.textfile.directory=/textfile-collector'
      # Exclude virtual/pseudo filesystems and ZFS child datasets.
      # Without rootfs, node-exporter reported boot-pool mounts as /, /home, etc.
      # With rootfs, it resolves all ~100 ZFS mounts including data pool children.
      # We keep only the two pool roots: / (boot-pool) and /mnt/pool_HDD_x2 (data pool).
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var|tmp|home|root|usr|run|opt|boot|mnt/pool_HDD_x2/(.+)|mnt/.ix-apps|audit|conf|data)($$|/)'
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:${ALERTMANAGER_VERSION}
    container_name: monitoring-alertmanager
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://${PROMETHEUS_SUBDOMAIN}.${DOMAIN_NAME}'
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-exporter-init:
    image: busybox:1.37.0
    container_name: monitoring-postgres-exporter-init
    # Creates .pgpass file from env vars for the postgres-exporter.
    # Required because several PG passwords contain URL-special characters
    # (& $ % ! # * / ^) that break DATA_SOURCE_NAME connection strings.
    # The exporter's lib/pq driver falls back to .pgpass when no password
    # is provided in the connection URL.
    # The exporter runs as nobody (UID 65534), so we chown accordingly.
    # Uses printenv to safely output password values without shell
    # interpretation of special characters ($, !, `, \, etc).
    # .pgpass format: hostname:port:database:username:password
    # Backslash and colon in passwords must be escaped with backslash.
    command: >
      sh -c "
        printf 'operations-postgres-forgejo:5432:forgejo:forgejo:%s\n' \"$$(printenv PG_EXPORTER_FORGEJO_PASSWORD)\" > /pgpass/.pgpass &&
        printf 'iam-postgres:5432:keycloak:keycloak:%s\n' \"$$(printenv PG_EXPORTER_KEYCLOAK_PASSWORD)\" >> /pgpass/.pgpass &&
        printf 'collaboration-postgres:5432:synapse:synapse:%s\n' \"$$(printenv PG_EXPORTER_SYNAPSE_PASSWORD)\" >> /pgpass/.pgpass &&
        printf 'rss-postgres:5432:freshrss:freshrss:%s\n' \"$$(printenv PG_EXPORTER_RSS_PASSWORD)\" >> /pgpass/.pgpass &&
        printf 'photos-postgres:5432:immich:immich:%s\n' \"$$(printenv PG_EXPORTER_PHOTOS_PASSWORD)\" >> /pgpass/.pgpass &&
        printf 'documents-postgres:5432:paperless:paperless:%s\n' \"$$(printenv PG_EXPORTER_DOCUMENTS_PASSWORD)\" >> /pgpass/.pgpass &&
        chmod 600 /pgpass/.pgpass &&
        chown 65534:65534 /pgpass/.pgpass
      "
    environment:
      - PG_EXPORTER_FORGEJO_PASSWORD=${PG_EXPORTER_FORGEJO_PASSWORD}
      - PG_EXPORTER_KEYCLOAK_PASSWORD=${PG_EXPORTER_KEYCLOAK_PASSWORD}
      - PG_EXPORTER_SYNAPSE_PASSWORD=${PG_EXPORTER_SYNAPSE_PASSWORD}
      - PG_EXPORTER_RSS_PASSWORD=${PG_EXPORTER_RSS_PASSWORD}
      - PG_EXPORTER_PHOTOS_PASSWORD=${PG_EXPORTER_PHOTOS_PASSWORD}
      - PG_EXPORTER_DOCUMENTS_PASSWORD=${PG_EXPORTER_DOCUMENTS_PASSWORD}
    volumes:
      - ${DATA_BASE_PATH}/monitoring/pgpass:/pgpass
    networks: []

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:${POSTGRES_EXPORTER_VERSION}
    container_name: monitoring-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres-exporter-init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    # Multi-target mode: each DATA_SOURCE_NAME_N connects to a different PG instance.
    # Passwords are NOT embedded in URLs — they contain special characters that
    # break URL parsing. Instead, the lib/pq driver reads .pgpass (PGPASSFILE).
    # Each PG user needs pg_read_all_stats role granted.
    environment:
      - PGPASSFILE=/pgpass/.pgpass
      - DATA_SOURCE_NAME=postgresql://forgejo@operations-postgres-forgejo:5432/forgejo?sslmode=disable
      - DATA_SOURCE_NAME_2=postgresql://keycloak@iam-postgres:5432/keycloak?sslmode=disable
      - DATA_SOURCE_NAME_3=postgresql://synapse@collaboration-postgres:5432/synapse?sslmode=disable
      - DATA_SOURCE_NAME_4=postgresql://freshrss@rss-postgres:5432/freshrss?sslmode=disable
      - DATA_SOURCE_NAME_5=postgresql://immich@photos-postgres:5432/immich?sslmode=disable
      - DATA_SOURCE_NAME_6=postgresql://paperless@documents-postgres:5432/paperless?sslmode=disable
      - PG_EXPORTER_AUTO_DISCOVER_DATABASES=false
    volumes:
      - ${DATA_BASE_PATH}/monitoring/pgpass:/pgpass:ro
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_net:
    external: true
  backend_net:
    external: true
