server {
    listen 80;
    server_name _;

    root /sites;

    # Health check endpoint for Docker
    location = /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Serve compiled Frappe/ERPNext assets
    # URL: /assets/frappe/dist/css/... -> /sites/frappe/dist/css/...
    # The volume (erpnext-assets) IS the assets directory, mounted at /sites
    location /assets/ {
        alias /sites/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve uploaded files
    # URL: /files/... -> /sites/erp.wyattau.com/public/files/...
    location /files/ {
        alias /sites/erp.wyattau.com/public/files/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Deny everything else
    location / {
        return 404;
    }
}
