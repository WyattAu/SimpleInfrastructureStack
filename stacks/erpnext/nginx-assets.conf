server {
    listen 80;
    server_name _;

    root /assets;

    # Serve assets with proper CORS and caching
    location /assets/ {
        alias /assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";

        # Try the exact file, then try without hash
        try_files $uri =404;
    }

    # Health check
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
