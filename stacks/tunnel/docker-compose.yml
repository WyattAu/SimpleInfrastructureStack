services:
  cloudflared:
    image: ghcr.io/wyattau/evergreenimageregistry/cloudflared:latest
    container_name: infra-tunnel
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    command: ["tunnel", "--config", "/etc/cloudflared/config.yml", "--metrics", "0.0.0.0:4788", "run"]
    volumes:
    - ./config.yml:/etc/cloudflared/config.yml:ro
    - ./credentials.json:/etc/cloudflared/credentials.json:ro
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
