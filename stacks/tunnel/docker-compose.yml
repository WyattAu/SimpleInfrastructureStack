services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: infra-tunnel
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    # No Traefik labels — the tunnel must be independent
    # If Traefik breaks, the tunnel must still work to deliver deploys
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
