# Watchtower connects to Docker daemon via docker-socket-proxy (TCP).
# This allows watchtower to run as non-root without direct socket access.
# Defense in depth: proxy can filter Docker API calls.
services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: updater-docker-socket-proxy
    restart: unless-stopped
    init: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - SETGID
    - SETUID
    - NET_BIND_SERVICE
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
    - CONTAINERS=1
    - POST=1
    - INFO=1
    - NETWORKS=0
    - VOLUMES=0
    networks:
    - updater_net
    healthcheck:
      test:
      - CMD
      - /usr/bin/nc
      - localhost
      - "2375"
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  watchtower:
    image: containrrr/watchtower:${WATCHTOWER_VERSION}
    container_name: updater-watchtower
    restart: unless-stopped
    init: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    command: --interval 86400 --cleanup --label-enable --monitor-only
    environment:
    - WATCHTOWER_NOTIFICATIONS=shoutrrr
    - WATCHTOWER_NOTIFICATION_URL=ntfy://${NTFY_URL}/${NTFY_TOPIC}?title=Watchtower+Update+Available
    - WATCHTOWER_LABEL_ENABLE=true
    - DOCKER_HOST=tcp://updater-docker-socket-proxy:2375
    - TZ=${TZ}
    depends_on:
    - docker-socket-proxy
    networks:
    - updater_net
    deploy:
      resources:
        limits:
          memory: 64M
          pids: 100
        reservations:
          memory: 16M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  updater_net:
    driver: bridge
