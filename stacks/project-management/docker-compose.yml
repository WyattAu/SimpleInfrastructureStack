# ===================================================================
# Taiga — Agile Project Management Platform
# ===================================================================
# Full-featured project management with Kanban boards, Scrum sprints,
# issue tracking, and wiki. Integrated with Keycloak SSO via
# oauth2-proxy.
#
# Architecture (8 containers):
#   taiga-gateway  — nginx reverse proxy, routes to internal services
#   taiga-front    — Angular SPA served by nginx
#   taiga-back     — Django REST API (gunicorn)
#   taiga-async    — Celery worker for async tasks (email, exports)
#   taiga-events   — Node.js WebSocket server for realtime updates
#   taiga-protected — Python microservice for signed media URLs
#   rabbitmq       — AMQP broker (events + async, separate vhosts)
#   postgres       — Dedicated PostgreSQL 16 (PG 18 not tested)
#
# SSO: Protected by oauth2-proxy (Keycloak OIDC) at Traefik level.
#   Taiga does not have native OIDC support, so oauth2-proxy provides
#   the authentication gate. First authenticated user becomes admin.
#
# Requirements:
#   - PostgreSQL (dedicated, PG 16 for Taiga compatibility)
#   - RabbitMQ (single instance, two vhosts)
#   - SMTP for notifications (uses global EMAIL_* variables)
#   - oauth2-proxy route for SSO

services:
  postgres-init:
    image: busybox:1.37.0
    container_name: project-management-postgres-init
    command: >
      sh -c "
        if [ \"$(stat -c '%u:%g' ${DATA_BASE_PATH}/project-management/postgres 2>/dev/null || echo wrong)\" != '1001:1000' ]; then
          mkdir -p ${DATA_BASE_PATH}/project-management/postgres &&
          chown -R 1001:1000 ${DATA_BASE_PATH}/project-management/postgres;
        else echo 'Ownership already correct';
        fi"
    volumes:
    - ${DATA_BASE_PATH}/project-management/postgres:/var/lib/postgresql/data
    networks:
    - backend_net

  postgres:
    image: ghcr.io/wyattau/evergreenimageregistry/postgres:latest
    container_name: project-management-postgres
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    # Required by postgres entrypoint: chown data dir, gosu/su-exec to drop to postgres user
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: taiga
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
    - ${DATA_BASE_PATH}/project-management/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d taiga"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - backend_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 128M
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq-init:
    image: rabbitmq:3.13-management
    container_name: project-management-rabbitmq-init
    # Creates the 'taiga' vhost needed by Taiga async/events workers.
    # RabbitMQ only creates the default '/' vhost on first boot.
    # Idempotent: rabbitmqctl add_vhost exits 0 if vhost exists when
    # using the management image. Uses rabbitmqctl directly.
    entrypoint: ["/bin/sh", "-c"]
    command:
    - |
      rabbitmqctl -q add_vhost taiga 2>/dev/null || true
      rabbitmqctl -q set_permissions -p taiga $$RABBITMQ_DEFAULT_USER ".*" ".*" ".*"
      echo "RabbitMQ vhost 'taiga' ready"
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - backend_net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: project-management-rabbitmq
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    # Required by rabbitmq entrypoint: chown data dir, su-exec to drop to rabbitmq user
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      # --- Memory Watermark Tuning ---
      # Default watermark is 40% of system RAM (~6G). With the system under
      # memory pressure (swap at 87%), RabbitMQ repeatedly hits the watermark,
      # causing CPU spikes from aggressive GC and queue paging. Set to 0.25
      # of container limit (256M * 0.25 = 64M absolute_watermark), which is
      # sufficient for 3 Taiga users with lightweight async/event queues.
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit memory_high_watermark 0.25
    volumes:
    - ${DATA_BASE_PATH}/project-management/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
    - backend_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-back-init:
    image: busybox:1.37.0
    container_name: project-management-back-init
    # Handles chown of named volumes that the upstream entrypoint does,
    # but which hangs on overlayfs. Runs once before taiga-back starts.
    # Uses busybox (not taiga-back image) to avoid needing env vars.
    command: >
      sh -c "
        chown -R 999:999 /taiga-static /taiga-media 2>/dev/null;
        echo 'Taiga volume ownership set'
      "
    volumes:
    - taiga-static-data:/taiga-static
    - taiga-media-data:/taiga-media
    networks:
    - backend_net

  taiga-back:
    image: ghcr.io/taigaio/taiga-back:latest
    container_name: project-management-back
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    # Required by taiga-back entrypoint: gosu taiga to drop privileges (uid 999)
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    entrypoint: ["/bin/bash", "/taiga-back/docker/entrypoint-custom.sh"]
    depends_on:
      taiga-back-init:
        condition: service_completed_successfully
      rabbitmq-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: taiga
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: project-management-postgres
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
      TAIGA_SITES_SCHEME: https
      TAIGA_SITES_DOMAIN: taiga.${DOMAIN_NAME}
      TAIGA_SUBPATH: ""
      EMAIL_BACKEND: smtp
      DEFAULT_FROM_EMAIL: noreply@${DOMAIN_NAME}
      EMAIL_USE_TLS: "True"
      EMAIL_USE_SSL: "False"
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      TAIGA_EVENTS_RABBITMQ_HOST: project-management-rabbitmq
      ENABLE_TELEMETRY: "False"
    volumes:
    - ./config/taiga-back/entrypoint.sh:/taiga-back/docker/entrypoint-custom.sh:ro
    - taiga-static-data:/taiga-back/static
    - taiga-media-data:/taiga-back/media
    networks:
    - backend_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8000' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-async:
    image: ghcr.io/taigaio/taiga-back:latest
    container_name: project-management-async
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    # Required by taiga-async entrypoint: gosu taiga to drop privileges (uid 999)
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    entrypoint: ["/bin/bash", "/taiga-back/docker/async_entrypoint-custom.sh"]
    depends_on:
      taiga-back-init:
        condition: service_completed_successfully
      rabbitmq-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: taiga
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: project-management-postgres
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
      TAIGA_SITES_SCHEME: https
      TAIGA_SITES_DOMAIN: taiga.${DOMAIN_NAME}
      TAIGA_SUBPATH: ""
      EMAIL_BACKEND: smtp
      DEFAULT_FROM_EMAIL: noreply@${DOMAIN_NAME}
      EMAIL_USE_TLS: "True"
      EMAIL_USE_SSL: "False"
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      TAIGA_ASYNC_RABBITMQ_HOST: project-management-rabbitmq
      ENABLE_TELEMETRY: "False"
    volumes:
    - ./config/taiga-back/async_entrypoint.sh:/taiga-back/docker/async_entrypoint-custom.sh:ro
    - taiga-static-data:/taiga-back/static
    - taiga-media-data:/taiga-back/media
    networks:
    - backend_net
    healthcheck:
      # pgrep not available in this image. Check PID 1 (celery) is alive.
      test: ["CMD-SHELL", "bash -c '[ -d /proc/1 ]' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-front:
    image: ghcr.io/taigaio/taiga-front:latest
    container_name: project-management-front
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    # Required by nginx entrypoint: chown /var/cache/nginx/client_temp
    # and s6-overlay su-exec to drop to nginx user
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    environment:
      TAIGA_URL: "https://taiga.${DOMAIN_NAME}"
      TAIGA_WEBSOCKETS_URL: "wss://taiga.${DOMAIN_NAME}"
      TAIGA_SUBPATH: ""
    networks:
    - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 64M
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-events:
    image: ghcr.io/taigaio/taiga-events:latest
    container_name: project-management-events
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    # Required by entrypoint: write /taiga-events/.env
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    depends_on:
      rabbitmq-init:
        condition: service_completed_successfully
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      TAIGA_EVENTS_RABBITMQ_HOST: project-management-rabbitmq
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
    networks:
    - backend_net
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8888 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 128M
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-protected:
    image: ghcr.io/taigaio/taiga-protected:latest
    container_name: project-management-protected
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    # Required by entrypoint: chown /taiga-protected/*
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    environment:
      MAX_AGE: "360"
      SECRET_KEY: ${TAIGA_SECRET_KEY}
    networks:
    - backend_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8003' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 128M
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-gateway:
    # Chainguard nginx: distroless, no shell, daily CVE rebuilds.
    # Free tier only provides :latest tag — pinned to digest for reproducibility.
    # Default port is 8080 (not 80).
    image: nginx:alpine
    container_name: project-management-gateway
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - SETGID
    - SETUID
    read_only: true
    tmpfs:
    - /tmp
    - /var/run
    - /var/cache/nginx
    - /var/lib/nginx/tmp
    depends_on:
    - taiga-front
    - taiga-back
    - taiga-events
    - taiga-protected
    volumes:
    - ./config/taiga-gateway/taiga.conf:/etc/nginx/conf.d/default.conf:ro
    - taiga-static-data:/taiga/static:ro
    - taiga-media-data:/taiga/media:ro
    networks:
    - traefik_net
    - backend_net
    # Chainguard nginx is distroless — no /bin/sh for CMD-SHELL healthcheck.
    # Relies on Traefik health checking via reverse proxy.
    # distroless_no_shell exemption covers this in OPA policy.
    labels:
    - "traefik.enable=true"
    - "traefik.docker.network=traefik_net"
    - "traefik.http.routers.taiga.rule=Host(`taiga.${DOMAIN_NAME}`)"
    - "traefik.http.routers.taiga.entrypoints=websecure"
    - "traefik.http.routers.taiga.tls.certresolver=cloudflare"
    - "traefik.http.routers.taiga.middlewares=global-rate-limit@file,keycloak-auth@file"
    - "traefik.http.services.taiga.loadbalancer.server.port=8080"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 64M
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  taiga-static-data:
  taiga-media-data:

networks:
  traefik_net:
    external: true
  backend_net:
    external: true
