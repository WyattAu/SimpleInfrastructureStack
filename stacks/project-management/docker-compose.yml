# ===================================================================
# Taiga — Agile Project Management Platform
# ===================================================================
# Full-featured project management with Kanban boards, Scrum sprints,
# issue tracking, and wiki. Integrated with Keycloak SSO via
# oauth2-proxy.
#
# Architecture (8 containers):
#   taiga-gateway  — nginx reverse proxy, routes to internal services
#   taiga-front    — Angular SPA served by nginx
#   taiga-back     — Django REST API (gunicorn)
#   taiga-async    — Celery worker for async tasks (email, exports)
#   taiga-events   — Node.js WebSocket server for realtime updates
#   taiga-protected — Python microservice for signed media URLs
#   rabbitmq       — AMQP broker (events + async, separate vhosts)
#   postgres       — Dedicated PostgreSQL 16 (PG 18 not tested)
#
# SSO: Protected by oauth2-proxy (Keycloak OIDC) at Traefik level.
#   Taiga does not have native OIDC support, so oauth2-proxy provides
#   the authentication gate. First authenticated user becomes admin.
#
# Requirements:
#   - PostgreSQL (dedicated, PG 16 for Taiga compatibility)
#   - RabbitMQ (single instance, two vhosts)
#   - SMTP for notifications (uses global EMAIL_* variables)
#   - oauth2-proxy route for SSO

services:
  postgres-init:
    image: busybox:1.37.0
    container_name: project-management-postgres-init
    command: >
      sh -c "
        if [ \"$(stat -c '%u:%g' ${DATA_BASE_PATH}/project-management/postgres 2>/dev/null || echo wrong)\" != '1001:1000' ]; then
          mkdir -p ${DATA_BASE_PATH}/project-management/postgres &&
          chown -R 1001:1000 ${DATA_BASE_PATH}/project-management/postgres;
        else echo 'Ownership already correct';
        fi"
    volumes:
      - ${DATA_BASE_PATH}/project-management/postgres:/var/lib/postgresql/data
    networks:
      - backend_net

  postgres:
    image: postgres:16-alpine
    container_name: project-management-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: taiga
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_BASE_PATH}/project-management/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d taiga"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION}
    container_name: project-management-rabbitmq
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - ${DATA_BASE_PATH}/project-management/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-back:
    image: taigaio/taiga-back:${TAIGA_VERSION}
    container_name: project-management-back
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRES_DB: taiga
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: project-management-postgres
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
      TAIGA_SITES_SCHEME: https
      TAIGA_SITES_DOMAIN: taiga.${DOMAIN_NAME}
      TAIGA_SUBPATH: ""
      EMAIL_BACKEND: smtp
      DEFAULT_FROM_EMAIL: noreply@${DOMAIN_NAME}
      EMAIL_USE_TLS: "True"
      EMAIL_USE_SSL: "False"
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      ENABLE_TELEMETRY: "False"
    volumes:
      - taiga-static-data:/taiga-back/static
      - taiga-media-data:/taiga-back/media
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-async:
    image: taigaio/taiga-back:${TAIGA_VERSION}
    container_name: project-management-async
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/taiga-back/docker/async_entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRES_DB: taiga
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: project-management-postgres
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
      TAIGA_SITES_SCHEME: https
      TAIGA_SITES_DOMAIN: taiga.${DOMAIN_NAME}
      TAIGA_SUBPATH: ""
      EMAIL_BACKEND: smtp
      DEFAULT_FROM_EMAIL: noreply@${DOMAIN_NAME}
      EMAIL_USE_TLS: "True"
      EMAIL_USE_SSL: "False"
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      ENABLE_TELEMETRY: "False"
    volumes:
      - taiga-static-data:/taiga-back/static
      - taiga-media-data:/taiga-back/media
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-front:
    image: taigaio/taiga-front:${TAIGA_VERSION}
    container_name: project-management-front
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TAIGA_URL: "https://taiga.${DOMAIN_NAME}"
      TAIGA_WEBSOCKETS_URL: "wss://taiga.${DOMAIN_NAME}"
      TAIGA_SUBPATH: ""
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-events:
    image: taigaio/taiga-events:${TAIGA_VERSION}
    container_name: project-management-events
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-protected:
    image: taigaio/taiga-protected:${TAIGA_VERSION}
    container_name: project-management-protected
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MAX_AGE: "360"
      SECRET_KEY: ${TAIGA_SECRET_KEY}
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  taiga-gateway:
    image: nginx:1.27-alpine
    container_name: project-management-gateway
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - taiga-front
      - taiga-back
      - taiga-events
      - taiga-protected
    volumes:
      - ./config/taiga-gateway/taiga.conf:/etc/nginx/conf.d/default.conf:ro
      - taiga-static-data:/taiga/static:ro
      - taiga-media-data:/taiga/media:ro
    networks:
      - traefik_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.taiga.rule=Host(`taiga.${DOMAIN_NAME}`)"
      - "traefik.http.routers.taiga.entrypoints=websecure"
      - "traefik.http.routers.taiga.tls.certresolver=cloudflare"
      - "traefik.http.routers.taiga.middlewares=global-rate-limit,keycloak-auth@docker"
      - "traefik.http.services.taiga.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  taiga-static-data:
  taiga-media-data:

networks:
  traefik_net:
    external: true
  backend_net:
    external: true
