services:
  postgres-init:
    image: busybox:1.37.0
    container_name: collaboration-postgres-init
    user: ${PUID}:${PGID}
    volumes:
    - ${DATA_BASE_PATH}/collaboration:/data
    command:
    - mkdir
    - -p
    - /data/postgres
  postgres-collab:
    image: postgres:${POSTGRES_VERSION}
    container_name: collaboration-postgres
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    volumes:
    - ${DATA_BASE_PATH}/collaboration/postgres:/var/lib/postgresql
    environment:
    - POSTGRES_DB=${POSTGRES_DB_SYNAPSE}
    - POSTGRES_USER=${POSTGRES_USER_SYNAPSE}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_SYNAPSE}
    - POSTGRES_INITDB_ARGS=--encoding='UTF8' --lc-collate='C' --lc-ctype='C'
    networks:
    - data_net
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER_SYNAPSE} -d ${POSTGRES_DB_SYNAPSE}
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  synapse-init:
    image: matrixdotorg/synapse:${SYNAPSE_VERSION}
    container_name: collaboration-synapse-init
    depends_on:
      postgres-collab:
        condition: service_healthy
    volumes:
    - ${DATA_BASE_PATH}/collaboration/synapse:/data
    environment:
    - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
    - SYNAPSE_REPORT_STATS=${SYNAPSE_REPORT_STATS}
    - POSTGRES_DB_SYNAPSE=${POSTGRES_DB_SYNAPSE}
    - POSTGRES_USER_SYNAPSE=${POSTGRES_USER_SYNAPSE}
    - POSTGRES_PASSWORD_SYNAPSE=${POSTGRES_PASSWORD_SYNAPSE}
    - PUID=${PUID}
    - PGID=${PGID}
    - SMTP_HOST=${SMTP_HOST}
    - SMTP_PORT=${SMTP_PORT}
    - SMTP_USERNAME=${SMTP_USERNAME}
    - SMTP_PASSWORD=${SMTP_PASSWORD}
    - SMTP_FROM=${SMTP_FROM}
    entrypoint: ''
    command:
    - /bin/sh
    - -c
    - "if [ ! -f /data/homeserver.yaml ]; then\n  echo 'Config not found. Generating new config...';\n  /start.py generate;\n\n  echo 'Commenting out default database and appending new config...';\n  # This robust sed command finds the database block and comments it out.\n  sed -i -e '/^database:/,/\\/data\\/homeserver.db/s/^/#/' /data/homeserver.yaml;\n\n  # A single, clean heredoc to append all our custom settings.\n  cat << EOF >> /data/homeserver.yaml\n\n#\n# -- Custom Configuration Added by Initializer --\n#\n\n# Database configuration for PostgreSQL\ndatabase:\n  name: psycopg2\n  args:\n    user: ${POSTGRES_USER_SYNAPSE}\n    password: ${POSTGRES_PASSWORD_SYNAPSE}\n    database: ${POSTGRES_DB_SYNAPSE}\n    host: postgres-collab\n    port: 5432\n    cp_min: 5\n    cp_max: 10\n\n  # CORS configuration for Element Web\n  enable_cors: true\n  public_cors_origins:\n    - \"https://${ELEMENT_SUBDOMAIN}.${DOMAIN_NAME}\"\n\n# Email configuration for password resets and notifications\nemail:\n\
      \  smtp_host: \"${SMTP_HOST}\"\n  smtp_port: ${SMTP_PORT}\n  smtp_user: \"${SMTP_USERNAME}\"\n  smtp_pass: \"${SMTP_PASSWORD}\"\n  notif_from: \"${SMTP_FROM}\"\n  app_name: Matrix\n  enable_tls: true\nEOF\nelse\n  echo 'Config already exists. Skipping generation.';\nfi\n\n# Ensure Prometheus metrics are enabled (for existing installs too).\n# This runs on every init, but is idempotent.\nif ! grep -q 'enable_metrics: true' /data/homeserver.yaml; then\n  echo 'Enabling Prometheus metrics...';\n  echo 'enable_metrics: true' >> /data/homeserver.yaml;\nfi\nif ! grep -q 'port: 19090' /data/homeserver.yaml; then\n  echo 'Adding metrics listener on port 19090...';\n  # Use printf to append metrics listener. We append it as a second\n  # listeners block which Synapse merges (Synapse supports multiple\n  # listeners blocks natively — it collects all entries).\n  printf '\\nlisteners:\\n  - port: 19090\\n    type: http\\n    x_forwarded: false\\n    resources:\\n      - names: [metrics]\\n  \
      \      compress: false\\n' >> /data/homeserver.yaml;\nfi\n\n# Ensure SMTP email is configured (for existing installs too).\nif ! grep -q 'smtp_host:' /data/homeserver.yaml; then\n  echo 'Adding SMTP email configuration...';\n  printf '\\nemail:\\n  smtp_host: \"%s\"\\n  smtp_port: %s\\n  smtp_user: \"%s\"\\n  smtp_pass: \"%s\"\\n  notif_from: \"%s\"\\n  app_name: Matrix\\n  enable_tls: true\\n' \"${SMTP_HOST}\" \"${SMTP_PORT}\" \"${SMTP_USERNAME}\" \"${SMTP_PASSWORD}\" \"${SMTP_FROM}\" >> /data/homeserver.yaml;\nfi\n"
  synapse-chown:
    image: busybox:1.37.0
    container_name: collaboration-synapse-chown
    depends_on:
      synapse-init:
        condition: service_completed_successfully
    user: root
    volumes:
    - ${DATA_BASE_PATH}/collaboration/synapse:/data
    environment:
    - PUID=${PUID}
    - PGID=${PGID}
    command: sh -c "chown -R ${PUID}:${PGID} /data"
  synapse:
    image: matrixdotorg/synapse:${SYNAPSE_VERSION}
    container_name: collaboration-synapse
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    user: ${PUID}:${PGID}
    depends_on:
      postgres-collab:
        condition: service_healthy
      synapse-init:
        condition: service_completed_successfully
      synapse-chown:
        condition: service_completed_successfully
    volumes:
    - ${DATA_BASE_PATH}/collaboration/synapse:/data
    environment:
    - PUID=${PUID}
    - PGID=${PGID}
    - TZ=${TZ}
    networks:
    - traefik_net
    - backend_net
    - data_net
    healthcheck:
      test:
      - CMD
      - curl
      - -fSs
      - http://127.0.0.1:8008/_matrix/client/versions
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.routers.matrix-cs.rule=Host(`${MATRIX_SUBDOMAIN}.${DOMAIN_NAME}`)
    - traefik.http.routers.matrix-cs.entrypoints=websecure
    - traefik.http.routers.matrix-cs.tls.certresolver=cloudflare
    - traefik.http.services.matrix-cs.loadbalancer.server.port=8008
    - traefik.http.services.matrix-cs.loadbalancer.server.scheme=http
    - traefik.tcp.routers.matrix-ss.rule=HostSNI(`*`)
    - traefik.tcp.routers.matrix-ss.entrypoints=matrix
    - traefik.tcp.routers.matrix-ss.service=matrix-ss-svc
    - traefik.tcp.routers.matrix-ss.tls.passthrough=true
    - traefik.tcp.services.matrix-ss-svc.loadbalancer.server.port=8448
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
          pids: 100
        reservations:
          cpus: '0.5'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  element-init:
    image: busybox:1.37.0
    container_name: collaboration-element-init
    user: ${PUID}:${PGID}
    depends_on:
      synapse-init:
        condition: service_completed_successfully
    volumes:
    - ${DATA_BASE_PATH}/collaboration/element-config:/config
    environment:
    - MATRIX_SUBDOMAIN=${MATRIX_SUBDOMAIN}
    - DOMAIN_NAME=${DOMAIN_NAME}
    command:
    - /bin/sh
    - -c
    - "if [ ! -f /config/config.json ]; then\n  echo \"Creating Element config file...\";\n  cat << EOF > /config/config.json\n{\n    \"default_server_config\": {\n        \"m.homeserver\": {\n            \"base_url\": \"https://'${MATRIX_SUBDOMAIN}.${DOMAIN_NAME}'\",\n            \"server_name\": \"'${DOMAIN_NAME}'\"\n        }\n    },\n    \"disable_custom_urls\": true,\n    \"disable_guests\": true,\n    \"disable_3pid_login\": true,\n    \"brand\": \"${ELEMENT_ROOM_NAME}\"\n}\nEOF\nelse\n  echo \"Element config already exists.\";\nfi\n"
  element-web:
    image: vectorim/element-web:${ELEMENT_VERSION}
    container_name: collaboration-element
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    depends_on:
    - element-init
    volumes:
    - ${DATA_BASE_PATH}/collaboration/element-config/config.json:/app/config.json:ro
    networks:
    - traefik_net
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:80/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.routers.element.rule=Host(`${ELEMENT_SUBDOMAIN}.${DOMAIN_NAME}`)
    - traefik.http.routers.element.entrypoints=websecure
    - traefik.http.routers.element.tls.certresolver=cloudflare
    - traefik.http.routers.element.middlewares=global-rate-limit
    - traefik.http.services.element.loadbalancer.server.port=80
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 64M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  matrix-hookshot:
    image: ghcr.io/wyattau/matrix-hookshot:${HOOKSHOT_VERSION}
    container_name: collaboration-hookshot
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    depends_on:
      synapse:
        condition: service_started
    volumes:
    - ${DATA_BASE_PATH}/collaboration/hookshot:/data
    - ./config/hookshot/config.yml:/data/config.yml:ro
    networks:
    - traefik_net
    - backend_net
    - data_net
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.routers.hookshot.rule=Host(`${HOOKSHOT_SUBDOMAIN}.${DOMAIN_NAME}`)
    - traefik.http.routers.hookshot.entrypoints=websecure
    - traefik.http.routers.hookshot.tls.certresolver=cloudflare
    - traefik.http.services.hookshot.loadbalancer.server.port=8080
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  traefik_net:
    external: true
  backend_net:
    external: true
  data_net:
    external: true
