services:
  postgres-init:
    image: busybox:1.37.0
    container_name: collaboration-postgres-init
    user: "${PUID}:${PGID}"
    volumes:
      - ${DATA_BASE_PATH}/collaboration:/data
    command: ["mkdir", "-p", "/data/postgres"]

  postgres-collab:
    image: postgres:${POSTGRES_VERSION}
    container_name: collaboration-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    depends_on:
      postgres-init:
        condition: service_completed_successfully
    volumes:
      - postgres_data:/var/lib/postgresql
      #- ${DATA_BASE_PATH}/collaboration/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB_SYNAPSE}
      - POSTGRES_USER=${POSTGRES_USER_SYNAPSE}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_SYNAPSE}
      - POSTGRES_INITDB_ARGS=--encoding='UTF8' --lc-collate='C' --lc-ctype='C'
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_SYNAPSE} -d ${POSTGRES_DB_SYNAPSE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  synapse-init:
    image: matrixdotorg/synapse:${SYNAPSE_VERSION}
    container_name: collaboration-synapse-init
    depends_on:
      postgres-collab:
        condition: service_healthy
    volumes:
      - ${DATA_BASE_PATH}/collaboration/synapse:/data
    environment:
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
      - SYNAPSE_REPORT_STATS=${SYNAPSE_REPORT_STATS}
      - POSTGRES_DB_SYNAPSE=${POSTGRES_DB_SYNAPSE}
      - POSTGRES_USER_SYNAPSE=${POSTGRES_USER_SYNAPSE}
      - POSTGRES_PASSWORD_SYNAPSE=${POSTGRES_PASSWORD_SYNAPSE}
      - PUID=${PUID}
      - PGID=${PGID}
    entrypoint: ""
    command:
      - "/bin/sh"
      - "-c"
      - |
        if [ ! -f /data/homeserver.yaml ]; then
          echo 'Config not found. Generating new config...';
          /start.py generate;

          echo 'Commenting out default database and appending new config...';
          # This robust sed command finds the database block and comments it out.
          sed -i -e '/^database:/,/\/data\/homeserver.db/s/^/#/' /data/homeserver.yaml;

          # A single, clean heredoc to append all our custom settings.
          cat << EOF >> /data/homeserver.yaml

        #
        # -- Custom Configuration Added by Initializer --
        #

        # Database configuration for PostgreSQL
        database:
          name: psycopg2
          args:
            user: ${POSTGRES_USER_SYNAPSE}
            password: ${POSTGRES_PASSWORD_SYNAPSE}
            database: ${POSTGRES_DB_SYNAPSE}
            host: postgres-collab
            port: 5432
            cp_min: 5
            cp_max: 10

        # CORS configuration for Element Web
        enable_cors: true
        public_cors_origins:
          - "https://${ELEMENT_SUBDOMAIN}.${DOMAIN_NAME}"
        EOF
        else
          echo 'Config already exists. Skipping generation.';
        fi

        # Ensure Prometheus metrics are enabled (for existing installs too).
        # This runs on every init, but is idempotent.
        if ! grep -q 'enable_metrics: true' /data/homeserver.yaml; then
          echo 'Enabling Prometheus metrics...';
          echo 'enable_metrics: true' >> /data/homeserver.yaml;
        fi
        if ! grep -q 'port: 19090' /data/homeserver.yaml; then
          echo 'Adding metrics listener on port 19090...';
          # Use printf to append metrics listener. We append it as a second
          # listeners block which Synapse merges (Synapse supports multiple
          # listeners blocks natively — it collects all entries).
          printf '\nlisteners:\n  - port: 19090\n    type: http\n    x_forwarded: false\n    resources:\n      - names: [metrics]\n        compress: false\n' >> /data/homeserver.yaml;
        fi

  synapse-chown:
    image: busybox:1.37.0
    container_name: collaboration-synapse-chown
    depends_on:
      synapse-init:
        condition: service_completed_successfully
    user: root
    volumes:
      - ${DATA_BASE_PATH}/collaboration/synapse:/data
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    command: sh -c "chown -R ${PUID}:${PGID} /data"

  synapse:
    image: matrixdotorg/synapse:${SYNAPSE_VERSION}
    container_name: collaboration-synapse
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    user: "${PUID}:${PGID}"
    depends_on:
      postgres-collab:
        condition: service_healthy
      synapse-init:
        condition: service_completed_successfully
      synapse-chown:
        condition: service_completed_successfully
    volumes:
      - ${DATA_BASE_PATH}/collaboration/synapse:/data
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks:
      - traefik_net
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "traefik.enable=true"
      # HTTP for client connection
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.matrix-cs.rule=Host(`${MATRIX_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.matrix-cs.entrypoints=websecure"
      - "traefik.http.routers.matrix-cs.tls.certresolver=cloudflare"
      - "traefik.http.services.matrix-cs.loadbalancer.server.port=8008"
      - "traefik.http.services.matrix-cs.loadbalancer.server.scheme=http"
      # TCP for federation
      - "traefik.tcp.routers.matrix-ss.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.matrix-ss.entrypoints=matrix"
      - "traefik.tcp.routers.matrix-ss.service=matrix-ss-svc"
      - "traefik.tcp.routers.matrix-ss.tls.passthrough=true"
      - "traefik.tcp.services.matrix-ss-svc.loadbalancer.server.port=8448"
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  element-init:
    image: busybox:1.37.0
    container_name: collaboration-element-init
    user: "${PUID}:${PGID}"
    depends_on:
      synapse-init:
        condition: service_completed_successfully
    volumes:
      - ${DATA_BASE_PATH}/collaboration/element-config:/config
    environment:
      - MATRIX_SUBDOMAIN=${MATRIX_SUBDOMAIN}
      - DOMAIN_NAME=${DOMAIN_NAME}
    command:
      - "/bin/sh"
      - "-c"
      - |
        if [ ! -f /config/config.json ]; then
          echo "Creating Element config file...";
          cat << EOF > /config/config.json
        {
            "default_server_config": {
                "m.homeserver": {
                    "base_url": "https://'${MATRIX_SUBDOMAIN}.${DOMAIN_NAME}'",
                    "server_name": "'${DOMAIN_NAME}'"
                }
            },
            "disable_custom_urls": true,
            "disable_guests": true,
            "disable_3pid_login": true,
            "brand": "${ELEMENT_ROOM_NAME}"
        }
        EOF
        else
          echo "Element config already exists.";
        fi

  element-web:
    image: vectorim/element-web:${ELEMENT_VERSION}
    container_name: collaboration-element
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # read_only not feasible: image runs as user nginx (UID 101) and entrypoint
    # writes to /etc/nginx/conf.d, /var/log/nginx, /var/cache/nginx. tmpfs mounts
    # default to root ownership, causing permission denied for the nginx user.

    depends_on:
      - element-init
    volumes:
      - ${DATA_BASE_PATH}/collaboration/element-config/config.json:/app/config.json:ro
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.element.rule=Host(`${ELEMENT_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.element.entrypoints=websecure"
      - "traefik.http.routers.element.tls.certresolver=cloudflare"
      - "traefik.http.services.element.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Hookshot is disabled until properly configured (needs config.yml + registration.yml).
  # To enable: remove the profiles line and create config at
  # ${DATA_BASE_PATH}/collaboration/hookshot/config.yml, then register with Synapse.
  matrix-hookshot:
    image: halfshot/matrix-hookshot:${HOOKSHOT_VERSION}
    container_name: collaboration-hookshot
    restart: "no"
    profiles:
      - disabled
    security_opt:
      - no-new-privileges:true

    depends_on:
      synapse:
        condition: service_started
    volumes:
      - ${DATA_BASE_PATH}/collaboration/hookshot:/data
    networks:
      - traefik_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.hookshot.rule=Host(`${HOOKSHOT_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.hookshot.entrypoints=websecure"
      - "traefik.http.routers.hookshot.tls.certresolver=cloudflare"
      - "traefik.http.services.hookshot.loadbalancer.server.port=8080"
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_net:
    external: true
  backend_net:
    external: true

volumes:
  postgres_data:
    driver_opts:
      type: none
      o: bind
      device: ${DATA_BASE_PATH}/collaboration/postgres
