# ===================================================================
# Services — grouped by category, with status monitoring
# ===================================================================
# Homepage auto-detects container status via Docker socket.
# siteMonitor: optional URL to check for HTTP status.
# Services without public URLs show container status only.

- Infrastructure:
    - Traefik:
        icon: traefik-proxy.svg
        href: https://traefik.wyattau.com/dashboard/#/http/routers
        description: Reverse Proxy
        siteMonitor: https://traefik.wyattau.com/dashboard/#/http/routers
    - Forgejo:
        icon: forgejo.webp
        href: https://forgejo.wyattau.com
        description: Code & CI
        siteMonitor: https://forgejo.wyattau.com

- Identity & Security:
