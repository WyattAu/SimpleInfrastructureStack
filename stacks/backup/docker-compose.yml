services:
  backup-restic:
    image: restic/restic:${RESTIC_VERSION}
    container_name: backup-restic
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /root/.cache/restic
    volumes:
      - ${DATA_BASE_PATH}:/data:ro
      - /mnt/pool_HDD_x2/infra/stacks/terraform:/terraform:ro
      - ${BACKUP_BASE_PATH}/restic-repo:/restic-repo
    environment:
      - RESTIC_REPOSITORY=/restic-repo
      - RESTIC_PASSWORD=${RESTIC_PASSWORD}
      # Optional: S3/B2/SFTP remote backup
      # - AWS_ACCESS_KEY_ID=${BACKUP_S3_KEY}
      # - AWS_SECRET_ACCESS_KEY=${BACKUP_S3_SECRET}
      # - RESTIC_REPOSITORY=s3:https://s3.example.com/bucket/repo
    entrypoint: ["tail", "-f", "/dev/null"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backup-cron-trigger:
    build:
      context: .
      dockerfile: cron-trigger.Dockerfile
    container_name: backup-cron-trigger
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - backup-restic
    volumes:
      - ./scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_BASE_PATH}/monitoring/textfile-collector:/textfile-collector
    environment:
      - TZ=${TZ}
      - CRON_SCHEDULE=0 2 * * *
      - RESTORE_TEST_SCHEDULE=${RESTORE_TEST_SCHEDULE:-0 3 1 * *}
      # --- Backup Source ---
      - BACKUP_DATA_PATH=/data
      # --- Restic Config ---
      - RESTIC_REPOSITORY=/restic-repo
      - RESTIC_PASSWORD=${RESTIC_PASSWORD}
      # --- Retention Policy ---
      - RESTIC_KEEP_HOURLY=24
      - RESTIC_KEEP_DAILY=7
      - RESTIC_KEEP_WEEKLY=4
      - RESTIC_KEEP_MONTHLY=6
      - RESTIC_KEEP_YEARLY=3
      # --- Offsite Backup (Backblaze B2) ---
      # Populated from secrets/backup.env. Offsite sync runs after each local backup.
      - OFFSITE_REPO=${OFFSITE_REPO}
      - OFFSITE_AWS_KEY=${OFFSITE_AWS_KEY}
      - OFFSITE_AWS_SECRET=${OFFSITE_AWS_SECRET}
      # --- Restore Test Notifications ---
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      # --- Keycloak Realm Export ---
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "$$CRON_SCHEDULE /scripts/run-backup.sh" > /etc/crontabs/root
        echo "30 1 * * * /scripts/run-keycloak-export.sh" >> /etc/crontabs/root
        echo "$$RESTORE_TEST_SCHEDULE /scripts/run-restore-test.sh" >> /etc/crontabs/root
        crond -f /etc/crontabs/root
    networks: []
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks: {}
