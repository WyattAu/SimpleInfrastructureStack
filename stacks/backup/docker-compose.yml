services:
  backup-restic:
    image: restic/restic:0.17.3
    container_name: backup-restic
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    # Use default bridge network — Docker embedded DNS (127.0.0.11) is broken
    # on TrueNAS user-defined networks. The default bridge copies the host's
    # /etc/resolv.conf directly, bypassing the broken embedded DNS.
    network_mode: bridge
    volumes:
    - ${DATA_BASE_PATH}:/data:ro
    - /mnt/pool_HDD_x2/infra/stacks/terraform:/terraform:ro
    - ${BACKUP_BASE_PATH}/restic-repo:/restic-repo
    - ${BACKUP_BASE_PATH}/restic-repo-new:/restic-repo-new
    environment:
    - RESTIC_REPOSITORY=/restic-repo
    - RESTIC_PASSWORD=${RESTIC_PASSWORD}
    entrypoint:
    - tail
    - -f
    - /dev/null
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 100
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  backup-cron-trigger:
    build:
      context: .
      dockerfile: cron-trigger.Dockerfile
    container_name: backup-cron-trigger
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    depends_on:
    - backup-restic
    volumes:
    - ./scripts:/scripts:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ${DATA_BASE_PATH}/monitoring/textfile-collector:/textfile-collector
    environment:
    - TZ=${TZ}
    - CRON_SCHEDULE=0 2 * * *
    - RESTORE_TEST_SCHEDULE=${RESTORE_TEST_SCHEDULE:-0 3 1 * *}
    - BACKUP_DATA_PATH=/data
    - RESTIC_REPOSITORY=/restic-repo
    - RESTIC_PASSWORD=${RESTIC_PASSWORD}
    - RESTIC_KEEP_HOURLY=24
    - RESTIC_KEEP_DAILY=7
    - RESTIC_KEEP_WEEKLY=4
    - RESTIC_KEEP_MONTHLY=6
    - RESTIC_KEEP_YEARLY=3
    - OFFSITE_REPO=${OFFSITE_REPO}
    - OFFSITE_AWS_KEY=${OFFSITE_AWS_KEY}
    - OFFSITE_AWS_SECRET=${OFFSITE_AWS_SECRET}
    - NTFY_TOPIC=${NTFY_TOPIC:-}
    - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-}
    entrypoint:
    - /bin/sh
    - -c
    command:
    - 'echo "$$CRON_SCHEDULE /scripts/run-backup.sh" > /etc/crontabs/root

      echo "30 1 * * * /scripts/run-keycloak-export.sh" >> /etc/crontabs/root

      echo "$$RESTORE_TEST_SCHEDULE /scripts/run-restore-test.sh" >> /etc/crontabs/root

      crond -f /etc/crontabs/root

      '
    network_mode: bridge
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
          pids: 100
        reservations:
          memory: 16M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
