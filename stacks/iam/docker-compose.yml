services:
  postgres-iam:
    image: postgres:17
    container_name: iam-postgres
    restart: unless-stopped
    init: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    volumes:
    - ${DATA_BASE_PATH}/iam/postgres:/var/lib/postgresql/data
    environment:
    - POSTGRES_DB=${KEYCLOAK_DATABASE_NAME}
    - POSTGRES_USER=${KEYCLOAK_DATABASE_USER}
    - POSTGRES_PASSWORD=${KEYCLOAK_DATABASE_PASSWORD}
    - POSTGRES_INITDB_ARGS=-c max_connections=30
    networks:
    - data_net
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${KEYCLOAK_DATABASE_USER} -d ${KEYCLOAK_DATABASE_NAME}
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  keycloak:
    image: ghcr.io/wyattau/evergreenimageregistry/keycloak:26.6.2
    container_name: iam-keycloak
    restart: unless-stopped
    init: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    depends_on:
      postgres-iam:
        condition: service_healthy
    environment:
    - TZ=${TZ}
    - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USER}
    - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    - KC_DB=postgres
    - KC_DB_URL=jdbc:postgresql://iam-postgres:5432/${KEYCLOAK_DATABASE_NAME}
    - KC_DB_USERNAME=${KEYCLOAK_DATABASE_USER}
    - KC_DB_PASSWORD=${KEYCLOAK_DATABASE_PASSWORD}
    - KC_HOSTNAME=auth.${DOMAIN_NAME}
    - KC_PROXY_HEADERS=xforwarded
    - KC_TRUSTED_HOSTS=auth.${DOMAIN_NAME},localhost,127.0.0.1
    - KC_HEALTH_ENABLED=true
    - KC_METRICS_ENABLED=true
    - KC_HTTP_ENABLED=true
    - KC_HTTP_HOST=0.0.0.0
    - KC_CACHE=local
    - KC_DB_POOL_INITIAL_SIZE=5
    - KC_DB_POOL_MAX_SIZE=20
    - KC_SMTP_HOST=${SMTP_HOST}
    - KC_SMTP_PORT=${SMTP_PORT}
    - KC_SMTP_AUTH=true
    - KC_SMTP_USERNAME=${SMTP_USERNAME}
    - KC_SMTP_PASSWORD=${SMTP_PASSWORD}
    - KC_SMTP_FROM=noreply@${DOMAIN_NAME}
    - KC_SMTP_STARTTLS=true
    networks:
    - traefik_net
    - backend_net
    - data_net
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.routers.keycloak.rule=Host(`auth.${DOMAIN_NAME}`)
    - traefik.http.routers.keycloak.entrypoints=websecure
    - traefik.http.routers.keycloak.service=keycloak-svc
    - traefik.http.services.keycloak-svc.loadbalancer.server.port=8080
    - traefik.http.routers.keycloak.tls.certresolver=cloudflare
    healthcheck:
      test: ["CMD", "/usr/local/bin/shim", "healthcheck", "--tcp", "127.0.0.1:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 768M
          pids: 512
        reservations:
          cpus: '0.25'
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  traefik_net:
    external: true
  backend_net:
    external: true
  data_net:
    external: true
