services:
  mariadb-akaunting:
    image: ghcr.io/wyattau/evergreenimageregistry/mariadb:11.8
    container_name: accounting-mariadb-akaunting
    restart: unless-stopped
    init: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    volumes:
    - ${DATA_BASE_PATH}/accounting/mariadb-akaunting:/var/lib/mysql
    environment:
    - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD_AKAUNTING}
    - MYSQL_DATABASE=${MYSQL_DB_AKAUNTING}
    - MYSQL_USER=${MYSQL_USER_AKAUNTING}
    - MYSQL_PASSWORD=${MYSQL_PASSWORD_AKAUNTING}
    networks:
    - data_net
    healthcheck:
      test:
      - CMD
      - healthcheck.sh
      - --connect
      - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  akaunting:
    image: akaunting/akaunting@sha256:50940112be48a229a2f567dc50ace9886fe5b14e1fe33f0232e704d0fb96f29f
    container_name: accounting-akaunting
    restart: unless-stopped
    init: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    depends_on:
      mariadb-akaunting:
        condition: service_healthy
    volumes:
    - ${DATA_BASE_PATH}/accounting/akaunting:/var/www/html
    environment:
    - PUID=${PUID}
    - PGID=${PGID}
    - TZ=${TZ}
    - APP_URL=https://${AKAUNTING_SUBDOMAIN}.${DOMAIN_NAME}
    - APP_URL_HOST=${AKAUNTING_SUBDOMAIN}.${DOMAIN_NAME}
    - FIREWALL_ENABLED=false
    - DB_CONNECTION=mysql
    - DB_HOST=accounting-mariadb-akaunting
    - DB_PORT=3306
    - DB_DATABASE=${MYSQL_DB_AKAUNTING}
    - DB_USERNAME=${MYSQL_USER_AKAUNTING}
    - DB_PASSWORD=${MYSQL_PASSWORD_AKAUNTING}
    networks:
    - traefik_net
    - backend_net
    - data_net
    healthcheck:
      test:
      - CMD-SHELL
      - 'curl -fSs -H "Host: $$APP_URL_HOST" http://127.0.0.1:80/install/language || exit 1'
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
    - traefik.enable=true
    - traefik.docker.network=traefik_net
    - traefik.http.routers.akaunting.rule=Host(`${AKAUNTING_SUBDOMAIN}.${DOMAIN_NAME}`)
    - traefik.http.routers.akaunting.entrypoints=websecure
    - traefik.http.routers.akaunting.tls.certresolver=cloudflare
    - traefik.http.routers.akaunting.middlewares=keycloak-auth@file
    - traefik.http.services.akaunting.loadbalancer.server.port=80
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 256M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  mariadb-exporter:
    image: ghcr.io/wyattau/evergreenimageregistry/mysqld-exporter:v0.19.0
    container_name: accounting-mariadb-exporter
    restart: unless-stopped
    init: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    depends_on:
      mariadb-akaunting:
        condition: service_healthy
    environment:
    - MYSQLD_EXPORTER_PASSWORD=${MYSQL_PASSWORD_AKAUNTING}
    command:
    - --mysqld.address=accounting-mariadb-akaunting:3306
    - --mysqld.username=akaunting
    networks:
    - backend_net
    - data_net
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:9104/metrics || exit 1
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
          pids: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
networks:
  traefik_net:
    external: true
  backend_net:
    external: true
  data_net:
    external: true
