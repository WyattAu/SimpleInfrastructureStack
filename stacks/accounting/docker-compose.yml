services:
  mariadb-akaunting:
    image: mariadb:${MARIADB_AKAUNTING_VERSION}
    container_name: accounting-mariadb-akaunting
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    volumes:
      - ${DATA_BASE_PATH}/accounting/mariadb-akaunting:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD_AKAUNTING}
      - MYSQL_DATABASE=${MYSQL_DB_AKAUNTING}
      - MYSQL_USER=${MYSQL_USER_AKAUNTING}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD_AKAUNTING}
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  akaunting:
    image: akaunting/akaunting:${AKAUNTING_VERSION}
    container_name: accounting-akaunting
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    depends_on:
      mariadb-akaunting:
        condition: service_healthy
    volumes:
      - ${DATA_BASE_PATH}/accounting/akaunting:/var/www/html
      - ./apache-config.sh:/docker-custom/apache-config.sh:ro
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - APP_URL=https://${AKAUNTING_SUBDOMAIN}.${DOMAIN_NAME}
      - FIREWALL_ENABLED=false
      - DB_CONNECTION=mysql
      - DB_HOST=accounting-mariadb-akaunting
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DB_AKAUNTING}
      - DB_USERNAME=${MYSQL_USER_AKAUNTING}
      - DB_PASSWORD=${MYSQL_PASSWORD_AKAUNTING}
    command: ["/bin/bash", "-c", "bash /docker-custom/apache-config.sh && exec /usr/local/bin/akaunting-v.sh --start"]
    networks:
      - traefik_net
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:80/install/language"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.akaunting.rule=Host(`${AKAUNTING_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.akaunting.entrypoints=websecure"
      - "traefik.http.routers.akaunting.tls.certresolver=cloudflare"
      # Secure this service with our existing Keycloak authentication proxy
      - "traefik.http.routers.akaunting.middlewares=keycloak-auth@docker"
      - "traefik.http.services.akaunting.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_net:
    external: true
  backend_net:
    external: true
