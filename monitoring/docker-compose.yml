version: '3.8'

services:
  prometheus-init:
    image: busybox:1.36.1
    container_name: monitoring-prometheus-init
    command: chown -R 65534:65534 /prometheus
    volumes:
      - ${DATA_BASE_PATH}/monitoring/prometheus:/prometheus
    networks: []
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: monitoring-prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      prometheus-init:
        condition: service_completed_successfully
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ${DATA_BASE_PATH}/monitoring/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=90d'
    networks:
      - traefik_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.middlewares=keycloak-auth,security-headers"
      - "traefik.http.routers.prometheus.tls.certresolver=cloudflare"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.services.prometheus.loadbalancer.server.scheme=http"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana-init:
    image: busybox:1.36.1
    container_name: monitoring-grafana-init
    command: chown -R 472:472 /var/lib/grafana
    volumes:
      - ${DATA_BASE_PATH}/monitoring/grafana:/var/lib/grafana
    networks: []
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: monitoring-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      grafana-init:
        condition: service_completed_successfully
    volumes:
      - ${DATA_BASE_PATH}/monitoring/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - TZ=${TZ}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_SUBDOMAIN}.${DOMAIN_NAME}
      # --- OIDC / Keycloak Configuration ---
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Keycloak
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OIDC_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OIDC_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email roles
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.${DOMAIN_NAME}/realms/company-realm/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.${DOMAIN_NAME}/realms/company-realm/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.${DOMAIN_NAME}/realms/company-realm/protocol/openid-connect/userinfo
      # --- Attribute and Role Mapping ---
      - GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH=preferred_username
      - GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH=email
      - GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH=name
      # --- Grafana-Specific Role Mapping ---
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(resource_access['${GRAFANA_OIDC_CLIENT_ID}'].roles[*], 'grafana-admin') && 'Admin' || contains(resource_access['${GRAFANA_OIDC_CLIENT_ID}'].roles[*], 'grafana-editor') && 'Editor' || 'Viewer'
      # --- Loki Basic Auth Credentials ---
      - LOKI_USERNAME=${LOKI_USERNAME:-loki}
      - LOKI_PASSWORD=${LOKI_PASSWORD}
    networks:
      - traefik_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.routers.grafana.middlewares=security-headers"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  loki-init:
    image: alpine:3.19
    container_name: monitoring-loki-init
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - ./loki/rendered:/etc/loki/rendered
    environment:
      - LOKI_USERNAME=${LOKI_USERNAME:-loki}
      - LOKI_PASSWORD=${LOKI_PASSWORD}
      - LOKI_HASH=
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "apk add --no-cache apache2-utils python3 >/dev/null 2>&1 && export LOKI_HASH=$$(htpasswd -nbB \"$$LOKI_USERNAME\" \"$$LOKI_PASSWORD\" | cut -d: -f2) && python3 -c 'import os; u=os.environ[\"LOKI_USERNAME\"]; h=os.environ[\"LOKI_HASH\"]; c=open(\"/etc/loki/config.yml\").read(); open(\"/etc/loki/rendered/config.yml\",\"w\").write(c.replace(\"$${LOKI_USERNAME}: $${LOKI_PASSWORD_HASH}\", u+\": \"+h))'"
    networks: []
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  loki:
    image: grafana/loki:${LOKI_VERSION}
    container_name: monitoring-loki
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      loki-init:
        condition: service_completed_successfully
    volumes:
      - ${DATA_BASE_PATH}/monitoring/loki:/loki
      - ./loki/rendered/config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION}
    container_name: monitoring-promtail
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
    environment:
      - LOKI_USERNAME=${LOKI_USERNAME:-loki}
      - LOKI_PASSWORD=${LOKI_PASSWORD}
    command:
      - "-config.file=/etc/promtail/config.yml"
      - "-client.url=http://${LOKI_USERNAME}:${LOKI_PASSWORD}@monitoring-loki:3100/loki/api/v1/push"
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9080/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:${KUMA_VERSION}
    container_name: monitoring-kuma
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${DATA_BASE_PATH}/monitoring/kuma:/app/data
    networks:
      - traefik_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.kuma.rule=Host(`${KUMA_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.kuma.entrypoints=websecure"
      - "traefik.http.routers.kuma.middlewares=keycloak-auth,security-headers"
      - "traefik.http.routers.kuma.tls.certresolver=cloudflare"
      - "traefik.http.services.kuma.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    image: ghcr.io/google/cadvisor:${CADVISOR_VERSION}
    container_name: monitoring-cadvisor
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION}
    container_name: monitoring-node-exporter
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_net:
    external: true
  backend_net:
    external: true
