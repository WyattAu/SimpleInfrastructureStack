version: '3.8'

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:${SOCKET_PROXY_VERSION}
    container_name: proxy-socket-proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOG_LEVEL=info
      - CONTAINERS=0
      - IMAGES=1
      - NETWORKS=1
      - SERVICES=1
      - TASKS=1
      - NODES=1
      - POST=0
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  traefik:
    image: traefik:${TRAEFIK_VERSION}
    container_name: proxy-traefik
    restart: unless-stopped
    depends_on:
      socket-proxy:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.matrix.address=:8448"
      - "--certificatesresolvers.cloudflare.acme.email=${LE_EMAIL}"
      - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
    labels:
      # --- Middleware: security-headers (replaces dead http.yml) ---
      - "traefik.http.middlewares.security-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.security-headers.headers.customresponseheaders.X-Frame-Options=DENY"
      - "traefik.http.middlewares.security-headers.headers.customresponseheaders.X-XSS-Protection=1; mode=block"
      - "traefik.http.middlewares.security-headers.headers.customresponseheaders.Strict-Transport-Security=max-age=31536000; includeSubDomains"
      - "traefik.http.middlewares.security-headers.headers.customresponseheaders.Referrer-Policy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.customresponseheaders.Content-Security-Policy=default-src 'self'"

      # --- Middleware: keycloak-auth ---
      - "traefik.http.middlewares.keycloak-auth.forwardauth.address=http://oauth2-proxy:4180"
      - "traefik.http.middlewares.keycloak-auth.forwardauth.authResponseHeaders=X-Auth-Request-Email,X-Auth-Request-User"
      - "traefik.http.middlewares.keycloak-auth.forwardauth.trustForwardHeader=true"

      # --- Router: traefik-dashboard ---
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN_NAME}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-dashboard.middlewares=keycloak-auth,security-headers"
    ports:
      - "80:80"
      - "443:443"
      - "8448:8448"
    volumes:
      - ${DATA_BASE_PATH}/proxy/letsencrypt:/letsencrypt:rw
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - CLOUDFLARE_DNS_API_TOKEN=${CF_API_TOKEN}
      - DOMAIN_NAME=${DOMAIN_NAME}
    networks:
      - traefik_net
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/overview || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflare-ddns:
    image: favonia/cloudflare-ddns:${CF_DDNS_VERSION}
    container_name: proxy-cloudflare-ddns
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - CLOUDFLARE_API_TOKEN=${CF_API_TOKEN}
      - CLOUDFLARE_ZONE_ID=${CF_ZONE_ID}
      - DOMAINS=${DOMAIN_NAME},traefik.${DOMAIN_NAME},auth.${DOMAIN_NAME},forgejo.${DOMAIN_NAME},registry-forgejo.${DOMAIN_NAME},ci.${DOMAIN_NAME},ci-grpc.${DOMAIN_NAME},grafana.${DOMAIN_NAME},prometheus.${DOMAIN_NAME},kuma.${DOMAIN_NAME},homepage.${DOMAIN_NAME},matrix.${DOMAIN_NAME},element.${DOMAIN_NAME},ocis.${DOMAIN_NAME},collabora.${DOMAIN_NAME},akaunting.${DOMAIN_NAME},test.${DOMAIN_NAME}
      - IPV4_PROVIDER=all
      - PROXIED=true
      - RRTYPE=A
      - DELETE_ON_STOP=false
      - "CRON=*/5 * * * *"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:${OAUTH2_PROXY_VERSION}
    container_name: proxy-oauth2-proxy
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik_net
      - backend_net
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_UPSTREAMS=static://200
      - OAUTH2_PROXY_REVERSE_PROXY=true
      - OAUTH2_PROXY_PREFERRED_USERNAME_CLAIM=preferred_username
      - OAUTH2_PROXY_WHITELIST_DOMAINS=.${DOMAIN_NAME}
      - OAUTH2_PROXY_OIDC_ISSUER_URL=https://auth.${DOMAIN_NAME}/realms/company-realm
      - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}
      - OAUTH2_PROXY_COOKIE_SECURE=true
      - OAUTH2_PROXY_COOKIE_SAMESITE=strict
      - OAUTH2_PROXY_COOKIE_DOMAIN=.${DOMAIN_NAME}
      - OAUTH2_PROXY_REDEEM_URL=http://iam-keycloak:8080/realms/company-realm/protocol/openid-connect/token
      - OAUTH2_PROXY_OIDC_JWKS_URL=http://iam-keycloak:8080/realms/company-realm/protocol/openid-connect/certs
      - OAUTH2_PROXY_CODE_CHALLENGE_METHOD=S256
      - OAUTH2_PROXY_SET_XAUTHREQUEST=true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.oauth2-proxy.rule=(Host(`homepage.${DOMAIN_NAME}`) || Host(`traefik.${DOMAIN_NAME}`) || Host(`kuma.${DOMAIN_NAME}`) || Host(`prometheus.${DOMAIN_NAME}`)) && PathPrefix(`/oauth2`)"
      - "traefik.http.routers.oauth2-proxy.entrypoints=websecure"
      - "traefik.http.routers.oauth2-proxy.tls.certresolver=cloudflare"
      - "traefik.http.routers.oauth2-proxy.middlewares=security-headers"
      - "traefik.http.services.oauth2-proxy.loadbalancer.server.port=4180"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4180/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  well-known-server:
    image: nginx:${NGINX_VERSION}
    container_name: proxy-well-known-server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    volumes:
      - ./config/matrix-well-known.json:/usr/share/nginx/html/.well-known/matrix/server:ro
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.matrix-well-known.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.matrix-well-known.entrypoints=websecure"
      - "traefik.http.middlewares.matrix-headers.headers.customresponseheaders.Content-Type=application/json; charset=utf-8"
      - "traefik.http.routers.matrix-well-known.middlewares=matrix-headers,security-headers"
      - "traefik.http.routers.matrix-well-known.tls.certresolver=cloudflare"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M
        reservations:
          memory: 8M
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "1"

networks:
  traefik_net:
    external: true
  backend_net:
    external: true
